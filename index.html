<script>
/* ═══════════════════════════════════════

var D={tasks:[],costs:[],pays:[],upds:[],photos:[],safety:{},vn:{},vgc:{}};

function gi(id){return document.getElementById(id)}

function addD(ds,n){var d=new Date(ds);d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dd(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function fmtN(v){if(!v||v===0)return'0';return Number(v).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}
function notify(m){var t=gi('tst');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2200)}
function mOpen(ti,bd,ft){gi('mTi').textContent=ti;gi('mBd').innerHTML=bd;gi('mFt').innerHTML=ft||'';gi('mdl').classList.add('open')}

gi('mdl').addEventListener('click',function(e){if(e.target===this)mClose()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')mClose()});
function cv(v,f,t){if(f===t)return v;return v/FX[f].r*FX[t].r}
function fmtC(v,c){var s=SY[c]||'';if(!v||v===0)return s+'0';if(c==='VND'){if(v>=1e9)return s+(v/1e9).toFixed(2)+'B';if(v>=1e6)return s+(v/1e6).toFixed(2)+'M';return s+Math.round(v).toLocaleString()}if(v>=1e6)return s+(v/1e6).toFixed(2)+'M';return s+v.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}
function toD(v){return cv(v,'PHP',DC)}
function fmtD(v){return fmtC(toD(v),DC)}
function cbar(fn){return '<div class="fbar"><label>Display:</label><select onchange="'+fn+'"><option value="PHP"'+(DC==='PHP'?' selected':'')+'>PHP</option><option value="VND"'+(DC==='VND'?' selected':'')+'>VND</option><option value="USD"'+(DC==='USD'?' selected':'')+'>USD</option></select><span style="font-size:.56rem;color:var(--g);font-family:JetBrains Mono;padding:2px 6px;background:var(--gc);border-radius:var(--r)">1 USD = '+Math.round(FX.VND.r).toLocaleString()+' VND</span></div>'}

/* ═══════ FIREBASE ═══════ */

/* ═══════ CLOUD SAVE / SYNC ═══════ */
function cSave(){
  if(!db)return;skipSync=true;
  try{
    Promise.all([
      db.ref('ss/tasks').set(D.tasks),
      db.ref('ss/costs').set(D.costs),
      db.ref('ss/pays').set(D.pays),
      db.ref('ss/upds').set(D.upds),
      db.ref('ss/safety').set(D.safety),
      db.ref('ss/vgc').set(D.vgc),
      db.ref('ss/vn').set(D.vn)
    ]).then(function(){setTimeout(function(){skipSync=false},800)}).catch(function(e){console.error('Save error:',e);skipSync=false})
  }catch(e){skipSync=false}
}
function syncFromCloud(){
  if(!db)return;
  var nodes=['tasks','costs','pays','upds','safety','vgc','vn'];
  var pend=nodes.length;
  function done(){pend--;if(pend<=0){cTot();doRender();setupLiveSync()}}
  nodes.forEach(function(key){
    db.ref('ss/'+key).once('value').then(function(snap){
      var val=snap.val();
      if(val!==null&&val!==undefined&&((Array.isArray(val)&&val.length)||(!Array.isArray(val)&&Object.keys(val).length))){
        D[key]=val;localStorage.setItem('ss_'+key,JSON.stringify(val))
      }else{try{db.ref('ss/'+key).set(D[key])}catch(e){}}
      done()
    }).catch(function(){done()})
  })
}
function setupLiveSync(){
  if(!db)return;
  ['tasks','costs','pays','upds','safety','vgc','vn'].forEach(function(key){
    var ref=db.ref('ss/'+key);ref.off();
    ref.on('value',function(snap){
      if(skipSync)return;
      var val=snap.val();
      if(val!==null&&val!==undefined){
        D[key]=val;localStorage.setItem('ss_'+key,JSON.stringify(val));cTot();doRender()
      }
    })
  });
  if(!window._syncInterval){
    window._syncInterval=setInterval(function(){
      if(!db||!cOn)return;
      ['tasks','costs','pays','upds','safety','vgc','vn'].forEach(function(key){
        db.ref('ss/'+key).once('value').then(function(snap){
          var val=snap.val();
          if(val!==null&&val!==undefined){D[key]=val;localStorage.setItem('ss_'+key,JSON.stringify(val))}
        }).catch(function(){})
      });cTot()
    },45000)
  }
}

function siteGantt(){var GS=new Date(2026,0,1),ppd=3;function dPx(ds){var p=ds.split('-');return Math.round((new Date(+p[0],+p[1]-1,+p[2])-GS)/86400000)*ppd}var sc2={done:'var(--g)',active:'var(--bl)',pending:'#999'};var oa=oProg(),m=mainT();var mo=[];for(var i=0;i<14;i++){var yr=i<12?2026:2027,mi=i<12?i:i-12,d1=new Date(yr,mi,1),d2=new Date(yr,mi+1,1);mo.push({l:d1.toLocaleString('en',{month:'short',year:'2-digit'}),lp:dPx(yr+'-'+String(mi+1).padStart(2,'0')+'-01'),lw:Math.round((d2-d1)/86400000)*ppd})}var h='<div class="card" style="border-left:4px solid var(--bl)"><div class="ch"><span class="ct">Site Gantt Chart</span><span style="font-family:JetBrains Mono;font-size:.6rem;color:var(--t3)">'+D.tasks.length+' tasks &bull; '+oa+'%</span></div></div>';h+='<div class="gw"><div class="ghdr"><div class="ghdr-l">WBS</div><div class="ghdr-m">';for(var i=0;i<mo.length;i++)h+='<div class="gmo" style="left:'+mo[i].lp+'px;width:'+mo[i].lw+'px">'+mo[i].l+'</div>';var tPx=dPx(td());if(tPx>0)h+='<div class="gtd" style="left:'+tPx+'px"></div>';h+='</div></div>';for(var gi2=0;gi2<m.length;gi2++){var g=m[gi2],gw=wavg(g.wbs),gc=gw>=80?'var(--g)':gw>=40?'var(--or)':gw>0?'var(--bl)':'var(--t3)';h+='<div class="gmain"><span>'+esc(g.wbs)+' '+esc(g.name)+'</span><span class="gmp" style="background:'+(gw>=80?'var(--gc)':gw>=40?'var(--orc)':'var(--blc)')+';color:'+gc+'">'+gw+'%</span></div>';var ch=[];for(var i=0;i<D.tasks.length;i++){if(D.tasks[i].wbs.indexOf(g.wbs+'.')===0&&D.tasks[i].wbs!==g.wbs)ch.push(i)}if(!ch.length){var lx=dPx(g.s),wx=Math.max(4,g.dur*ppd);h+='<div class="grow" onclick="edG('+gi2+')"><div class="glbl"><span class="wb">'+esc(g.wbs)+'</span><span>'+esc(g.name)+'</span></div><div class="gba"><div class="gbar" style="left:'+lx+'px;width:'+wx+'px;background:'+(sc2[g.st]||'#999')+'"><div class="gfill" style="width:'+g.prog+'%"></div>'+(wx>38?g.prog+'%':'')+'</div></div></div>'}else{for(var cj=0;cj<ch.length;cj++){var idx=ch[cj],t=D.tasks[idx],lx2=dPx(t.s),wx2=Math.max(4,t.dur*ppd);h+='<div class="grow" onclick="edG('+idx+')"><div class="glbl"><span class="wb">'+esc(t.wbs)+'</span><span>'+esc(t.name)+'</span></div><div class="gba"><div class="gbar" style="left:'+lx2+'px;width:'+wx2+'px;background:'+(sc2[t.st]||'#999')+'"><div class="gfill" style="width:'+t.prog+'%"></div>'+(wx2>38?t.prog+'%':'')+'</div></div></div>'}}}h+='</div>';return h}
function vendorGantt(vendor){var vg=D.vgc[vendor];if(!vg)return'<div class="card">Vendor not found.</div>';var tasks=vg.tasks||[];var h='<div class="card" style="border-left:4px solid var(--pu)"><div class="ch"><span class="ct" style="color:var(--pu)">'+esc(vendor)+' Gantt</span><span style="font-family:JetBrains Mono;font-size:.6rem;color:var(--t3)">'+tasks.length+' tasks</span></div>';if(!vg.image&&!tasks.length)h+='<div style="text-align:center;padding:24px;color:var(--t3)"><div style="font-size:1.6rem;margin-bottom:6px">&#128202;</div>No data yet</div>';h+='</div>';if(vg.image){if(!imgZoom[vendor])imgZoom[vendor]=1;var z=imgZoom[vendor];h+='<div class="card"><div class="ch"><span class="ct">Uploaded Schedule</span><div style="display:flex;gap:4px;align-items:center">';h+='<button class="btn bs" onclick="zoomImg(\''+esc(vendor)+'\',-0.25)">&#8722;</button>';h+='<span style="font-family:JetBrains Mono;font-size:.6rem;color:var(--t3);min-width:40px;text-align:center">'+Math.round(z*100)+'%</span>';h+='<button class="btn bs" onclick="zoomImg(\''+esc(vendor)+'\',0.25)">&#43;</button>';h+='<button class="btn bs" onclick="zoomImg(\''+esc(vendor)+'\',0,1)">Reset</button>';h+='<button class="btn bs bd" onclick="rmVGI(\''+esc(vendor)+'\')">Remove</button></div></div>';h+='<div class="zoom-wrap"><img src="'+vg.image+'" style="transform:scale('+z+');transform-origin:top left;transition:transform .2s ease;max-width:none;display:block"></div></div>'}if(!vg.image)h+='<div class="card"><div class="dropzone" onclick="document.getElementById(\'vgF\').click()" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="vgDrop(event,\''+esc(vendor)+'\')"><div style="font-size:1.3rem">&#128202;</div><div style="font-size:.76rem;color:var(--t2)">Upload image</div><input type="file" id="vgF" accept="image/*" style="display:none" onchange="vgProc(this,\''+esc(vendor)+'\')"></div></div>';if(tasks.length){var GS=new Date(2026,0,1),ppd=3;function dPx(ds){var p=ds.split('-');return Math.round((new Date(+p[0],+p[1]-1,+p[2])-GS)/86400000)*ppd}var mo=[];for(var i=0;i<14;i++){var yr=i<12?2026:2027,mi=i<12?i:i-12,d1=new Date(yr,mi,1),d2=new Date(yr,mi+1,1);mo.push({l:d1.toLocaleString('en',{month:'short',year:'2-digit'}),lp:dPx(yr+'-'+String(mi+1).padStart(2,'0')+'-01'),lw:Math.round((d2-d1)/86400000)*ppd})}h+='<div class="card"><div class="ch"><span class="ct">Schedule</span></div><div class="gw"><div class="ghdr"><div class="ghdr-l">#</div><div class="ghdr-m">';for(var i=0;i<mo.length;i++)h+='<div class="gmo" style="left:'+mo[i].lp+'px;width:'+mo[i].lw+'px">'+mo[i].l+'</div>';var tPx=dPx(td());if(tPx>0)h+='<div class="gtd" style="left:'+tPx+'px"></div>';h+='</div></div>';for(var i=0;i<tasks.length;i++){var t=tasks[i],dur=dd(t.s,t.e),lx=dPx(t.s),wx=Math.max(4,dur*ppd),bc=t.prog>=80?'var(--g)':t.prog>=40?'var(--or)':t.prog>0?'var(--bl)':'#999';h+='<div class="grow" onclick="edVGT(\''+esc(vendor)+'\','+i+')"><div class="glbl"><span class="wb">'+(i+1)+'</span><span>'+esc(t.name)+'</span></div><div class="gba"><div class="gbar" style="left:'+lx+'px;width:'+wx+'px;background:'+bc+'"><div class="gfill" style="width:'+t.prog+'%"></div>'+(wx>38?t.prog+'%':'')+'</div></div></div>'}h+='</div></div>'}return h}

function vgFileP(f,vendor){if(!f.type.startsWith('image/')){alert('Image only');return}var rd=new FileReader();rd.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas'),w=img.width,h=img.height,mx=1200;if(w>mx){h=Math.round(h*mx/w);w=mx}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);try{D.vgc[vendor].image=c.toDataURL('image/jpeg',.65);save();notify('Uploaded');showGantt()}catch(err){alert('Too large')}};img.src=e.target.result};rd.readAsDataURL(f)}

/* ═══════ S-CURVE ═══════ */
function showSCurve(){cTot();var m=mainT(),oa=oProg(),tdD=new Date(td()),tDur=0;for(var i=0;i<m.length;i++)tDur+=m[i].dur;if(!tDur){gi('app').innerHTML='<div class="card">No tasks</div>';return}var months=[],planned=[],actual=[],monthDates=[];for(var mi=0;mi<14;mi++){var yr=mi<12?2026:2027,mo=mi<12?mi:mi-12,me=new Date(yr,mo+1,0);months.push(new Date(yr,mo,1).toLocaleString('en',{month:'short',year:'2-digit'}));monthDates.push(me);var mp=0,ma=0;for(var j=0;j<m.length;j++){var t=m[j],w=t.dur/tDur,ts=new Date(t.s),te=new Date(t.e),pc=0;if(me>=te)pc=1;else if(me>=ts)pc=Math.min(1,(me-ts)/Math.max(1,te-ts));mp+=w*pc;var ac=0;if(t.prog>=100){if(me>=te)ac=1;else if(me>=ts)ac=Math.min(1,(me-ts)/Math.max(1,te-ts))}else if(me<=tdD&&me>=ts){ac=(t.prog/100)*Math.min(1,(me-ts)/Math.max(1,tdD-ts))}else if(me>tdD){ac=t.prog/100}ma+=w*ac}planned.push(Math.round(mp*100));actual.push(Math.round(ma*100))}scData={planned:planned,actual:actual,months:months,monthDates:monthDates,tdD:tdD,oa:oa};var pNow=0;for(var i=0;i<months.length;i++){if(monthDates[i]>=tdD){pNow=planned[i];break}}var vr=oa-pNow,vrC=vr>=0?'var(--g)':'var(--rd)';var dM=0,firstB='';for(var i=0;i<planned.length;i++){if(actual[i]<planned[i]-2){dM++;if(!firstB)firstB=months[i]}}var mE=0;for(var i=0;i<months.length;i++)if(monthDates[i]<=tdD)mE++;var rate=mE>0?oa/mE:0;var fD=new Date(tdD);fD.setMonth(fD.getMonth()+(rate>0?Math.ceil((100-oa)/rate):99));var nR=(100-oa)/Math.max(1,14-mE);var h='<div style="margin-bottom:10px"><span class="ct" style="font-size:.92rem">S-Curve Analysis</span></div>';h+='<div class="stats">';h+='<div class="si" style="border-left:4px solid var(--g)"><div class="sl">Actual</div><div class="sv" style="color:var(--g)">'+oa+'%</div></div>';h+='<div class="si" style="border-left:4px solid var(--bl)"><div class="sl">Planned</div><div class="sv" style="color:var(--bl)">'+pNow+'%</div></div>';h+='<div class="si" style="border-left:4px solid '+vrC+'"><div class="sl">Variance</div><div class="sv" style="color:'+vrC+'">'+(vr>=0?'+':'')+vr+'%</div><div class="sn">'+(vr>=-3?'On Track':vr>=-10?'Behind':'Critical')+'</div></div>';h+='<div class="si" style="border-left:4px solid var(--am)"><div class="sl">Forecast</div><div class="sv" style="color:var(--am)">'+fD.toLocaleString('en',{month:'short',year:'numeric'})+'</div></div>';h+='<div class="si" style="border-left:4px solid var(--t1)"><div class="sl">Req. Rate</div><div class="sv">'+nR.toFixed(1)+'%/mo</div></div>';h+='<div class="si" style="border-left:4px solid var(--rd)"><div class="sl">Behind</div><div class="sv" style="color:var(--rd)">'+dM+' mo</div><div class="sn">'+(firstB||'None')+'</div></div>';h+='</div>';h+='<div class="card"><div class="ch"><span class="ct">Progress Trend</span></div><canvas id="scC" width="900" height="320" style="width:100%;height:auto;display:block"></canvas></div>';h+='<div class="card" style="border-left:4px solid var(--pu)"><div class="ch"><span class="ct" style="color:var(--pu)">Scenario Analysis</span></div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"><span style="font-size:.68rem;font-weight:600;color:var(--t2);line-height:26px">Presets:</span><button class="btn bs" onclick="fillScenario(\'linear\')">Linear 100%</button><button class="btn bs" onclick="fillScenario(\'aggressive\')">Aggressive</button><button class="btn bs" onclick="fillScenario(\'conservative\')">Conservative</button><button class="btn bs bd" onclick="fillScenario(\'clear\')">Clear</button></div><div style="font-size:.72rem;font-weight:600;color:var(--t2);margin-bottom:6px">Target % per Month</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:14px">';for(var mi=0;mi<14;mi++){var yr2=mi<12?2026:2027,mo2=mi<12?mi:mi-12,me2=new Date(yr2,mo2+1,0);if(me2<tdD)continue;var mk=yr2+'-'+String(mo2+1).padStart(2,'0');var ml2=new Date(yr2,mo2,1).toLocaleString('en',{month:'short',year:'numeric'});var val=scenarioTgts[mk]!==undefined?scenarioTgts[mk]:'';h+='<div style="padding:6px 8px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r)"><div style="font-size:.54rem;color:var(--t3);font-family:JetBrains Mono;margin-bottom:2px">'+ml2+'</div><input type="number" id="sM_'+mk+'" value="'+val+'" min="0" max="100" style="width:100%;padding:4px;font-size:.85rem;font-family:Space Grotesk;font-weight:600;text-align:center" placeholder="--"></div>'}h+='</div><div style="text-align:center"><button class="btn bu" style="padding:10px 32px;font-size:.84rem" onclick="runScenario()">&#9654; Run Scenario</button></div><div id="scRes"></div></div>';gi('app').innerHTML=h;var sLine=bldScenarioLine(scenarioTgts,oa,monthDates);drawSCurveChart(planned,actual,months,tdD,sLine);if(Object.keys(scenarioTgts).length>=2)showScenarioResults(calcScenario(oa,scenarioTgts))}
function mkFromD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function mkIdx(mk,md){for(var i=0;i<md.length;i++){if(mkFromD(md[i])===mk)return i}return-1}
function plannedAtMk(mk){var p=mk.split('-'),yr=+p[0],mo=+p[1]-1,me=new Date(yr,mo+1,0),m2=mainT(),tw=0;for(var i=0;i<m2.length;i++)tw+=m2[i].dur;if(!tw)return 0;var s=0;for(var j=0;j<m2.length;j++){var t=m2[j],w=t.dur/tw,ts=new Date(t.s),te=new Date(t.e),pc=0;if(me>=te)pc=1;else if(me>=ts)pc=Math.min(1,(me-ts)/Math.max(1,te-ts));s+=w*pc}return Math.round(s*100)}
function bldScenarioLine(tg,cp,md){var keys=Object.keys(tg).sort();if(!keys.length)return null;var res=[];for(var i=0;i<md.length;i++){var mk=mkFromD(md[i]);if(tg[mk]!==undefined){res.push(tg[mk]);continue}var pi=-1,pv=cp,ni=-1,nv=null;for(var j=0;j<keys.length;j++){var ki=mkIdx(keys[j],md);if(ki<=i&&ki>=0){pi=ki;pv=tg[keys[j]]}if(ki>=i&&ki>=0&&ni<0){ni=ki;nv=tg[keys[j]]}}if(pi<0&&ni<0)res.push(null);else if(pi<0)res.push(cp);else if(ni<0)res.push(pv);else if(pi===ni)res.push(pv);else res.push(Math.round(pv+(nv-pv)*((i-pi)/(ni-pi))))}return res}

function processCostFile(f){var rd=new FileReader();rd.onload=function(e){try{var wb=XLSX.read(e.target.result,{type:'array'});var ws=wb.Sheets[wb.SheetNames[0]];var data=XLSX.utils.sheet_to_json(ws,{header:1});if(data.length<2){alert('No data rows found.');return}var hd=[];for(var i=0;i<data[0].length;i++)hd.push(String(data[0][i]||'').toLowerCase().trim());var dI=-1,vI=-1,cI=-1,duI=-1,vaI=-1,lI=-1,rI=-1;for(var i=0;i<hd.length;i++){var h=hd[i];if(h.indexOf('desc')>=0||h.indexOf('item')>=0||h.indexOf('name')>=0||h.indexOf('particular')>=0)dI=i;else if(h.indexOf('vendor')>=0||h.indexOf('supplier')>=0||h.indexOf('contractor')>=0)vI=i;else if((h.indexOf('cost')>=0||h.indexOf('amount')>=0||h.indexOf('base')>=0||h.indexOf('value')>=0)&&cI<0)cI=i;else if(h.indexOf('duty')>=0)duI=i;else if(h.indexOf('vat')>=0||h.indexOf('tax')>=0)vaI=i;else if(h.indexOf('log')>=0||h.indexOf('ship')>=0||h.indexOf('freight')>=0||h.indexOf('transport')>=0)lI=i;else if(h.indexOf('rem')>=0||h.indexOf('note')>=0||h.indexOf('remark')>=0)rI=i}if(dI<0)dI=0;if(vI<0)vI=1;if(cI<0)cI=2;var rows=[];for(var i=1;i<data.length;i++){var row=data[i];if(!row||(!row[dI]&&!row[cI]))continue;var desc=String(row[dI]||'').trim(),vendor=String(row[vI>=0?vI:1]||'').trim(),cost=parseFloat(String(row[cI]||'0').replace(/,/g,''))||0,dut=duI>=0?(parseFloat(String(row[duI]||'0').replace(/,/g,''))||0):0,vat=vaI>=0?(parseFloat(String(row[vaI]||'0').replace(/,/g,''))||0):0,log=lI>=0?(parseFloat(String(row[lI]||'0').replace(/,/g,''))||0):0,rem=rI>=0?String(row[rI]||'').trim():'';if(desc||cost>0)rows.push({desc:desc,vendor:vendor,cost:cost,dut:dut,vat:vat,log:log,rem:rem})}if(!rows.length){alert('No valid data rows found.');return}costUploadData=rows;gi('costFName').textContent=f.name+' ('+rows.length+' rows detected)';gi('costUploadPreview').style.display='block';gi('costUpBtn').disabled=false;gi('costSummary').textContent=rows.length+' items ready to import ('+costUploadMode+' mode)';var pt='<div class="tw" style="max-heigh
