function processCostFile(f) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result, { type:'array' });
      var ws = wb.Sheets[wb.SheetNames[0]];
      var raw = XLSX.utils.sheet_to_json(ws, { header:1 });
      if (raw.length < 2) return;
      var headers = [];
      for (var i = 0; i < raw[0].length; i++) headers.push(String(raw[0][i]||'').toLowerCase().trim());
      var descI=-1, vendI=-1, costI=-1, dutI=-1, vatI=-1, logI=-1, remI=-1;
      for (var i = 0; i < headers.length; i++) {
        var h = headers[i];
        if (h.indexOf('desc') >= 0 && descI < 0) descI = i;
        else if ((h.indexOf('vendor') >= 0 || h.indexOf('supplier') >= 0) && vendI < 0) vendI = i;
        else if (h.indexOf('cost') >= 0 && costI < 0) costI = i;
        else if (h.indexOf('duty') >= 0 && dutI < 0) dutI = i;
        else if (h.indexOf('vat') >= 0 && vatI < 0) vatI = i;
        else if (h.indexOf('log') >= 0 && logI < 0) logI = i;
        else if ((h.indexOf('remark') >= 0 || h.indexOf('note') >= 0) && remI < 0) remI = i;
      }
      if (descI < 0) descI = 0;
      if (vendI < 0) vendI = 1;
      var rows = [];
      for (var i = 1; i < raw.length; i++) {
        var row = raw[i];
        if (!row || (!row[descI] && !row[vendI])) continue;
        rows.push({
          desc: descI >= 0 ? String(row[descI]||'').trim() : '',
          vendor: vendI >= 0 ? String(row[vendI]||'').trim() : '',
          cost: costI >= 0 ? (parseFloat(String(row[costI]||'0').replace(/,/g,'')) || 0) : 0,
          dut: dutI >= 0 ? (parseFloat(String(row[dutI]||'0').replace(/,/g,'')) || 0) : 0,
          vat: vatI >= 0 ? (parseFloat(String(row[vatI]||'0').replace(/,/g,'')) || 0) : 0,
          log: logI >= 0 ? (parseFloat(String(row[logI]||'0').replace(/,/g,'')) || 0) : 0,
          rem: remI >= 0 ? String(row[remI]||'').trim() : ''
        });
      }
      if (!rows.length) { alert('No data rows found'); return; }
      _costUploadData = rows;
      if ($('costFileName')) $('costFileName').textContent = f.name + ' (' + rows.length + ' rows)';
      if ($('costUploadPreview')) $('costUploadPreview').style.display = 'block';
      if ($('costUploadBtn')) $('costUploadBtn').disabled = false;
      if ($('costSummary')) $('costSummary').textContent = rows.length + ' rows ready';
      var pt = '<div class="tw" style="max-height:140px;overflow-y:auto"><table><thead><tr><th>Desc</th><th>Vendor</th><th>Cost</th><th>Duty</th><th>VAT</th></tr></thead><tbody>';
      for (var i = 0; i < Math.min(rows.length, 5); i++) {
        var r = rows[i];
        pt += '<tr><td>' + esc(r.desc) + '</td><td>' + esc(r.vendor) + '</td><td>' + fmtNum(r.cost) + '</td><td>' + fmtNum(r.dut) + '</td><td>' + fmtNum(r.vat) + '</td></tr>';
      }
      if (rows.length > 5) pt += '<tr><td colspan="5" style="text-align:center;color:var(--t3)">...+' + (rows.length - 5) + ' more</td></tr>';
      pt += '</tbody></table></div>';
      if ($('costPreviewTable')) $('costPreviewTable').innerHTML = pt;
    } catch(err) { alert('Error: ' + err.message); }
  };
  reader.readAsArrayBuffer(f);
}

window.executeCostUpload = function() {
  if (!_costUploadData || !_costUploadData.length) return;
  if (!confirm(_costUploadMode === 'replace' ? 'Replace all costs?' : 'Add ' + _costUploadData.length + ' items?')) return;
  if (_costUploadMode === 'replace') DATA.costs = [];
  for (var i = 0; i < _costUploadData.length; i++) {
    var r = _costUploadData[i];
    DATA.costs.push({
      id: ++nextCostId, desc: r.desc, vendor: r.vendor,
      cost: r.cost, dut: r.dut, vat: r.vat, log: r.log, rem: r.rem
    });
  }
  recalcTotals();
  saveAll(); closeModal(); notify(_costUploadData.length + ' items imported'); renderCostTable();
};

window.exportCostTable = function() {
  if (typeof XLSX === 'undefined') return;
  recalcTotals();
  var data = [['#','Description','Vendor','Cost','Duty','VAT','Logistics','Total','Remarks']];
  for (var i = 0; i < DATA.costs.length; i++) {
    var c = DATA.costs[i];
    data.push([i+1, c.desc, c.vendor, c.cost, c.dut, c.vat, c.log, c.total, c.rem]);
  }
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), 'Costs');
  XLSX.writeFile(wb, 'CostTable_' + today() + '.xlsx');
  notify('Exported');
};

// ============================================================
//  VENDORS
// ============================================================
function renderVendors() {
  var vds = vendorList();
  var h = '<div style="margin-bottom:8px"><span class="card-title" style="font-size:.88rem">Vendors</span></div>';
  h += '<div class="vgrid">';
  for (var i = 0; i < vds.length; i++) {
    var v = vds[i];
    var vn = getVendorNote(v);
    var totalCost = 0, totalPaid = 0;
    for (var j = 0; j < DATA.costs.length; j++) {
      if (DATA.costs[j].vendor === v) totalCost += DATA.costs[j].total;
    }
    for (var j = 0; j < DATA.payments.length; j++) {
      if (DATA.payments[j].vendor === v) totalPaid += DATA.payments[j].phpAmount;
    }
    var paidPct = pct(totalPaid, totalCost);
    h += '<div class="vcard"><div class="vcard-name">' + esc(v) + '</div>';
    h += '<div class="vcard-info">' + esc(vn.status) + '</div>';
    h += '<div class="vcard-row"><span>Contract</span><b>' + fmtDisp(totalCost) + '</b></div>';
    h += '<div class="vcard-row"><span>Paid</span><b>' + fmtDisp(totalPaid) + '</b></div>';
    h += '<div class="vcard-row"><span>Progress</span><b>' + paidPct + '%</b></div>';
    h += '<div class="vcard-bar"><div class="vcard-bar-fill" style="width:' + paidPct + '%;background:var(--g)"></div></div>';
    h += '<div style="margin-top:5px"><select onchange="setVendorNote(\'' + esc(v) + '\',\'status\',this.value)" style="font-size:.68rem">';
    h += '<option value="active"' + (vn.status==='active'?' selected':'') + '>Active</option>';
    h += '<option value="completed"' + (vn.status==='completed'?' selected':'') + '>Completed</option>';
    h += '<option value="on-hold"' + (vn.status==='on-hold'?' selected':'') + '>On Hold</option></select></div>';
    h += '<div style="margin-top:3px"><textarea placeholder="Remarks..." rows="2" style="font-size:.68rem" oninput="updateVendorNoteField(this,\'' + esc(v) + '\')">' + esc(vn.remarks) + '</textarea></div>';
    h += '</div>';
  }
  if (!vds.length) h += '<div style="text-align:center;padding:22px;color:var(--t3)">No vendors found in cost data.</div>';
  h += '</div>';
  $('appContent').innerHTML = h;
}

function getVendorNote(v) {
  if (!DATA.vendorNotes[v]) DATA.vendorNotes[v] = { status:'active', remarks:'', _ts:0 };
  return DATA.vendorNotes[v];
}
function setVendorNote(v, field, value) {
  getVendorNote(v)[field] = value;
  getVendorNote(v)._ts = Date.now();
  saveAll();
  if (currentTab === 'vendors') renderVendors();
}
window.updateVendorNoteField = function(el, vendor) {
  getVendorNote(vendor).remarks = el.value;
  localStorage.setItem('ss_vendorNotes', JSON.stringify(DATA.vendorNotes));
  skipCloudSync = true;
  if (window._vnTimer) clearTimeout(window._vnTimer);
  window._vnTimer = setTimeout(function(){ skipCloudSync = false; }, 5000);
};

// ============================================================
//  CURRENCY
// ============================================================
function renderCurrency() {
  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h += '<span class="card-title" style="font-size:.88rem">Currency Converter</span>';
  h += '<button class="btn btn-p btn-xs" onclick="fetchLiveRates()">&#128260; Fetch Live Rates</button></div>';

  // Converter
  h += '<div class="card"><div class="card-header"><span class="card-title">Convert</span>';
  h += liveRatesTime ? '<span style="font-size:.52rem;color:var(--g);font-family:JetBrains Mono">Live: ' + esc(liveRatesTime) + '</span>' : '<span style="font-size:.52rem;color:var(--t3);font-family:JetBrains Mono">Default rates</span>';
  h += '</div>';
  h += '<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:9px;align-items:end">';
  h += '<div class="fg"><label class="fl">From</label><div style="display:flex;gap:5px"><input type="number" id="convAmount" value="' + convAmount + '" step="any" oninput="convAmount=parseFloat(this.value)||0;updateConversion()"><select id="convFrom" onchange="convFrom=this.value;updateConversion()" style="width:75px"><option value="USD"' + (convFrom==='USD'?' selected':'') + '>USD</option><option value="VND"' + (convFrom==='VND'?' selected':'') + '>VND</option><option value="PHP"' + (convFrom==='PHP'?' selected':'') + '>PHP</option></select></div></div>';
  h += '<div style="font-size:1.4rem;text-align:center;padding-bottom:7px;color:var(--bl)">&#8594;</div>';
  h += '<div class="fg"><label class="fl">To</label><div style="display:flex;gap:5px"><input type="text" id="convResult" readonly style="background:var(--s2);font-weight:700"><select id="convTo" onchange="convTo=this.value;updateConversion()" style="width:75px"><option value="USD"' + (convTo==='USD'?' selected':'') + '>USD</option><option value="VND"' + (convTo==='VND'?' selected':'') + '>VND</option><option value="PHP"' + (convTo==='PHP'?' selected':'') + '>PHP</option></select></div></div>';
  h += '</div></div>';

  // Rate table
  h += '<div class="card"><div class="card-header"><span class="card-title">Exchange Rates</span>';
  h += liveRatesTime ? '<span class="badge bg-g">Live</span>' : '<span class="badge bg-x">Default</span>';
  h += '</div><div class="tw"><table><thead><tr><th>From</th><th>To</th><th>Rate</th></tr></thead><tbody>';
  var pairs = [['USD','VND'],['USD','PHP'],['PHP','VND'],['PHP','USD'],['VND','USD'],['VND','PHP']];
  for (var i = 0; i < pairs.length; i++) {
    var f = pairs[i][0], t = pairs[i][1], r = convert(1, f, t);
    h += '<tr><td>' + f + '</td><td>' + t + '</td><td style="font-family:JetBrains Mono;font-weight:600">' + fmtCurrency(r, t) + '</td></tr>';
  }
  h += '</tbody></table></div></div>';

  // Manual override
  h += '<div class="card"><div class="card-header"><span class="card-title">Manual Override</span></div>';
  h += '<div class="row-3">';
  h += '<div class="fg"><label class="fl">USD/VND</label><input type="number" id="manualVND" value="' + FX.VND.rate + '" onchange="FX.VND.rate=parseFloat(this.value)||26307;updateConversion();notify(\'Rate updated\')"></div>';
  h += '<div class="fg"><label class="fl">USD/PHP</label><input type="number" id="manualPHP" value="' + FX.PHP.rate + '" onchange="FX.PHP.rate=parseFloat(this.value)||61.26;updateConversion();notify(\'Rate updated\')"></div>';
  h += '<div style="display:flex;align-items:flex-end"><button class="btn btn-xs" onclick="FX={USD:{rate:1},VND:{rate:26307},PHP:{rate:61.2623}};liveRatesTime=\'\';notify(\'Reset\');renderCurrency()">Reset Defaults</button></div>';
  h += '</div>';
  h += '<div style="margin-top:8px;padding:8px;background:var(--blc);border-radius:var(--r);font-size:.68rem;color:var(--t2)"><b>Tip:</b> Click "Fetch Live Rates" for real-time rates. <a href="https://www.google.com/finance/quote/USD-VND" target="_blank" style="color:var(--bl)">Google Finance</a></div></div>';

  $('appContent').innerHTML = h;
  updateConversion();
}

window.fetchLiveRates = function() {
  notify('Fetching rates...');
  fetch('https://api.exchangerate-api.com/v4/latest/USD')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.rates) {
        if (data.rates.VND) FX.VND.rate = data.rates.VND;
        if (data.rates.PHP) FX.PHP.rate = data.rates.PHP;
        liveRatesTime = new Date().toLocaleString();
        notify('Rates updated!');
        renderCurrency();
      } else { notify('No rate data'); }
    })
    .catch(function() { notify('Could not fetch rates'); });
};
window.updateConversion = function() {
  var el = $('convResult');
  if (el) el.value = fmtCurrency(convert(convAmount, convFrom, convTo), convTo);
};

// ============================================================
//  CLOUD SETTINGS
// ============================================================
function renderCloud() {
  var config;
  try { config = JSON.parse(localStorage.getItem('ss_cloud')); } catch(e) {}
  if (!config) config = { apiKey:'', databaseURL:'', projectId:'' };

  var h = '<div style="margin-bottom:8px"><span class="card-title" style="font-size:.88rem">Cloud Sync (Firebase)</span></div>';
  h += '<div class="card">';
  h += '<div class="fg"><label class="fl">API Key</label><input type="text" id="cloudApiKey" value="' + esc(config.apiKey || '') + '"></div>';
  h += '<div class="fg"><label class="fl">Database URL</label><input type="text" id="cloudDbUrl" value="' + esc(config.databaseURL || '') + '"></div>';
  h += '<div class="fg"><label class="fl">Project ID</label><input type="text" id="cloudProjectId" value="' + esc(config.projectId || '') + '"></div>';
  h += '<div style="display:flex;gap:5px;justify-content:flex-end;margin-top:8px">';
  h += '<button class="btn btn-r" onclick="clearCloudConfig()">Clear</button>';
  h += '<button class="btn btn-p" onclick="saveCloudConfig()">Connect</button></div>';
  h += '<div style="margin-top:10px;padding:7px;background:var(--s2);border-radius:var(--r);font-size:.68rem;color:var(--t2)">';
  h += '<b>Status:</b> ' + (cloudConnected ? '<span style="color:var(--g)">Connected</span>' : '<span style="color:var(--t3)">Not connected</span>');
  if (currentUser) h += ' &bull; ' + esc(currentUser.email);
  h += '<br><br>Firebase project needs Realtime Database + Email/Password authentication enabled.</div>';
  h += '</div>';
  $('appContent').innerHTML = h;
}

window.saveCloudConfig = function() {
  var config = {
    apiKey: $('cloudApiKey').value.trim(),
    databaseURL: $('cloudDbUrl').value.trim(),
    projectId: $('cloudProjectId').value.trim()
  };
  if (!config.databaseURL) { alert('Database URL is required'); return; }
  localStorage.setItem('ss_cloud', JSON.stringify(config));
  notify('Saved. Reloading...');
  setTimeout(function(){ location.reload(); }, 800);
};
window.clearCloudConfig = function() {
  if (!confirm('Clear cloud configuration?')) return;
  localStorage.removeItem('ss_cloud');
  notify('Cleared'); location.reload();
};

// ============================================================
//  EXPORT ALL
// ============================================================
window.exportAll = function() {
  if (typeof XLSX === 'undefined') return;
  var wb = XLSX.utils.book_new();

  // Tasks
  var taskData = [['WBS','Task','Category','Duration','Start','End','Progress','Status']];
  for (var i = 0; i < DATA.tasks.length; i++) {
    var t = DATA.tasks[i];
    taskData.push([t.wbs, t.name, t.cat, t.dur, t.s, t.e, t.prog, t.st]);
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(taskData), 'Tasks');

  // Costs
  recalcTotals();
  var costData = [['#','Description','Vendor','Cost','Duty','VAT','Logistics','Total','Remarks']];
  for (var i = 0; i < DATA.costs.length; i++) {
    var c = DATA.costs[i];
    costData.push([i+1, c.desc, c.vendor, c.cost, c.dut, c.vat, c.log, c.total, c.rem]);
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(costData), 'Costs');

  // Payments
  var payData = [['#','Date','Vendor','Amount','Currency','PHP','Fund','Category','Remarks']];
  for (var i = 0; i < DATA.payments.length; i++) {
    var p = DATA.payments[i];
    payData.push([i+1, p.date, p.vendor, p.amount, p.currency, p.phpAmount, p.fund, p.category, p.remarks]);
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(payData), 'Payments');

  XLSX.writeFile(wb, 'StellarSeids_' + today() + '.xlsx');
  notify('Exported');
};

initCloud();
checkAuth();
