<div id="loginScr" style="display:none"><div class="lcard"><div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center"><div class="logo-ic" style="width:40px;height:40px"></div><div class="logo-txt"><span class="logo-nm" style="font-size:1.1rem">Stellar Seeds</span><span class="logo-sb">Construction Management</span></div></div><div style="font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:4px" id="lTitle">Sign In</div><div style="font-size:.72rem;color:var(--t3);text-align:center;margin-bottom:20px" id="lSub">Enter your credentials</div><div class="lerr" id="lErr"></div><div class="lok" id="lOk"></div><div class="fg"><label class="fl">Email</label><input type="text" id="lEmail" placeholder="you@company.com"></div><div class="fg"><label class="fl">Password</label><input type="password" id="lPass" placeholder="Password"></div><button class="btn bp" style="width:100%;padding:10px;font-size:.82rem;margin-top:6px" id="lBtn" onclick="doLogin()">Sign In</button><div style="text-align:center;margin-top:14px;font-size:.74rem;color:var(--t3)" id="lTog">No account? <a style="color:var(--g);font-weight:600" onclick="togAuth()">Sign Up</a></div><div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--b2);text-align:center"><a style="font-size:.68rem;color:var(--t3);text-decoration:underline" onclick="skipAuth()">Continue without login</a></div></div></div>

<script>

var ST={observation:{l:'Observation',b:'bb2'},'near-miss':{l:'Near Miss',b:'by2'},'first-aid':{l:'First Aid',b:'by2'},recordable:{l:'Recordable',b:'bd2'},lti:{l:'Lost Time',b:'bd2'},toolbox:{l:'Toolbox Talk',b:'bg2'},training:{l:'Training',b:'bg2'},audit:{l:'Audit',b:'bb2'}};

function $i(id){return document.getElementById(id)}

function dd(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function fmtN(v){if(!v||v===0)return'0';return Number(v).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}

function siteGantt(){var GS=new Date(2026,0,1),ppd=3;function dPx(ds){var p=ds.split('-');return Math.round((new Date(+p[0],+p[1]-1,+p[2])-GS)/86400000)*ppd}var sc2={done:'var(--g)',active:'var(--bl)',pending:'#999'};var oa=oProg(),m=mainT();var mo=[];for(var i=0;i<14;i++){var yr=i<12?2026:2027,mi=i<12?i:i-12,d1=new Date(yr,mi,1),d2=new Date(yr,mi+1,1);mo.push({l:d1.toLocaleString('en',{month:'short',year:'2-digit'}),lp:dPx(yr+'-'+String(mi+1).padStart(2,'0')+'-01'),lw:Math.round((d2-d1)/86400000)*ppd})}var h='<div class="card" style="border-left:4px solid var(--bl)"><div class="ch"><span class="ct">Site Gantt</span><span style="font-family:JetBrains Mono;font-size:.6rem;color:var(--t3)">'+D.tasks.length+' tasks &bull; '+oa+'%</span></div></div>';h+='<div class="gw"><div class="ghdr"><div class="ghdr-l">WBS</div><div class="ghdr-m">';for(var i=0;i<mo.length;i++)h+='<div class="gmo" style="left:'+mo[i].lp+'px;width:'+mo[i].lw+'px">'+mo[i].l+'</div>';var tPx=dPx(td());if(tPx>0)h+='<div class="gtd" style="left:'+tPx+'px"></div>';h+='</div></div>';for(var gi2=0;gi2<m.length;gi2++){var g=m[gi2],gw=wavg(g.wbs),gc=gw>=80?'var(--g)':gw>=40?'var(--or)':gw>0?'var(--bl)':'var(--t3)';h+='<div class="gmain"><span>'+H(g.wbs)+' '+H(g.name)+'</span><span class="gmp" style="background:'+(gw>=80?'var(--gc)':gw>=40?'var(--orc)':'var(--blc)')+';color:'+gc+'">'+gw+'%</span></div>';var ch=[];for(var i=0;i<D.tasks.length;i++){if(D.tasks[i].wbs.indexOf(g.wbs+'.')===0&&D.tasks[i].wbs!==g.wbs)ch.push(i)}if(!ch.length){var lx=dPx(g.s),wx=Math.max(4,g.dur*ppd);h+='<div class="grow" onclick="edG('+gi2+')"><div class="glbl"><span class="wb">'+H(g.wbs)+'</span><span>'+H(g.name)+'</span></div><div class="gba"><div class="gbar" style="left:'+lx+'px;width:'+wx+'px;background:'+(sc2[g.st]||'#999')+'"><div class="gfill" style="width:'+g.prog+'%"></div>'+(wx>38?g.prog+'%':'')+'</div></div></div>'}else{for(var cj=0;cj<ch.length;cj++){var idx=ch[cj],t=D.tasks[idx],lx2=dPx(t.s),wx2=Math.max(4,t.dur*ppd);h+='<div class="grow" onclick="edG('+idx+')"><div class="glbl"><span class="wb">'+H(t.wbs)+'</span><span>'+H(t.name)+'</span></div><div class="gba"><div class="gbar" style="left:'+lx2+'px;width:'+wx2+'px;background:'+(sc2[t.st]||'#999')+'"><div class="gfill" style="width:'+t.prog+'%"></div>'+(wx2>38?t.prog+'%':'')+'</div></div></div>'}}}h+='</div>';return h}
function vendorGantt(vendor){var vg=D.vgc[vendor];if(!vg)return'<div class="card">Not found.</div>';var tasks=vg.tasks||[];var h='<div class="card" style="border-left:4px solid var(--pu)"><div class="ch"><span class="ct" style="color:var(--pu)">'+H(vendor)+'</span><span style="font-family:JetBrains Mono;font-size:.6rem;color:var(--t3)">'+tasks.length+' tasks</span></div></div>';if(vg.image){if(!imgZoom[vendor])imgZoom[vendor]=1;var z=imgZoom[vendor];h+='<div class="card"><div class="ch"><span class="ct">Schedule</span><div style="display:flex;gap:4px"><button class="btn bs" onclick="zoomImg(\''+H(vendor)+'\',-0.25)">-</button><span style="font-family:JetBrains Mono;font-size:.6rem;color:var(--t3)">'+Math.round(z*100)+'%</span><button class="btn bs" onclick="zoomImg(\''+H(vendor)+'\',0.25)">+</button><button class="btn bs" onclick="zoomImg(\''+H(vendor)+'\',0,1)">Reset</button></div></div><div class="zoom-wrap"><img src="'+vg.image+'" style="transform:scale('+z+');transform-origin:top left;max-width:none;display:block"></div></div>'}if(!vg.image)h+='<div class="card"><div class="dropzone" onclick="$i(\'vgF\').click()" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="vgDrop(event,\''+H(vendor)+'\')"><div style="font-size:1.3rem">&#128202;</div><div style="font-size:.76rem;color:var(--t2)">Upload</div><input type="file" id="vgF" accept="image/*" style="display:none" onchange="vgProc(this,\''+H(vendor)+'\')"></div></div>';if(tasks.length){var GS=new Date(2026,0,1),ppd=3;function dPx(ds){var p=ds.split('-');return Math.round((new Date(+p[0],+p[1]-1,+p[2])-GS)/86400000)*ppd}var mo=[];for(var i=0;i<14;i++){var yr=i<12?2026:2027,mi=i<12?i:i-12,d1=new Date(yr,mi,1),d2=new Date(yr,mi+1,1);mo.push({l:d1.toLocaleString('en',{month:'short',year:'2-digit'}),lp:dPx(yr+'-'+String(mi+1).padStart(2,'0')+'-01'),lw:Math.round((d2-d1)/86400000)*ppd})}h+='<div class="card"><div class="gw"><div class="ghdr"><div class="ghdr-l">#</div><div class="ghdr-m">';for(var i=0;i<mo.length;i++)h+='<div class="gmo" style="left:'+mo[i].lp+'px;width:'+mo[i].lw+'px">'+mo[i].l+'</div>';var tPx=dPx(td());if(tPx>0)h+='<div class="gtd" style="left:'+tPx+'px"></div>';h+='</div></div>';for(var i=0;i<tasks.length;i++){var t=tasks[i],dur=dd(t.s,t.e),lx=dPx(t.s),wx=Math.max(4,dur*ppd),bc=t.prog>=80?'var(--g)':t.prog>=40?'var(--or)':t.prog>0?'var(--bl)':'#999';h+='<div class="grow" onclick="edVGT(\''+H(vendor)+'\','+i+')"><div class="glbl"><span class="wb">'+(i+1)+'</span><span>'+H(t.name)+'</span></div><div class="gba"><div class="gbar" style="left:'+lx+'px;width:'+wx+'px;background:'+bc+'"><div class="gfill" style="width:'+t.prog+'%"></div>'+(wx>38?t.prog+'%':'')+'</div></div></div>'}h+='</div></div>'}return h}

// ===================== S-CURVE (Enhanced with Risk & Scenario Analysis) =====================
function showSCurve(){cTot();var m=mainT(),oa=oProg(),tdD=new Date(td()),tDur=0;for(var i=0;i<m.length;i++)tDur+=m[i].dur;if(!tDur){$i('app').innerHTML='<div class="card">No tasks</div>';return}var months=[],planned=[],actual=[],monthDates=[];for(var mi=0;mi<14;mi++){var yr=mi<12?2026:2027,mo=mi<12?mi:mi-12,me=new Date(yr,mo+1,0);months.push(new Date(yr,mo,1).toLocaleString('en',{month:'short',year:'2-digit'}));monthDates.push(me);var mp=0,ma=0;for(var j=0;j<m.length;j++){var t=m[j],w=t.dur/tDur,ts=new Date(t.s),te=new Date(t.e),pc=me>=te?1:me>=ts?Math.min(1,(me-ts)/Math.max(1,te-ts)):0;mp+=w*pc;var ac=0;if(t.prog>=100){if(me>=te)ac=1;else if(me>=ts)ac=Math.min(1,(me-ts)/Math.max(1,te-ts))}else if(me<=tdD&&me>=ts){ac=(t.prog/100)*Math.min(1,(me-ts)/Math.max(1,tdD-ts))}else if(me>tdD){ac=t.prog/100}ma+=w*ac}planned.push(Math.round(mp*100));actual.push(Math.round(ma*100))}var pNow=0;for(var i=0;i<months.length;i++){if(monthDates[i]>=tdD){pNow=planned[i];break}}var vr=oa-pNow,vrC=vr>=0?'var(--g)':'var(--rd)';

var h='<div style="margin-bottom:10px"><span class="ct" style="font-size:.92rem">S-Curve Analysis</span></div>';
h+='<div class="stats"><div class="si" style="border-left:4px solid var(--g)"><div class="sl">Actual Progress</div><div class="sv" style="color:var(--g)">'+oa+'%</div></div><div class="si" style="border-left:4px solid var(--bl)"><div class="sl">Planned Progress</div><div class="sv" style="color:var(--bl)">'+pNow+'%</div></div><div class="si" style="border-left:4px solid '+vrC+'"><div class="sl">Variance</div><div class="sv" style="color:'+vrC+'">'+(vr>=0?'+':'')+vr+'%</div></div><div class="si" style="border-left:4px solid var(--am)"><div class="sl">Tasks</div><div class="sv">'+D.tasks.length+'</div><div class="sn">'+mainT().length+' main</div></div></div>';
h+='<div class="card"><div class="ch"><span class="ct">Progress Trend</span></div><canvas id="scC" width="900" height="320" style="width:100%;height:auto;display:block"></canvas></div>';

// Risk & Scenario Analysis
var spi=pNow>0?(oa/pNow):1;
var riskLvl,riskBg,riskC;
if(spi>=0.95){riskLvl='LOW';riskBg='var(--gc)';riskC='var(--g)'}
else if(spi>=0.85){riskLvl='MEDIUM';riskBg='var(--orc)';riskC='var(--or)'}
else{riskLvl='HIGH';riskBg='var(--rdc)';riskC='var(--rd)'}
var remainPct=100-oa;
var avgMonthlyRate=oa>0?oa/Math.max(1,dd(m[0].s,td())/30):0.5;
var optRate=avgMonthlyRate*1.15,baseRate=Math.max(avgMonthlyRate,0.1),pessRate=Math.max(avgMonthlyRate*0.75,0.05);
var optMonths=remainPct/optRate,baseMonths=remainPct/baseRate,pessMonths=remainPct/pessRate;
var optDate=addD(td(),Math.round(optMonths*30)),baseDate=addD(td(),Math.round(baseMonths*30)),pessDate=addD(td(),Math.round(pessMonths*30));
var projDays=0;for(var i=0;i<m.length;i++)projDays+=m[i].dur;
var projEnd=addD(m[0].s,projDays);

h+='<div class="row2"><div class="card"><div class="ch"><span class="ct">Risk Assessment</span></div>';
h+='<div style="text-align:center;padding:14px;background:'+riskBg+';border-radius:var(--r);margin-bottom:10px"><div style="font-size:.6rem;text-transform:uppercase;color:'+riskC+';font-family:JetBrains Mono;letter-spacing:.1em">Overall Risk Level</div><div style="font-family:Space Grotesk;font-size:1.8rem;font-weight:700;color:'+riskC+'">'+riskLvl+'</div></div>';
h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
h+='<div style="padding:8px;background:var(--s2);border-radius:var(--r);text-align:center"><div style="font-size:.52rem;color:var(--t3);font-family:JetBrains Mono;letter-spacing:.05em">SPI</div><div style="font-family:Space Grotesk;font-size:1.1rem;font-weight:700;color:'+(spi>=1?'var(--g)':spi>=0.9?'var(--or)':'var(--rd)')+'">'+spi.toFixed(2)+'</div></div>';
h+='<div style="padding:8px;background:var(--s2);border-radius:var(--r);text-align:center"><div style="font-size:.52rem;color:var(--t3);font-family:JetBrains Mono;letter-spacing:.05em">Variance</div><div style="font-family:Space Grotesk;font-size:1.1rem;font-weight:700;color:'+vrC+'">'+(vr>=0?'+':'')+vr+'%</div></div>';
h+='<div style="padding:8px;background:var(--s2);border-radius:var(--r);text-align:center"><div style="font-size:.52rem;color:var(--t3);font-family:JetBrains Mono;letter-spacing:.05em">Planned End</div><div style="font-family:JetBrains Mono;font-size:.78rem;font-weight:600">'+projEnd+'</div></div>';
h+='<div style="padding:8px;background:var(--s2);border-radius:var(--r);text-align:center"><div style="font-size:.52rem;color:var(--t3);font-family:JetBrains Mono;letter-spacing:.05em">Remaining</div><div style="font-family:Space Grotesk;font-size:1.1rem;font-weight:700">'+remainPct+'%</div></div>';
h+='</div></div>';

h+='<div class="card"><div class="ch"><span class="ct">Scenario Analysis</span></div>';
var scData=[{n:'Optimistic',d:optDate,c:'var(--g)',bg:'var(--gc)',icon:'&#9650;',desc:'Pace improves 15%'},{n:'Baseline',d:baseDate,c:'var(--bl)',bg:'var(--blc)',icon:'&#9654;',desc:'Current pace continues'},{n:'Pessimistic',d:pessDate,c:'var(--rd)',bg:'var(--rdc)',icon:'&#9660;',desc:'Pace declines 25%'}];
for(var i=0;i<scData.length;i++){var s=scData[i];h+='<div style="display:flex;align-items:center;gap:10px;padding:10px;background:'+s.bg+';border-radius:var(--r);margin-bottom:6px;border-left:3px solid '+s.c+'"><div style="font-size:1.1rem;color:'+s.c+'">'+s.icon+'</div><div style="flex:1"><div style="font-weight:700;font-size:.78rem;color:'+s.c+'">'+s.n+'</div><div style="font-size:.64rem;color:var(--t3)">'+s.desc+'</div></div><div style="text-align:right"><div style="font-family:JetBrains Mono;font-size:.76rem;font-weight:700;color:'+s.c+'">'+s.d+'</div><div style="font-family:JetBrains Mono;font-size:.56rem;color:var(--t3)">'+Math.round(dd(td(),s.d)/30)+'mo</div></div></div>'}

function showCloud(){var c;try{c=JSON.parse(localStorage.getItem('ss_cloud'))}catch(e){}if(!c)c={apiKey:'',databaseURL:'',projectId:''};var h='<div style="margin-bottom:10px"><span class="ct" style="font-size:.92rem">Cloud Sync</span></div>';h+='<div class="card"><div class="ch"><span class="ct">Firebase Configuration</span></div>';h+='<div class="fg"><label class="fl">API Key</label><input type="text" id="cApiKey" value="'+H(c.apiKey||'')+'" placeholder="AIza..."></div>';h+='<div class="fg"><label class="fl">Database URL</label><input type="text" id="cDbUrl" value="'+H(c.databaseURL||'')+'" placeholder="https://xxx.firebaseio.com"></div>';h+='<div class="fg"><label class="fl">Project ID</label><input type="text" id="cPid" value="'+H(c.projectId||'')+'" placeholder="my-project"></div>';h+='<div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px"><button class="btn" onclick="clearCloud()">Clear</button><button class="btn bp" onclick="saveCloud()">Save & Connect</button></div>';h+='<div style="margin-top:10px;padding:8px;background:var(--s2);border-radius:var(--r);font-size:.72rem;color:var(--t2)">';h+='<b>Status:</b> '+(cOn?'<span style="color:var(--g)">Connected</span>':'<span style="color:var(--t3)">Not connected</span>');if(curUser)h+=' &bull; <span style="color:var(--bl)">'+H(curUser.email)+'</span>';h+='<br><br>To set up: Create a Firebase project, enable Realtime Database and Authentication (Email/Password), then paste your config above.';h+='</div></div>';$i('app').innerHTML=h}
window.saveCloud=function(){var c={apiKey:$i('cApiKey').value.trim(),databaseURL:$i('cDbUrl').value.trim(),projectId:$i('cPid').value.trim()};if(!c.databaseURL){alert('Database URL required');return}localStorage.setItem('ss_cloud',JSON.stringify(c));notify('Saved. Reloading...');setTimeout(function(){location.reload()},800)};
window.clearCloud=function(){if(!confirm('Clear cloud config?'))return;localStorage.removeItem('ss_cloud');notify('Cleared');location.reload()};

window.expAll=function(){if(typeof XLSX==='undefined')return;var wb=XLSX.utils.book_new();var td2=[['WBS','Task','Cat','Dur','Start','End','Prog','Status']];for(var i=0;i<D.tasks.length;i++){var t=D.tasks[i];td2.push([t.wbs,t.name,t.cat,t.dur,t.s,t.e,t.prog,t.st])}XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(td2),'Tasks');cTot();var cd=[['#','Description','Vendor','Cost','Duty','VAT','Logistics','Total','Remarks']];for(var i=0;i<D.costs.length;i++){var c=D.costs[i];cd.push([i+1,c.desc,c.vendor,c.cost,c.dut,c.vat,c.log,c.total,c.rem])}XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(cd),'Costs');var pd=[['#','Date','Vendor','Amount','Currency','PHP','Fund','Category','Remarks']];for(var i=0;i<D.pays.length;i++){var p=D.pays[i];pd.push([i+1,p.date,p.vendor,p.amt,p.cur,p.aphp,p.fund,p.category,p.rem])}XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(pd),'Payments');XLSX.writeFile(wb,'StellarSeeds_All_'+td()+'.xlsx');notify('Exported all')};
