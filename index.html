<body>
<div id="loginScr" style="display:none"><div class="lcard"><div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center"><div class="logo-ic" style="width:40px;height:40px"></div><div class="logo-txt"><span class="logo-nm" style="font-size:1.1rem">Stellar Seeds</span><span class="logo-sb">Construction Management</span></div></div><div style="font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:4px" id="lTitle">Sign In</div><div style="font-size:.72rem;color:var(--t3);text-align:center;margin-bottom:20px" id="lSub">Enter your credentials</div><div class="lerr" id="lErr"></div><div class="lok" id="lOk"></div><div class="fg"><label class="fl">Email</label><input type="text" id="lEmail" placeholder="you@company.com"></div><div class="fg"><label class="fl">Password</label><input type="password" id="lPass" placeholder="Password"></div><button class="btn bp" style="width:100%;padding:10px;font-size:.82rem;margin-top:6px" id="lBtn" onclick="doLogin()">Sign In</button><div style="text-align:center;margin-top:14px;font-size:.74rem;color:var(--t3)" id="lTog">No account? <a style="color:var(--g);font-weight:600" onclick="togAuth()">Sign Up</a></div><div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--b2);text-align:center"><a style="font-size:.68rem;color:var(--t3);text-decoration:underline" onclick="skipAuth()">Continue without login</a></div></div></div>

<script>

var ST={observation:{l:'Observation',b:'bb2'},'near-miss':{l:'Near Miss',b:'by2'},'first-aid':{l:'First Aid',b:'by2'},recordable:{l:'Recordable',b:'bd2'},lti:{l:'Lost Time',b:'bd2'},toolbox:{l:'Toolbox Talk',b:'bg2'},training:{l:'Training',b:'bg2'},audit:{l:'Audit',b:'bb2'}};

function fmtN(v){if(!v||v===0)return'0';return Number(v).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}

function showSCurve(){cTot();var m=mainT(),oa=oProg(),tdD=new Date(td()),tDur=0;for(var i=0;i<m.length;i++)tDur+=m[i].dur;if(!tDur){$i('app').innerHTML='<div class="card">No tasks</div>';return}var months=[],planned=[],actual=[],monthDates=[];for(var mi=0;mi<14;mi++){var yr=mi<12?2026:2027,mo=mi<12?mi:mi-12,me=new Date(yr,mo+1,0);months.push(new Date(yr,mo,1).toLocaleString('en',{month:'short',year:'2-digit'}));monthDates.push(me);var mp=0,ma=0;for(var j=0;j<m.length;j++){var t=m[j],w=t.dur/tDur,ts=new Date(t.s),te=new Date(t.e),pc=me>=te?1:me>=ts?Math.min(1,(me-ts)/Math.max(1,te-ts)):0;mp+=w*pc;var ac=0;if(t.prog>=100){if(me>=te)ac=1;else if(me>=ts)ac=Math.min(1,(me-ts)/Math.max(1,te-ts))}else if(me<=tdD&&me>=ts){ac=(t.prog/100)*Math.min(1,(me-ts)/Math.max(1,tdD-ts))}else if(me>tdD){ac=t.prog/100}ma+=w*ac}planned.push(Math.round(mp*100));actual.push(Math.round(ma*100))}var pNow=0;for(var i=0;i<months.length;i++){if(monthDates[i]>=tdD){pNow=planned[i];break}}var vr=oa-pNow,vrC=vr>=0?'var(--g)':'var(--rd)';var h='<div style="margin-bottom:10px"><span class="ct" style="font-size:.92rem">S-Curve</span></div><div class="stats"><div class="si" style="border-left:4px solid var(--g)"><div class="sl">Actual</div><div class="sv" style="color:var(--g)">'+oa+'%</div></div><div class="si" style="border-left:4px solid var(--bl)"><div class="sl">Planned</div><div class="sv" style="color:var(--bl)">'+pNow+'%</div></div><div class="si" style="border-left:4px solid '+vrC+'"><div class="sl">Variance</div><div class="sv" style="color:'+vrC+'">'+(vr>=0?'+':'')+vr+'%</div></div></div><div class="card"><div class="ch"><span class="ct">Progress Trend</span></div><canvas id="scC" width="900" height="320" style="width:100%;height:auto;display:block"></canvas></div>';$i('app').innerHTML=h;drawSCurveChart(planned,actual,months,tdD)}

window.doCv=function(){cvA=parseFloat($i('cvA').value)||0;cvF=$i('cvF').value;cvT=$i('cvT').value;showCur()};
function showCloud(){var cfg;try{cfg=JSON.parse(localStorage.getItem('ss_cloud'))}catch(e){}var h='<div style="margin-bottom:10px"><span class="ct">Cloud Sync</span> '+(cOn?'<span class="badge bg2">Configured</span>':'<span class="badge bx2">Not Configured</span>')+'</div>';if(curUser)h+='<div class="card" style="border-left:3px solid var(--g)"><div style="font-size:.76rem;font-weight:600;color:var(--g)">Signed in: '+H(curUser.email)+'</div></div>';if(cOn)h+='<div class="card"><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn bp" onclick="forceSync()">Pull</button><button class="btn bb" onclick="pushToCloud()">Push</button><button class="btn bu" onclick="runDiag()">Diagnostic</button><button class="btn bd" onclick="localStorage.removeItem(\'ss_cloud\');location.reload()">Disconnect</button></div></div>';h+='<div class="card"><div class="ch"><span class="ct">'+(cOn?'Reconfigure':'Setup')+'</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">API Key</label><input type="text" id="cfgK" value="'+(cfg?H(cfg.apiKey):'')+'"></div><div class="fg"><label class="fl">Database URL</label><input type="text" id="cfgU" value="'+(cfg?H(cfg.databaseURL):'')+'"></div><div class="fg"><label class="fl">Project ID</label><input type="text" id="cfgP" value="'+(cfg?H(cfg.projectId):'')+'"></div><div class="fg" style="display:flex;align-items:flex-end"><button class="btn bp" onclick="doConnect()">Connect</button></div></div></div>';h+='<div class="card" style="border-left:4px solid var(--rd)"><div class="ch"><span class="ct" style="color:var(--rd)">Fix Permission Denied</span></div><div style="font-size:.74rem;color:var(--t2);line-height:1.8"><b>1.</b> <a href="https://console.firebase.google.com" target="_blank" style="color:var(--bl)">Firebase Console</a> > Realtime Database > Rules<br><b>2.</b> Replace with: <code style="background:#1e1e2e;color:#d4d4d4;padding:2px 6px;border-radius:3px;font-size:.7rem">{"rules":{"ss":{".read":"auth != null",".write":"auth != null"}}}</code><br><b>3.</b> Publish</div></div>';$i('app').innerHTML=h}
window.forceSync=function(){if(!db){notify('Not configured');return}setDot('wr');db.ref('ss').once('value').then(function(snap){var val=snap.val();if(!val){notify('Empty');return}var ch=false;['tasks','costs','pays','upds','vgc','psch'].forEach(function(k){if(val[k]!==undefined&&val[k]!==null){D[k]=val[k];localStorage.setItem('ss_'+k,JSON.stringify(val[k]));ch=true}});if(mergeVnFromCloud(val.vn))ch=true;if(mergeSafetyFromCloud(val.safety))ch=true;cTot();doRender();setDot('on');setLbl('Synced');notify(ch?'Pulled':'Current');setupLiveSync()}).catch(function(e){setDot('err');notify('Failed: '+e.message)})};
window.pushToCloud=function(){if(!db||!confirm('Push all to cloud?'))return;var u={};u['ss/tasks']=D.tasks;u['ss/costs']=D.costs;u['ss/pays']=D.pays;u['ss/upds']=D.upds;u['ss/safety']=D.safety;u['ss/vgc']=D.vgc;u['ss/vn']=D.vn;u['ss/psch']=D.psch;u['ss/_ts']=Date.now();db.ref().update(u).then(function(){setDot('on');setLbl('Synced');notify('Pushed');setupLiveSync()}).catch(function(e){notify('Failed: '+e.message)})};
window.runDiag=function(){if(!db){alert('Not configured');return}var l=['=== DIAGNOSTIC ===','db:'+(db?'YES':'NO'),'user:'+(curUser?curUser.email:'none'),'tasks:'+D.tasks.length,'costs:'+D.costs.length,'psch:'+D.psch.length,''];db.ref('ss/_ts').once('value').then(function(s){l.push('Read: OK');return db.ref('ss/_diag').set(Date.now())}).then(function(){l.push('Write: OK');l.push('ALL PASSED');alert(l.join('\n'))}).catch(function(e){l.push('ERROR: '+e.message);alert(l.join('\n'))})};
window.doConnect=function(){var k=$i('cfgK').value.trim(),u=$i('cfgU').value.trim();if(!k||!u){alert('Required');return}localStorage.setItem('ss_cloud',JSON.stringify({apiKey:k,databaseURL:u,projectId:$i('cfgP').value.trim()||''}));location.reload()};
window.expAll=function(){if(typeof XLSX==='undefined')return;cTot();recalcPSBal();var cs=costS();var d1=[['CURRENCY: '+DC],[],['DESCRIPTION','VENDOR','TOTAL','REMARKS']];for(var i=0;i<D.costs.length;i++){var c=D.costs[i];d1.push([c.desc,c.vendor,c.total,c.rem])}d1.push(['TOTAL','','',cs.tc]);var d2=[['WBS','Task','Cat','Dur','Start','End','%','Status']];for(var i=0;i<D.tasks.length;i++){var t=D.tasks[i];d2.push([t.wbs,t.name,t.cat,t.dur,t.s,t.e,t.prog+'%',t.st])};var d4=[['#','Date','Vendor','Billing%','Total VND','Cash Out USD','Cash In USD','Payment From','Status','Running Bal','Classification','Remarks']];for(var i=0;i<D.psch.length;i++){var r=D.psch[i];d4.push([i+1,r.date,r.vendor,r.billingRate+'%',r.totalVND,r.cashOut||'',r.cashIn||'',r.payFrom,r.status,r.runningBal,r.classification,r.remarks])};var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d1),'Costs');XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d2),'Tasks');XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d4),'Pay Schedule');XLSX.writeFile(wb,'StellarSeeds_'+td()+'.xlsx');notify('Exported')};
load();cTot();
for(var i=0;i<D.tasks.length;i++){var wid=parseFloat(D.tasks[i].wbs);if(!isNaN(wid)&&wid>nT)nT=wid}
for(var i=0;i<D.costs.length;i++)if(D.costs[i].id>nC)nC=D.costs[i].id;

for(var i=0;i<D.photos.length;i++)if(D.photos[i].id>nPH)nPH=D.photos[i].id;
for(var i=0;i<D.psch.length;i++)if(D.psch[i].id>nPS)nPS=D.psch[i].id;
