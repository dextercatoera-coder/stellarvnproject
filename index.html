<html lang="en">

<title>Stellar Seeds Vietnam</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--s1:#fff;--s2:#faf9f6;--s3:#eeece7;--b1:#e0ded8;--b2:#ece9e3;--g:#2d8a32;--gb:#3da642;--gc:rgba(45,138,50,.08);--bl:#2874a6;--blc:rgba(40,116,166,.08);--am:#b89630;--amc:rgba(184,150,48,.08);--rd:#cc3333;--rdc:rgba(204,51,51,.08);--or:#d4930d;--orc:rgba(212,147,13,.08);--pu:#9b59b6;--puc:rgba(155,89,182,.08);--t1:#1a1c18;--t2:#555;--t3:#999;--r:6px;--rl:10px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);line-height:1.5;font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}a{cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
.hdr{height:52px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:32px;height:32px;background:linear-gradient(135deg,var(--g),#1a5c20);border-radius:var(--r);position:relative}
.logo-ic::after{content:'';position:absolute;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.9);border-radius:50%;top:5px;left:5px}
.logo-txt{display:flex;flex-direction:column;line-height:1}
.logo-nm{font-family:'Cormorant Garamond',serif;font-size:.88rem;font-weight:700;color:var(--am);letter-spacing:.18em;text-transform:uppercase}
.logo-sb{font-family:'JetBrains Mono',monospace;font-size:.38rem;color:var(--t3);letter-spacing:.08em;text-transform:uppercase}
.hdr-r{display:flex;align-items:center;gap:8px}
.hdr-usr{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--bl);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.dot.on{background:var(--g);box-shadow:0 0 6px rgba(45,138,50,.4)}.dot.off{background:var(--b1)}.dot.wr{background:var(--or);animation:pls .8s ease infinite}.dot.err{background:var(--rd)}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.4}}
.dot-lb{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--t3);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn{font-weight:600;font-size:.72rem;padding:5px 12px;border-radius:var(--r);border:1px solid var(--b1);background:var(--s1);color:var(--t1);transition:all .12s;white-space:nowrap}.btn:hover{background:var(--s3)}
.bp{background:var(--g);border-color:var(--g);color:#fff}.bp:hover{background:var(--gb)}
.bd{border-color:var(--rd);color:var(--rd)}.bs{padding:3px 8px;font-size:.66rem}
.bb{background:var(--bl);border-color:var(--bl);color:#fff}
.nav{background:var(--s1);border-bottom:1px solid var(--b1);display:flex;padding:0 12px;overflow-x:auto;position:sticky;top:52px;z-index:99}
.nav button{background:0;border:0;padding:8px 10px;font-size:.74rem;font-weight:600;color:var(--t3);border-bottom:2px solid transparent;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s}.nav button:hover{color:var(--t1)}.nav button.act{color:var(--g);border-color:var(--g)}
.nsep{width:1px;background:var(--b1);margin:7px 4px;flex-shrink:0}
.app{padding:16px;max-width:1400px;margin:0 auto}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px;margin-bottom:12px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ct{font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:14px}
.si{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px}
.si .sl{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.si .sv{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700;line-height:1.1}
.si .sn{font-size:.56rem;color:var(--t3);margin-top:2px}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b1)}
table{width:100%;border-collapse:collapse;font-size:.76rem}
th{background:var(--s2);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.6rem;text-transform:uppercase;letter-spacing:.04em;color:var(--t3);padding:6px 8px;text-align:left;border-bottom:1px solid var(--b1);white-space:nowrap}
td{padding:5px 8px;border-bottom:1px solid var(--b2);vertical-align:middle}tr:last-child td{border-bottom:0}tbody tr:hover{background:var(--s2)}
select,input[type="text"],input[type="password"],input[type="number"],input[type="date"],textarea{width:100%;padding:6px 10px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:0;transition:border-color .15s}select:focus,input:focus,textarea:focus{border-color:var(--g)}textarea{resize:vertical;min-height:36px}
.fg{margin-bottom:8px}.fl{display:block;font-size:.68rem;font-weight:600;color:var(--t2);margin-bottom:3px}
.fbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl);margin-bottom:10px}
.fbar label{font-size:.7rem;font-weight:600;color:var(--t2);white-space:nowrap}.fbar select,.fbar input[type="text"]{width:auto;min-width:120px;padding:4px 8px;font-size:.74rem;border-radius:var(--r);border:1px solid var(--b1);background:var(--s1);font-weight:600;outline:0}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:200;display:none;align-items:center;justify-content:center;padding:12px}.modal.open{display:flex}
.mbox{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);width:100%;max-width:620px;max-height:85vh;overflow-y:auto}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--b1)}.mhdr h3{font-family:'Space Grotesk',sans-serif;font-size:.84rem}
.mx{background:0;border:0;color:var(--t3);font-size:1.1rem;padding:4px 8px}.mx:hover{color:var(--t1)}
.mbd{padding:14px}.mft{padding:8px 14px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:6px}
.toast{position:fixed;bottom:16px;right:16px;background:var(--t1);color:#fff;padding:7px 14px;border-radius:var(--r);font-size:.76rem;font-weight:500;z-index:300;transform:translateY(60px);opacity:0;transition:all .3s ease;max-width:300px}.toast.show{transform:translateY(0);opacity:1}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.gw{overflow-x:auto;border:1px solid var(--b1);border-radius:var(--rl);background:var(--s1)}
.ghdr{display:flex;background:var(--s2);border-bottom:1px solid var(--b1)}
.ghdr-l{width:200px;min-width:200px;padding:5px 8px;font-size:.58rem;font-weight:700;color:var(--t3);text-transform:uppercase;border-right:1px solid var(--b1)}
.ghdr-m{flex:1;display:flex;position:relative;height:26px;overflow:hidden}
.gmo{position:absolute;top:0;bottom:0;display:flex;align-items:center;font-size:.5rem;font-weight:700;color:var(--t3);font-family:'JetBrains Mono',monospace;border-right:1px solid var(--b2);padding-left:3px}
.gtd{position:absolute;top:0;bottom:0;width:2px;background:var(--rd);z-index:3;opacity:.4}
.grow{display:flex;border-bottom:1px solid var(--b2);cursor:pointer}.grow:hover{background:var(--s2)}
.glbl{width:200px;min-width:200px;padding:3px 8px;font-size:.66rem;display:flex;align-items:center;gap:3px;border-right:1px solid var(--b1);overflow:hidden}
.glbl .wb{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--t3);width:28px;flex-shrink:0;text-align:right}
.glbl span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gba{flex:1;position:relative;height:22px}
.gbar{position:absolute;top:3px;height:16px;border-radius:3px;min-width:3px;display:flex;align-items:center;padding:0 4px;font-size:.48rem;color:#fff;font-weight:600;font-family:'JetBrains Mono',monospace;overflow:hidden;white-space:nowrap}
.gfill{position:absolute;top:0;left:0;bottom:0;background:rgba(255,255,255,.2);border-radius:3px}
.gmain{background:linear-gradient(90deg,var(--s2),var(--s1));padding:3px 8px;font-size:.68rem;font-weight:700;color:var(--t1);border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}
.gmp{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:10px}
.dropzone{border:2px dashed var(--b1);border-radius:var(--rl);padding:20px;text-align:center;cursor:pointer;transition:all .2s}.dropzone:hover,.dropzone.drag{border-color:var(--g);background:var(--gc)}
.spyr{display:flex;flex-direction:column;align-items:center;gap:2px;padding:14px 6px 10px}
.pyl{display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:34px;border-radius:3px;color:#fff;font-size:.68rem;font-weight:600}
.pyc{font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:700}
.sbr{display:flex;align-items:center;gap:6px;margin-bottom:6px}.sbl{width:105px;min-width:105px;font-size:.7rem;font-weight:600;color:var(--t2);text-align:right}
.sbt{flex:1;height:16px;background:var(--s3);border-radius:3px;overflow:hidden}.sbf{height:100%;border-radius:3px}
.sbv{font-family:'JetBrains Mono',monospace;font-size:.58rem;font-weight:600;margin-left:4px;width:40px}
.hbr{display:flex;align-items:center;gap:6px;margin-bottom:5px}.hbl{width:120px;min-width:120px;font-size:.66rem;font-weight:600;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbt{flex:1;height:20px;background:var(--s3);border-radius:3px;position:relative;overflow:hidden}.hbf{position:absolute;top:0;left:0;bottom:0;border-radius:3px}
.hbv{width:80px;min-width:80px;font-family:'JetBrains Mono',monospace;font-size:.6rem;text-align:right;color:var(--t2)}
.feed{max-width:600px}.fpost{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:10px;margin-bottom:6px}.fhead{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:#fff;flex-shrink:0}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}.pcard{border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden}.pcard img{width:100%;height:140px;object-fit:cover;display:block}.pinfo{padding:6px 8px}
.iar{background:var(--gc)!important}.iar td{padding:4px 6px!important;border-bottom:2px solid var(--g)!important}.iar input,.iar select{padding:3px 6px!important;font-size:.72rem;border:1px solid var(--b1);border-radius:4px}
.cost-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.cost-box{padding:10px;border-radius:var(--r);text-align:center}
.cost-box .cl{font-size:.48rem;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.04em}
.cost-box .cv{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;line-height:1.1}
.remarks-badge{display:inline-flex;align-items:center;gap:3px;font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--bl);background:var(--blc);padding:1px 6px;border-radius:10px;cursor:pointer;white-space:nowrap}.remarks-badge:hover{background:rgba(40,116,166,.15)}
.rm-tl{border-left:2px solid var(--b1);padding-left:10px;margin-bottom:10px;position:relative}
.rm-tl::before{content:'';position:absolute;left:-5px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--bl);border:2px solid var(--s1)}
.rm-dt{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--t3);margin-bottom:1px}
.rm-tx{font-size:.72rem;color:var(--t2);word-break:break-word}
.rm-empty{text-align:center;padding:16px;color:var(--t3);font-size:.72rem;font-style:italic}
.mv-btn{background:0;border:0;color:var(--t3);font-size:.8rem;padding:2px 5px;cursor:pointer;line-height:1;border-radius:3px;transition:all .1s}.mv-btn:hover{color:var(--t1);background:var(--s3)}.mv-btn:disabled{opacity:.2;cursor:default;pointer-events:none}
.wbs-edit{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--t3);cursor:text;outline:none;padding:1px 3px;border-radius:3px;min-width:22px;display:inline-block;transition:all .15s}.wbs-edit:hover{background:var(--s3);color:var(--t2)}.wbs-edit:focus{background:var(--s1);color:var(--g);box-shadow:0 0 0 2px rgba(45,138,50,.15)}
.name-edit{cursor:text;outline:none;padding:1px 3px;border-radius:3px;display:inline;transition:all .15s}.name-edit:hover{background:var(--s3)}.name-edit:focus{background:var(--s1);box-shadow:0 0 0 2px rgba(45,138,50,.15)}
.pt-main{background:var(--s2)!important;font-weight:700}.pt-main td{border-bottom:2px solid var(--b1)!important}
.pt-sub td:first-child{padding-left:22px!important}
.scenario-opts{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.sc-opt{font-size:.62rem;font-family:'JetBrains Mono',monospace;font-weight:600;padding:3px 8px;border-radius:12px;cursor:pointer;border:2px solid var(--b2);background:var(--s1);transition:all .15s;display:flex;align-items:center;gap:4px}.sc-opt.active{border-width:2px}
.sc-opt .sc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#loginScr{position:fixed;inset:0;background:linear-gradient(135deg,#1a2416,#243322);display:flex;align-items:center;justify-content:center;z-index:1000}
.lcard{background:var(--s1);border-radius:14px;padding:36px 32px;width:400px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lerr{background:var(--rdc);color:var(--rd);padding:8px 12px;border-radius:var(--r);font-size:.72rem;margin-bottom:10px;display:none;border:1px solid rgba(204,51,51,.2);word-break:break-word}
.step-box{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;font-size:.72rem;display:flex;gap:10px;align-items:flex-start}
.step-num{width:22px;height:22px;background:var(--g);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;flex-shrink:0}
.diag-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--b2);font-size:.72rem}.diag-row:last-child{border-bottom:0}
.diag-ok{color:var(--g);font-weight:600}.diag-fail{color:var(--rd);font-weight:600}
.zoom-wrap{position:relative;overflow:auto;max-height:600px;border:1px solid var(--b1);border-radius:var(--r);background:#fafaf8}
#errScr{position:fixed;inset:0;background:#1a1c18;color:#f0ece4;display:none;align-items:center;justify-content:center;z-index:2000;padding:24px}
#errScr .ec{max-width:600px;font-family:'JetBrains Mono',monospace;font-size:.72rem;line-height:1.7}
#errScr .et{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;color:var(--rd);margin-bottom:12px}
#errScr .em{color:#ccc;margin-bottom:16px;white-space:pre-wrap;word-break:break-all}
@media(max-width:900px){.app{padding:10px}.row2{grid-template-columns:1fr}.cost-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="errScr"><div class="ec"><div class="et">Startup Error</div><div class="em" id="errMsg"></div><button class="btn" onclick="document.getElementById('errScr').style.display='none';document.getElementById('mainApp').style.display='block'" style="color:#fff;background:var(--g);border-color:var(--g)">Continue Anyway</button></div></div>
<div id="loginScr" style="display:none"><div class="lcard"><div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center"><div class="logo-ic" style="width:40px;height:40px"></div><div class="logo-txt"><span class="logo-nm" style="font-size:1.1rem">Stellar Seeds</span><span class="logo-sb">Construction Management</span></div></div><div style="font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:4px" id="lTitle">Sign In</div><div style="font-size:.72rem;color:var(--t3);text-align:center;margin-bottom:20px" id="lSub">Sign in to sync data across devices</div><div class="lerr" id="lErr"></div><div class="fg"><label class="fl">Email</label><input type="text" id="lEmail" placeholder="you@company.com"></div><div class="fg"><label class="fl">Password</label><input type="password" id="lPass" placeholder="Password"></div><button class="btn bp" style="width:100%;padding:10px;font-size:.82rem;margin-top:6px" id="lBtn" onclick="doLogin()">Sign In</button><div style="text-align:center;margin-top:14px;font-size:.74rem;color:var(--t3)" id="lTog">No account? <a style="color:var(--g);font-weight:600" onclick="togAuth()">Sign Up</a></div><div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--b2);text-align:center"><a style="font-size:.68rem;color:var(--t3);text-decoration:underline" onclick="skipAuth()">Continue offline</a></div></div></div>
<div id="mainApp" style="display:none"><div class="hdr"><div class="logo"><div class="logo-ic"></div><div class="logo-txt"><span class="logo-nm">Stellar Seeds</span><span class="logo-sb">Seed Tolling Plant</span></div></div><div class="hdr-r"><span class="hdr-usr" id="hUser"></span><div class="dot off" id="hDot"></div><span class="dot-lb" id="hLbl">Local</span><button class="btn bp bs" onclick="expAll()">Export</button><button class="btn bs" id="hOut" style="display:none" onclick="doLogout()">Logout</button></div></div><div class="nav" id="nbar"></div><div class="app" id="app"></div></div>
<div class="modal" id="mdl"><div class="mbox"><div class="mhdr"><h3 id="mTi"></h3><button class="mx" onclick="mClose()">&times;</button></div><div class="mbd" id="mBd"></div><div class="mft" id="mFt"></div></div></div>
<div class="toast" id="tst"></div>
<script>
var D={tasks:[],costs:[],upds:[],photos:[],safety:{},vn:{},vgc:{},pays:[],psch:[],taskProjects:[],siteCost:0,sitePayments:[]};
var curUser=null,fbAuth=null,db=null,cOn=false,tab='dash',vgSel='site',pendPh=null,tpSel='site';
var nSE=100,imgZoom={},authMode='login';
var scOpts={baseline:true,actual:true,ontrack:true,optimistic:false,pessimistic:false};
var ST={observation:{l:'Observation',b:'bb2'},'near-miss':{l:'Near Miss',b:'by2'},'first-aid':{l:'First Aid',b:'by2'},recordable:{l:'Recordable',b:'bd2'},lti:{l:'Lost Time',b:'bd2'},toolbox:{l:'Toolbox Talk',b:'bg2'},training:{l:'Training',b:'bg2'},audit:{l:'Audit',b:'bb2'}};
var _syncK=['tasks','costs','pays','upds','vgc','psch','taskProjects','sitePayments','safety','vn'];
var tpF={q:'',col:'name',dir:1};
function $i(id){return document.getElementById(id)}
function H(s){if(s==null)return'';var d=document.createElement('span');d.textContent=String(s);return d.innerHTML}
function pct(a,b){return b>0?Math.round(a/b*100):0}
function td(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function addD(ds,n){var d=new Date(ds);d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dd(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function notify(m){var t=$i('tst');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
function mOpen(ti,bd,ft){$i('mTi').textContent=ti;$i('mBd').innerHTML=bd;$i('mFt').innerHTML=ft||'';$i('mdl').classList.add('open')}
function mClose(){$i('mdl').classList.remove('open')}
$i('mdl').addEventListener('click',function(e){if(e.target===this)mClose()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')mClose()});
function isPermErr(e){var m=(e&&e.message)||String(e);return m.indexOf('permission')>=0||m.indexOf('PERMISSION_DENIED')>=0}
function setDot(s){$i('hDot').className='dot '+s}
