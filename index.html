<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Seeds Vietnam — Construction Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3ee;
  --s1:#ffffff;
  --s2:#faf8f4;
  --s3:#eeeae3;
  --b1:#ddd9d0;
  --b2:#e8e5de;
  --g:#217a39;
  --gb:#279443;
  --gc:rgba(33,122,57,.07);
  --bl:#1a6fa0;
  --blc:rgba(26,111,160,.07);
  --am:#a67c28;
  --amc:rgba(166,124,40,.07);
  --rd:#c0392b;
  --rdc:rgba(192,57,43,.07);
  --or:#d4880f;
  --orc:rgba(212,136,15,.07);
  --pu:#8e44ad;
  --puc:rgba(142,68,173,.07);
  --t1:#1b1d19;
  --t2:#555550;
  --t3:#9a9590;
  --r:5px;
  --rl:8px;
}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);
  color:var(--t1);
  line-height:1.5;
  font-size:13.5px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
button{font-family:inherit;cursor:pointer;border:0;background:0}
a{cursor:pointer;text-decoration:none}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}

/* Header */
.hdr{
  height:50px;
  background:var(--s1);
  border-bottom:1px solid var(--b1);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:30px;height:30px;
  background:linear-gradient(135deg,var(--g),#165a2a);
  border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.logo-icon::before{
  content:'';width:14px;height:14px;
  border:2.5px solid rgba(255,255,255,.85);
  border-radius:50%;
}
.logo-icon::after{
  content:'';position:absolute;
  width:6px;height:6px;
  background:rgba(255,255,255,.6);
  border-radius:50%;
  top:8px;left:11px;
}
.logo-text{display:flex;flex-direction:column;line-height:1.15}
.logo-name{
  font-family:'Cormorant Garamond',serif;
  font-size:.85rem;font-weight:700;
  color:var(--am);
  letter-spacing:.2em;text-transform:uppercase;
}
.logo-sub{
  font-family:'JetBrains Mono',monospace;
  font-size:.35rem;color:var(--t3);
  letter-spacing:.06em;text-transform:uppercase;
}
.hdr-right{display:flex;align-items:center;gap:7px}
.hdr-usr{
  font-family:'JetBrains Mono',monospace;
  font-size:.52rem;color:var(--bl);
  max-width:140px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.status-dot{
  width:7px;height:7px;border-radius:50%;
}
.status-dot.on{background:var(--g);box-shadow:0 0 5px rgba(33,122,57,.35)}
.status-dot.off{background:var(--b1)}
.status-dot.warn{background:var(--or)}
.status-dot.err{background:var(--rd)}
.status-lbl{
  font-family:'JetBrains Mono',monospace;
  font-size:.52rem;color:var(--t3);
}

/* Buttons */
.btn{
  font-weight:600;font-size:.68rem;
  padding:5px 11px;
  border-radius:var(--r);
  border:1px solid var(--b1);
  background:var(--s1);
  color:var(--t1);
  transition:all .12s;
  white-space:nowrap;
}
.btn:hover{background:var(--s3);border-color:var(--t3)}
.btn-p{background:var(--g);border-color:var(--g);color:#fff}
.btn-p:hover{background:var(--gb);border-color:var(--gb)}
.btn-r{border-color:var(--rd);color:var(--rd)}
.btn-r:hover{background:var(--rdc)}
.btn-b{background:var(--bl);border-color:var(--bl);color:#fff}
.btn-b:hover{background:#1e85b8}
.btn-u{background:var(--pu);border-color:var(--pu);color:#fff}
.btn-sm{padding:3px 8px;font-size:.62rem}
.btn-xs{padding:2px 6px;font-size:.56rem}

/* Nav */
.nav{
  background:var(--s1);
  border-bottom:1px solid var(--b1);
  display:flex;
  padding:0 10px;
  overflow-x:auto;
  position:sticky;top:50px;z-index:99;
}
.nav button{
  padding:7px 9px;
  font-size:.7rem;font-weight:600;
  color:var(--t3);
  border-bottom:2px solid transparent;
  white-space:nowrap;
  transition:all .15s;
}
.nav button:hover{color:var(--t1)}
.nav button.act{color:var(--g);border-color:var(--g)}
.nav-sep{width:1px;background:var(--b1);margin:6px 3px;flex-shrink:0}

/* App container */
.app{padding:14px;max-width:1380px;margin:0 auto}

/* Card */
.card{
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:var(--rl);
  padding:12px 14px;
  margin-bottom:10px;
}
.card-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;
}
.card-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:.78rem;font-weight:700;
}

/* Stats grid */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(145px,1fr));
  gap:7px;
  margin-bottom:12px;
}
.stat-item{
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:var(--rl);
  padding:10px 12px;
}
.stat-label{
  font-family:'JetBrains Mono',monospace;
  font-size:.5rem;color:var(--t3);
  text-transform:uppercase;
  letter-spacing:.05em;
  margin-bottom:1px;
}
.stat-value{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.1rem;font-weight:700;
  line-height:1.1;
}
.stat-note{font-size:.54rem;color:var(--t3);margin-top:1px}

/* Table wrapper */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b1)}
table{width:100%;border-collapse:collapse;font-size:.72rem}
thead th{
  background:var(--s2);
  font-family:'Space Grotesk',sans-serif;
  font-weight:600;font-size:.56rem;
  text-transform:uppercase;
  letter-spacing:.04em;
  color:var(--t3);
  padding:5px 7px;text-align:left;
  border-bottom:1px solid var(--b1);
  white-space:nowrap;
}
td{
  padding:4px 7px;
  border-bottom:1px solid var(--b2);
  vertical-align:middle;
}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:var(--s2)}

/* Badges */
.badge{
  font-family:'JetBrains Mono',monospace;
  font-size:.52rem;
  padding:1px 6px;
  border-radius:10px;
  font-weight:500;
  display:inline-flex;align-items:center;gap:3px;
  white-space:nowrap;
}
.badge::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}
.bg-g{background:var(--gc);color:var(--g)}.bg-g::before{background:var(--g)}
.bg-r{background:var(--rdc);color:var(--rd)}.bg-r::before{background:var(--rd)}
.bg-y{background:var(--orc);color:var(--or)}.bg-y::before{background:var(--or)}
.bg-b{background:var(--blc);color:var(--bl)}.bg-b::before{background:var(--bl)}
.bg-x{background:rgba(153,153,153,.1);color:var(--t3)}.bg-x::before{background:var(--t3)}
.bg-p{background:var(--puc);color:var(--pu)}.bg-p::before{background:var(--pu)}

/* Forms */
select,input[type="text"],input[type="password"],
input[type="number"],input[type="date"],textarea{
  width:100%;
  padding:5px 9px;
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:var(--r);
  color:var(--t1);
  font-family:'DM Sans',sans-serif;
  font-size:.76rem;
  outline:0;
  transition:border-color .15s;
}
select:focus,input:focus,textarea:focus{border-color:var(--g)}
textarea{resize:vertical;min-height:34px}
.fg{margin-bottom:7px}
.fl{display:block;font-size:.64rem;font-weight:600;color:var(--t2);margin-bottom:2px}
.fr{color:var(--rd)}

/* Filter bar */
.fbar{
  display:flex;gap:7px;align-items:center;flex-wrap:wrap;
  padding:7px 9px;
  background:var(--s2);border:1px solid var(--b2);
  border-radius:var(--rl);
  margin-bottom:9px;
}
.fbar label{font-size:.66rem;font-weight:600;color:var(--t2);white-space:nowrap}
.fbar select,.fbar input[type="text"]{
  width:auto;min-width:110px;
  padding:3px 7px;font-size:.7rem;
  border-radius:var(--r);border:1px solid var(--b1);
  background:var(--s1);
}
.fbar .fsep{width:1px;height:16px;background:var(--b1);flex-shrink:0}

/* Modal */
.modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.22);
  z-index:200;display:none;
  align-items:center;justify-content:center;
  padding:10px;
}
.modal.open{display:flex}
.mbox{
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:var(--rl);
  width:100%;max-width:600px;
  max-height:85vh;overflow-y:auto;
}
.mhdr{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 13px;
  border-bottom:1px solid var(--b1);
}
.mhdr h3{font-family:'Space Grotesk',sans-serif;font-size:.8rem}
.mclose{background:0;border:0;color:var(--t3);font-size:1.05rem;padding:3px 7px}
.mclose:hover{color:var(--t1)}
.mbody{padding:13px}
.mfoot{padding:7px 13px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:5px}

/* Toast */
.toast{
  position:fixed;bottom:14px;right:14px;
  background:var(--t1);color:#fff;
  padding:6px 13px;border-radius:var(--r);
  font-size:.72rem;font-weight:500;
  z-index:300;
  transform:translateY(50px);opacity:0;
  transition:all .25s ease;
}
.toast.show{transform:translateY(0);opacity:1}

/* Grid layouts */
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}

/* Login screen */
#loginScreen{
  position:fixed;inset:0;
  background:linear-gradient(145deg,#14200e,#1e3318,#16260f);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
}
.login-card{
  background:var(--s1);
  border-radius:12px;
  padding:34px 30px;
  width:380px;max-width:92vw;
  box-shadow:0 16px 50px rgba(0,0,0,.45);
}
.login-logo{display:flex;align-items:center;gap:9px;margin-bottom:22px;justify-content:center}
.login-err{
  background:var(--rdc);color:var(--rd);
  padding:7px 10px;border-radius:var(--r);
  font-size:.68rem;margin-bottom:8px;display:none;
  border:1px solid rgba(192,57,43,.18);
}
.login-ok{
  background:var(--gc);color:var(--g);
  padding:7px 10px;border-radius:var(--r);
  font-size:.68rem;margin-bottom:8px;display:none;
  border:1px solid rgba(33,122,57,.18);
}

/* Horizontal bar */
.hbar{
  display:flex;align-items:center;gap:5px;margin-bottom:5px;
}
.hbar-label{
  width:115px;min-width:115px;
  font-size:.66rem;font-weight:600;
  text-align:right;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.hbar-track{
  flex:1;height:14px;
  background:var(--s3);border-radius:3px;
  overflow:hidden;
}
.hbar-fill{height:100%;border-radius:3px}
.hbar-val{
  width:50px;min-width:50px;
  font-family:'JetBrains Mono',monospace;
  font-size:.56rem;text-align:right;
  color:var(--t2);
}

/* S-curve bar (smaller) */
.sbar{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.sbar-label{width:95px;min-width:95px;font-size:.66rem;font-weight:600;color:var(--t2);text-align:right}
.sbar-track{flex:1;height:12px;background:var(--s3);border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px}
.sbar-val{font-family:'JetBrains Mono',monospace;font-size:.54rem;font-weight:600;margin-left:3px;width:36px}

/* Safety pyramid */
.spyramid{display:flex;flex-direction:column;align-items:center;gap:2px;padding:12px 5px 8px}
.pyr-level{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 10px;height:30px;
  border-radius:3px;
  color:#fff;font-size:.64rem;font-weight:600;
}
.pyr-count{font-family:'JetBrains Mono',monospace;font-size:.88rem;font-weight:700}

/* Feed */
.feed{max-width:560px}
.feed-post{
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:var(--rl);
  padding:8px 10px;
  margin-bottom:5px;
}
.feed-head{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.avatar{
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.55rem;font-weight:700;color:#fff;flex-shrink:0;
}

/* Gallery */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.photo-card{border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden}
.photo-card img{width:100%;height:130px;object-fit:cover;display:block}
.photo-info{padding:5px 7px}

/* Vendor cards */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:8px}
.vcard{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--rl);padding:9px;
  transition:border-color .15s;
}
.vcard:hover{border-color:var(--g)}
.vcard-name{font-weight:700;font-size:.78rem;margin-bottom:1px}
.vcard-info{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--t3);margin-bottom:5px}
.vcard-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--b2);font-size:.68rem}
.vcard-row:last-child{border-bottom:0}
.vcard-row b{font-family:'JetBrains Mono',monospace;font-weight:600}
.vcard-bar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:5px}
.vcard-bar-fill{height:100%;border-radius:3px}

/* Gantt */
.gantt-wrap{overflow-x:auto;border:1px solid var(--b1);border-radius:var(--rl);background:var(--s1)}
.gantt-header{display:flex;background:var(--s2);border-bottom:1px solid var(--b1)}
.gantt-header-label{
  width:190px;min-width:190px;
  padding:4px 7px;font-size:.55rem;font-weight:700;
  color:var(--t3);text-transform:uppercase;
  border-right:1px solid var(--b1);
}
.gantt-header-timeline{flex:1;display:flex;position:relative;height:24px;overflow:hidden}
.gantt-month{
  position:absolute;top:0;bottom:0;
  display:flex;align-items:center;
  font-size:.46rem;font-weight:700;
  color:var(--t3);
  font-family:'JetBrains Mono',monospace;
  border-right:1px solid var(--b2);
  padding-left:3px;
}
.gantt-today{
  position:absolute;top:0;bottom:0;width:2px;
  background:var(--rd);z-index:3;opacity:.35;
}
.gantt-row{
  display:flex;border-bottom:1px solid var(--b2);
  cursor:pointer;
}
.gantt-row:hover{background:var(--s2)}
.gantt-label{
  width:190px;min-width:190px;
  padding:3px 7px;font-size:.62rem;
  display:flex;align-items:center;gap:3px;
  border-right:1px solid var(--b1);
  overflow:hidden;
}
.gantt-label .wbs{
  font-family:'JetBrains Mono',monospace;
  font-size:.52rem;color:var(--t3);
  width:28px;flex-shrink:0;text-align:right;
}
.gantt-label span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gantt-bar-area{flex:1;position:relative;height:20px}
.gantt-bar{
  position:absolute;top:3px;height:14px;
  border-radius:3px;min-width:3px;
  display:flex;align-items:center;
  padding:0 4px;
  font-size:.46rem;color:#fff;
  font-weight:600;
  font-family:'JetBrains Mono',monospace;
  overflow:hidden;white-space:nowrap;
}
.gantt-bar-progress{
  position:absolute;top:0;left:0;bottom:0;
  background:rgba(255,255,255,.22);
  border-radius:3px;
}
.gantt-group-header{
  background:linear-gradient(90deg,var(--s2),var(--s1));
  padding:3px 7px;font-size:.64rem;font-weight:700;
  color:var(--t1);
  border-bottom:1px solid var(--b1);
  display:flex;justify-content:space-between;align-items:center;
}
.gantt-group-pct{
  font-family:'JetBrains Mono',monospace;
  font-size:.58rem;font-weight:700;
  padding:1px 6px;border-radius:8px;
}

/* Vendor Gantt image zoom */
.zoom-container{
  position:relative;overflow:auto;
  max-height:560px;
  border:1px solid var(--b1);border-radius:var(--r);
  background:#fafaf8;
}

/* Dropzone */
.dropzone{
  border:2px dashed var(--b1);
  border-radius:var(--rl);
  padding:18px;text-align:center;
  cursor:pointer;
  transition:all .2s;
}
.dropzone:hover,.dropzone.dragover{
  border-color:var(--g);background:var(--gc);
}

/* Inline add row */
.inline-add-row{background:var(--gc)!important}
.inline-add-row td{padding:3px 5px!important;border-bottom:2px solid var(--g)!important}
.inline-add-row input,.inline-add-row select{
  padding:2px 5px!important;font-size:.68rem;
  border:1px solid var(--b1);border-radius:3px;
}
.inline-add-row input:focus,.inline-add-row select:focus{
  border-color:var(--g);outline:none;
  box-shadow:0 0 0 2px rgba(33,122,57,.1);
}

/* Upload cost option */
.upload-option{
  display:flex;align-items:center;gap:7px;
  padding:7px 9px;border-radius:var(--r);
  cursor:pointer;margin-bottom:5px;
  border:2px solid var(--b2);
  transition:all .12s;
}
.upload-option:hover{background:var(--s2)}
.upload-option.sel-replace{border-color:var(--rd);background:var(--rdc)}
.upload-option.sel-add{border-color:var(--g);background:var(--gc)}

/* Fund card */
.fund-card{
  padding:9px;
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--rl);
  border-left:4px solid var(--bl);
  cursor:pointer;
  transition:all .12s;
}
.fund-card:hover{background:var(--s2);box-shadow:0 2px 6px rgba(0,0,0,.05)}
.fund-card.selected{background:var(--s2);border-width:2px;box-shadow:0 2px 8px rgba(0,0,0,.07)}

/* Misc */
.content-editable{
  padding:2px 4px;border-radius:3px;
  border:1px solid transparent;
  transition:border-color .12s;
}
.content-editable:hover{border-color:var(--b1)}
.content-editable:focus{border-color:var(--g);outline:none;background:var(--s2)}

/* Responsive */
@media(max-width:900px){
  .app{padding:8px}
  .row-2{grid-template-columns:1fr}
  .row-3{grid-template-columns:1fr}
}
@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr}
  .hdr{padding:0 10px}
  .nav{padding:0 5px}
}
</style>
</head>
<body>

<!-- ==================== LOGIN SCREEN ==================== -->
<div id="loginScreen" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon" style="width:38px;height:38px"></div>
      <div class="logo-text">
        <span class="logo-name" style="font-size:1.05rem">Stellar Seeds</span>
        <span class="logo-sub">Construction Management</span>
      </div>
    </div>
    <div style="font-family:'Space Grotesk';font-size:1.05rem;font-weight:700;text-align:center;margin-bottom:3px" id="loginTitle">Sign In</div>
    <div style="font-size:.7rem;color:var(--t3);text-align:center;margin-bottom:18px" id="loginSub">Enter your credentials</div>
    <div class="login-err" id="loginError"></div>

};

// ============================================================
//  HELPERS
// ============================================================
function $(id) { return document.getElementById(id); }
function esc(s) { if (!s) return ''; var d = document.createElement('span'); d.textContent = String(s); return d.innerHTML; }
function pct(a, b) { return b > 0 ? Math.round(a / b * 100) : 0; }

function today() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function addDays(ds, n) {
  var d = new Date(ds); d.setDate(d.getDate() + n);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }
function fmtNum(v) { if (!v || v === 0) return '0'; return Number(v).toLocaleString('en', { minimumFractionDigits:2, maximumFractionDigits:2 }); }

function notify(msg) {
  var t = $('toastEl'); t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}
function openModal(title, body, foot) {
  $('modalTitle').textContent = title;
  $('modalBody').innerHTML = body;
  $('modalFoot').innerHTML = foot || '';
  $('modal').classList.add('open');
}
function closeModal() { $('modal').classList.remove('open'); }
$('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

function convert(val, from, to) {
  if (from === to) return val;
  var fr = FX[from] ? FX[from].rate : 1;
  var tr = FX[to] ? FX[to].rate : 1;
  return val / fr * tr;
}
function fmtCurrency(val, cur) {
  var s = SYMBOLS[cur] || '';
  if (!val || val === 0) return s + '0';
  if (cur === 'VND') {
    if (Math.abs(val) >= 1e9) return s + (val/1e9).toFixed(2) + 'B';
    if (Math.abs(val) >= 1e6) return s + (val/1e6).toFixed(2) + 'M';
    return s + Math.round(val).toLocaleString();
  }
  if (Math.abs(val) >= 1e6) return s + (val/1e6).toFixed(2) + 'M';
  return s + val.toLocaleString('en', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function toDisplayCurrency(val) { return convert(val, 'PHP', displayCurrency); }
function fmtDisp(val) { return fmtCurrency(toDisplayCurrency(val), displayCurrency); }

function currencyBar(fnName) {
  return '<div class="fbar"><label>Display:</label>' +
    '<select onchange="' + fnName + '">' +
    '<option value="PHP"' + (displayCurrency==='PHP'?' selected':'') + '>PHP</option>' +
    '<option value="VND"' + (displayCurrency==='VND'?' selected':'') + '>VND</option>' +
    '<option value="USD"' + (displayCurrency==='USD'?' selected':'') + '>USD</option>' +
    '</select></div>';
}

function isPermError(e) {
  var msg = (e && e.message) || String(e);
  return msg.indexOf('permission') >= 0 || msg.indexOf('PERMISSION_DENIED') >= 0;
}
function setStatusDot(cls) { var el = $('hdrDot'); if (el) el.className = 'status-dot ' + cls; }
function setStatusLabel(msg) { var el = $('hdrLbl'); if (el) el.textContent = msg; }
function autoStatus(prog) { return prog >= 100 ? 'done' : prog > 0 ? 'active' : 'pending'; }

function mainTasks() {
  var out = [];
  for (var i = 0; i < DATA.tasks.length; i++) {
    if (DATA.tasks[i].wbs.indexOf('.') === -1) out.push(DATA.tasks[i]);
  }
  return out;
}

function weightedProgress(prefix) {
  var tw = 0, tp = 0, found = false;
  for (var i = 0; i < DATA.tasks.length; i++) {
    var t = DATA.tasks[i];
    if (prefix && t.wbs.indexOf(prefix + '.') === 0 && t.wbs !== prefix) {
      tw += t.dur; tp += t.prog * t.dur; found = true;
    }
  }
  if (!found) {
    for (var i = 0; i < DATA.tasks.length; i++) {
      if (DATA.tasks[i].wbs === prefix) return DATA.tasks[i].prog;
    }
  }
  return tw > 0 ? Math.round(tp / tw) : 0;
}

function overallProgress() {
  var m = mainTasks(), tw = 0, tp = 0;
  for (var i = 0; i < m.length; i++) { tw += m[i].dur; tp += m[i].prog * m[i].dur; }
  return tw > 0 ? Math.round(tp / tw) : 0;
}

function vendorList() {
  var map = {}, arr = [];
  for (var i = 0; i < DATA.costs.length; i++) {
    if (!map[DATA.costs[i].vendor]) { map[DATA.costs[i].vendor] = 1; arr.push(DATA.costs[i].vendor); }
  }
  return arr;
}

function recalcPaySchBal() {
  var bal = 0;
  for (var i = 0; i < DATA.paySchedule.length; i++) {
    var r = DATA.paySchedule[i];
    bal += (r.cashIn || 0) - (r.cashOut || 0);
    r.runningBal = bal;
  }
}

function mkDatalist(id, extra) {
  var vds = vendorList();
  var dl = '<datalist id="' + id + '">';
  if (extra) dl += '<option value="' + extra + '">';
  for (var i = 0; i < vds.length; i++) dl += '<option value="' + esc(vds[i]) + '">';
  dl += '</datalist>';
  return dl;
}

// ============================================================
//  CLOUD (Firebase)
// ============================================================
function initCloud() {
  var config;
  try { config = JSON.parse(localStorage.getItem('ss_cloud')); } catch(e) {}
  if (!config || !config.databaseURL) return false;
  try {
    if (!firebase.apps.length) firebase.initializeApp(config);
    firebaseDB = firebase.database();
    try { firebaseAuth = firebase.auth(); } catch(e) { firebaseAuth = null; }
    cloudConnected = true;
    return true;
  } catch(e) { return false; }
}

function cloudSave() {
  if (!firebaseDB) return;
  skipCloudSync = true;
  var payload = {};
  payload['ss/tasks'] = DATA.tasks;
  payload['ss/costs'] = DATA.costs;
  payload['ss/payments'] = DATA.payments;
  payload['ss/updates'] = DATA.updates;
  payload['ss/safety'] = DATA.safety;
  payload['ss/vendorGantt'] = DATA.vendorGantt;
  payload['ss/vendorNotes'] = DATA.vendorNotes;
  payload['ss/paySchedule'] = DATA.paySchedule;
  payload['ss/_ts'] = Date.now();
  firebaseDB.ref().update(payload).then(function() {
    setTimeout(function(){ skipCloudSync = false; }, 800);
    setStatusDot('on'); setStatusLabel('Synced');
  }).catch(function(e) {
    skipCloudSync = false;
    if (isPermError(e)) { setStatusDot('err'); setStatusLabel('Denied'); }
  });
}

function syncFromCloud() {
  if (!firebaseDB) return;
  firebaseDB.ref('ss').once('value').then(function(snap) {
    var val = snap.val();
    if (!val) { setupLiveSync(); return; }
    var changed = false;
    ['tasks','costs','payments','updates','vendorGantt','paySchedule'].forEach(function(key) {
      if (val[key] !== undefined && val[key] !== null) {
        DATA[key] = val[key];
        localStorage.setItem('ss_' + key, JSON.stringify(val[key]));
        changed = true;
      }
    });
    if (mergeCloudData('vendorNotes', val.vendorNotes)) changed = true;
    if (mergeCloudData('safety', val.safety, true)) changed = true;
    if (changed) { recalcTotals(); render(); }
    setStatusDot('on'); setStatusLabel('Synced');
    setupLiveSync();
  }).catch(function() { setupLiveSync(); });
}

function mergeCloudData(key, cloudVal, isObject) {
  if (!cloudVal) return false;
  if (isObject) {
    if (!DATA[key]._ts || (cloudVal._ts && cloudVal._ts > DATA[key]._ts)) {
      DATA[key] = cloudVal;
      localStorage.setItem('ss_' + key, JSON.stringify(cloudVal));
      return true;
    }
    return false;
  }
  var local = DATA[key] || {};
  if (!local._ts || (cloudVal._ts && cloudVal._ts > (local._ts || 0))) {
    DATA[key] = cloudVal;
    localStorage.setItem('ss_' + key, JSON.stringify(cloudVal));
    return true;
  }
  return false;
}

function setupLiveSync() {
  if (!firebaseDB) return;
  var ref = firebaseDB.ref('ss');
  ref.off();
  ref.on('value', function(snap) {
    if (skipCloudSync) return;
    var val = snap.val();
    if (!val) return;
    var changed = false;
    ['tasks','costs','payments','updates','vendorGantt','paySchedule'].forEach(function(key) {
      if (val[key] !== undefined && val[key] !== null) {
        DATA[key] = val[key];
        localStorage.setItem('ss_' + key, JSON.stringify(val[key]));
        changed = true;
      }
    });
    if (mergeCloudData('vendorNotes', val.vendorNotes)) changed = true;
    if (mergeCloudData('safety', val.safety, true)) changed = true;
    if (changed) { recalcTotals(); render(); }
  }, function(e) {
    setStatusDot('err');
    setStatusLabel(isPermError(e) ? 'Denied' : 'Error');
  });
}

function monitorConnection() {
  if (!firebaseDB) return;
  firebaseDB.ref('.info/connected').on('value', function(s) {
    if (s.val() === true) {
      setStatusDot('on'); setStatusLabel('Connected');
      if (currentUser) syncFromCloud();
    } else {
      setStatusDot('off'); setStatusLabel('Offline');
    }
  });
}

//  AUTH
// ============================================================
function checkAuth() {
  monitorConnection();
  if (!firebaseAuth) { showMainApp(); return; }
  firebaseAuth.onAuthStateChanged(function(user) {
    if (user) { currentUser = user; showMainApp(); syncFromCloud(); }
    else { currentUser = null; showLoginScreen(); }
  });
}

function showLoginScreen() {
  $('loginScreen').style.display = 'flex';
  $('mainApp').style.display = 'none';
  $('loginEmail').value = '';
  $('loginPass').value = '';
  $('loginError').style.display = 'none';
  $('loginOk').style.display = 'none';
  authMode = 'login';
  $('loginTitle').textContent = 'Sign In';
  $('loginSub').textContent = 'Enter your credentials';
  $('loginBtn').textContent = 'Sign In';
  $('loginToggle').innerHTML = 'No account? <a style="color:var(--g);font-weight:600" onclick="toggleAuth()">Sign Up</a>';
}

function showMainApp() {
  $('loginScreen').style.display = 'none';
  $('mainApp').style.display = 'block';
  if (currentUser) {
    $('hdrUser').textContent = currentUser.email || '';
    $('hdrUser').style.display = 'inline';
    $('hdrLogout').style.display = 'inline';
  } else {
    $('hdrUser').style.display = 'none';
    $('hdrLogout').style.display = 'none';
    setStatusDot('off'); setStatusLabel('Local');
  }
  loadData();
  recalcTotals();
  buildNav();
  render();
}

window.toggleAuth = function() {
  authMode = authMode === 'login' ? 'signup' : 'login';
  $('loginError').style.display = 'none';
  $('loginOk').style.display = 'none';
  if (authMode === 'signup') {
    $('loginTitle').textContent = 'Create Account';
    $('loginSub').textContent = 'Register for cloud sync';
    $('loginBtn').textContent = 'Sign Up';
    $('loginToggle').innerHTML = 'Have account? <a style="color:var(--g);font-weight:600" onclick="toggleAuth()">Sign In</a>';
  } else {
    $('loginTitle').textContent = 'Sign In';
    $('loginSub').textContent = 'Enter your credentials';
    $('loginBtn').textContent = 'Sign In';
    $('loginToggle').innerHTML = 'No account? <a style="color:var(--g);font-weight:600" onclick="toggleAuth()">Sign Up</a>';
  }
};

window.doLogin = function() {
  var email = $('loginEmail').value.trim();
  var pass = $('loginPass').value;
  if (!email || !pass) { loginErr('Email and password required'); return; }
  if (!firebaseAuth) { loginErr('No auth configured'); return; }
  $('loginBtn').textContent = 'Please wait...';
  $('loginError').style.display = 'none';
  if (authMode === 'signup') {
    firebaseAuth.createUserWithEmailAndPassword(email, pass).then(function() {
      loginOk('Account created!');
      $('loginBtn').textContent = 'Sign Up';
    }).catch(function(e) {
      $('loginBtn').textContent = 'Sign Up';
      loginErr(e.code);
    });
  } else {
    firebaseAuth.signInWithEmailAndPassword(email, pass).then(function() {
      // success handled by onAuthStateChanged
    }).catch(function(e) {
      $('loginBtn').textContent = 'Sign In';
      loginErr(e.code);
    });
  }
};

window.doLogout = function() {
  if (firebaseAuth) firebaseAuth.signOut();
  else { currentUser = null; showLoginScreen(); }
};

window.skipAuth = function() {
  currentUser = null;
  showMainApp();
  notify('Local mode');
};

function loginErr(msg) {
  $('loginError').textContent = msg;
  $('loginError').style.display = 'block';
  $('loginOk').style.display = 'none';
}
function loginOk(msg) {
  $('loginOk').textContent = msg;
  $('loginOk').style.display = 'block';
  $('loginError').style.display = 'none';
}

}

function costSummary() {
  var totalContract = 0, totalPaid = 0;
  for (var i = 0; i < DATA.costs.length; i++) totalContract += DATA.costs[i].total;
  for (var i = 0; i < DATA.payments.length; i++) totalPaid += DATA.payments[i].phpAmount;
  return { totalContract:totalContract, totalPaid:totalPaid, remaining:totalContract - totalPaid, pctPaid:pct(totalPaid, totalContract) };
}

    h += '<button class="' + (currentTab === NAV_TABS[i].id ? 'act' : '') + '" ' +
         'onclick="switchTab(\'' + NAV_TABS[i].id + '\')">' + NAV_TABS[i].label + '</button>';
  }
  $('navbar').innerHTML = h;

function renderSiteGantt() {
  var GS = new Date(2026, 0, 1);
  var ppd = 3;
  function dateToPx(ds) {
    var parts = ds.split('-');
    return Math.round((new Date(+parts[0], +parts[1]-1, +parts[2]) - GS) / 86400000) * ppd;
  }
  var statusColors = { done:'var(--g)', active:'var(--bl)', pending:'#999' };
  var oa = overallProgress();
  var m = mainTasks();

  // Month headers
  var months = [];
  for (var i = 0; i < 14; i++) {
    var yr = i < 12 ? 2026 : 2027, mi = i < 12 ? i : i - 12;
    var d1 = new Date(yr, mi, 1), d2 = new Date(yr, mi+1, 1);
    months.push({
      label: d1.toLocaleString('en', {month:'short', year:'2-digit'}),
      leftPx: dateToPx(yr + '-' + String(mi+1).padStart(2,'0') + '-01'),
      widthPx: Math.round((d2 - d1) / 86400000) * ppd
    });
  }

  var h = '<div class="card" style="border-left:3px solid var(--bl);margin-bottom:6px"><div class="card-header"><span class="card-title">Site Gantt</span>';
  h += '<span style="font-family:JetBrains Mono;font-size:.56rem;color:var(--t3)">' + DATA.tasks.length + ' tasks &bull; ' + oa + '%</span></div></div>';

  h += '<div class="gantt-wrap"><div class="gantt-header"><div class="gantt-header-label">WBS / Task</div><div class="gantt-header-timeline">';
  for (var i = 0; i < months.length; i++) {
    h += '<div class="gantt-month" style="left:' + months[i].leftPx + 'px;width:' + months[i].widthPx + 'px">' + months[i].label + '</div>';
  }
  var todayPx = dateToPx(today());
  if (todayPx > 0) h += '<div class="gantt-today" style="left:' + todayPx + 'px"></div>';
  h += '</div></div>';

  for (var gi = 0; gi < m.length; gi++) {
    var g = m[gi];
    var gProg = weightedProgress(g.wbs);
    var gc = gProg >= 80 ? 'var(--g)' : gProg >= 40 ? 'var(--or)' : gProg > 0 ? 'var(--bl)' : 'var(--t3)';
    h += '<div class="gantt-group-header"><span>' + esc(g.wbs) + ' ' + esc(g.name) + '</span>';
    h += '<span class="gantt-group-pct" style="background:' + (gProg >= 80 ? 'var(--gc)' : gProg >= 40 ? 'var(--orc)' : 'var(--blc)') + ';color:' + gc + '">' + gProg + '%</span></div>';

    // Find children
    var children = [];
    for (var ci = 0; ci < DATA.tasks.length; ci++) {
      if (DATA.tasks[ci].wbs.indexOf(g.wbs + '.') === 0 && DATA.tasks[ci].wbs !== g.wbs) children.push(ci);
    }
    if (!children.length) {
      // Show main task as single bar
      var lx = dateToPx(g.s), wx = Math.max(4, g.dur * ppd);
      h += '<div class="gantt-row" onclick="editGanttTask(' + gi + ')">';
      h += '<div class="gantt-label"><span class="wbs">' + esc(g.wbs) + '</span><span>' + esc(g.name) + '</span></div>';
      h += '<div class="gantt-bar-area"><div class="gantt-bar" style="left:' + lx + 'px;width:' + wx + 'px;background:' + (statusColors[g.st]||'#999') + '"><div class="gantt-bar-progress" style="width:' + g.prog + '%"></div>' + (wx > 36 ? g.prog + '%' : '') + '</div></div></div>';
    } else {
      for (var cj = 0; cj < children.length; cj++) {
        var idx = children[cj], t = DATA.tasks[idx];
        var lx2 = dateToPx(t.s), wx2 = Math.max(4, t.dur * ppd);
        h += '<div class="gantt-row" onclick="editGanttTask(' + idx + ')">';
        h += '<div class="gantt-label"><span class="wbs">' + esc(t.wbs) + '</span><span>' + esc(t.name) + '</span></div>';
        h += '<div class="gantt-bar-area"><div class="gantt-bar" style="left:' + lx2 + 'px;width:' + wx2 + 'px;background:' + (statusColors[t.st]||'#999') + '"><div class="gantt-bar-progress" style="width:' + t.prog + '%"></div>' + (wx2 > 36 ? t.prog + '%' : '') + '</div></div></div>';
      }
    }
  }
  h += '</div>';
  return h;
}

    h += '</div></div>';
    for (var i = 0; i < tasks.length; i++) {
      var t = tasks[i], dur = daysBetween(t.s, t.e), lx = dateToPx(t.s), wx = Math.max(4, dur*ppd);

      h += '<div class="gantt-row" onclick="editVGTask(\'' + esc(vendor) + '\',' + i + ')">';
      h += '<div class="gantt-label"><span class="wbs">'+(i+1)+'</span><span>'+esc(t.name)+'</span></div>';
      h += '<div class="gantt-bar-area"><div class="gantt-bar" style="left:'+lx+'px;width:'+wx+'px;background:'+bc+'"><div class="gantt-bar-progress" style="width:'+t.prog+'%"></div>'+(wx>36?t.prog+'%':'')+'</div></div></div>';
    }
    h += '</div></div>';
  }
  return h;
}

function processVGImage(f, vendor) {
  if (!f.type.startsWith('image/')) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var w = img.width, h = img.height, max = 1200;
      if (w > max) { h = Math.round(h * max / w); w = max; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      try {
        DATA.vendorGantt[vendor].image = canvas.toDataURL('image/jpeg', 0.6);
        saveAll(); notify('Image uploaded'); renderGantt();
      } catch(err) { alert('Image too large'); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
}

// ============================================================
//  S-CURVE ANALYSIS
// ============================================================
function renderSCurve() {
  recalcTotals();
  var m = mainTasks();
  var oa = overallProgress();
  var todayDate = new Date(today());
  var totalDur = 0;
  for (var i = 0; i < m.length; i++) totalDur += m[i].dur;
  if (!totalDur) { $('appContent').innerHTML = '<div class="card">No tasks</div>'; return; }

  // Build monthly planned vs actual
  var months = [], planned = [], actual = [], monthDates = [];
  for (var mi = 0; mi < 14; mi++) {
    var yr = mi < 12 ? 2026 : 2027, mo = mi < 12 ? mi : mi - 12;
    var monthEnd = new Date(yr, mo + 1, 0);
    months.push(new Date(yr, mo, 1).toLocaleString('en', {month:'short', year:'2-digit'}));
    monthDates.push(monthEnd);
    var mp = 0, ma = 0;
    for (var j = 0; j < m.length; j++) {
      var t = m[j], weight = t.dur / totalDur;
      var ts = new Date(t.s), te = new Date(t.e);
      var plannedPct = monthEnd >= te ? 1 : (monthEnd >= ts ? Math.min(1, (monthEnd - ts) / Math.max(1, te - ts)) : 0);
      mp += weight * plannedPct;
      var actualPct = 0;
      if (t.prog >= 100) {
        actualPct = monthEnd >= te ? 1 : (monthEnd >= ts ? Math.min(1, (monthEnd - ts) / Math.max(1, te - ts)) : 0);
      } else if (monthEnd <= todayDate && monthEnd >= ts) {
        actualPct = (t.prog / 100) * Math.min(1, (monthEnd - ts) / Math.max(1, todayDate - ts));
      } else if (monthEnd > todayDate) {
        actualPct = t.prog / 100;
      }
      ma += weight * actualPct;
    }
    planned.push(Math.round(mp * 100));
    actual.push(Math.round(ma * 100));
  }

  // Current planned
  var currentPlanned = 0;
  for (var i = 0; i < months.length; i++) {
    if (monthDates[i] >= todayDate) { currentPlanned = planned[i]; break; }
  }
  var variance = oa - currentPlanned;
  var varColor = variance >= 0 ? 'var(--g)' : 'var(--rd)';

  // SPI & risk
  var spi = currentPlanned > 0 ? (oa / currentPlanned) : 1;
  var riskLevel, riskBg, riskColor;
  if (spi >= 0.95) { riskLevel = 'LOW'; riskBg = 'var(--gc)'; riskColor = 'var(--g)'; }
  else if (spi >= 0.85) { riskLevel = 'MEDIUM'; riskBg = 'var(--orc)'; riskColor = 'var(--or)'; }
  else { riskLevel = 'HIGH'; riskBg = 'var(--rdc)'; riskColor = 'var(--rd)'; }

  var remainPct = 100 - oa;
  var avgRate = oa > 0 ? oa / Math.max(1, daysBetween(m[0].s, today()) / 30) : 0.5;
  var optDate = addDays(today(), Math.round(remainPct / (avgRate * 1.15) * 30));
  var baseDate = addDays(today(), Math.round(remainPct / Math.max(avgRate, 0.1) * 30));
  var pessDate = addDays(today(), Math.round(remainPct / Math.max(avgRate * 0.75, 0.05) * 30));

  // Build HTML
  var h = '<div style="margin-bottom:8px"><span class="card-title" style="font-size:.88rem">S-Curve Analysis</span></div>';
  h += '<div class="stats">';
  h += '<div class="stat-item" style="border-left:3px solid var(--g)"><div class="stat-label">Actual</div><div class="stat-value" style="color:var(--g)">' + oa + '%</div></div>';
  h += '<div class="stat-item" style="border-left:3px solid var(--bl)"><div class="stat-label">Planned</div><div class="stat-value" style="color:var(--bl)">' + currentPlanned + '%</div></div>';
  h += '<div class="stat-item" style="border-left:3px solid ' + varColor + '"><div class="stat-label">Variance</div><div class="stat-value" style="color:' + varColor + '">' + (variance >= 0 ? '+' : '') + variance + '%</div></div>';
  h += '<div class="stat-item" style="border-left:3px solid var(--am)"><div class="stat-label">Tasks</div><div class="stat-value">' + DATA.tasks.length + '</div></div>';
  h += '</div>';

  // Chart canvas
  h += '<div class="card"><div class="card-header"><span class="card-title">Progress Trend</span></div>';
  h += '<canvas id="scurveCanvas" width="880" height="300" style="width:100%;height:auto;display:block"></canvas></div>';

  // Risk & Scenarios
  h += '<div class="row-2">';
  h += '<div class="card"><div class="card-header"><span class="card-title">Risk Assessment</span></div>';
  h += '<div style="text-align:center;padding:12px;background:' + riskBg + ';border-radius:var(--r);margin-bottom:8px">';
  h += '<div style="font-size:.56rem;text-transform:uppercase;color:' + riskColor + ';font-family:JetBrains Mono;letter-spacing:.1em">Overall Risk</div>';
  h += '<div style="font-family:Space Grotesk;font-size:1.6rem;font-weight:700;color:' + riskColor + '">' + riskLevel + '</div></div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">';
  h += '<div style="padding:7px;background:var(--s2);border-radius:var(--r);text-align:center"><div style="font-size:.48rem;color:var(--t3);font-family:JetBrains Mono">SPI</div><div style="font-family:Space Grotesk;font-size:1rem;font-weight:700;color:' + (spi>=1?'var(--g)':spi>=0.9?'var(--or)':'var(--rd)') + '">' + spi.toFixed(2) + '</div></div>';
  h += '<div style="padding:7px;background:var(--s2);border-radius:var(--r);text-align:center"><div style="font-size:.48rem;color:var(--t3);font-family:JetBrains Mono">Variance</div><div style="font-family:Space Grotesk;font-size:1rem;font-weight:700;color:' + varColor + '">' + (variance>=0?'+':'') + variance + '%</div></div>';
  h += '<div style="padding:7px;background:var(--s2);border-radius:var(--r);text-align:center"><div style="font-size:.48rem;color:var(--t3);font-family:JetBrains Mono">Remaining</div><div style="font-family:Space Grotesk;font-size:1rem;font-weight:700">' + remainPct + '%</div></div>';
  h += '<div style="padding:7px;background:var(--s2);border-radius:var(--r);text-align:center"><div style="font-size:.48rem;color:var(--t3);font-family:JetBrains Mono">Tasks</div><div style="font-family:Space Grotesk;font-size:1rem;font-weight:700">' + DATA.tasks.length + '</div></div>';
  h += '</div></div>';

  h += '<div class="card"><div class="card-header"><span class="card-title">Scenario Analysis</span></div>';
  var scenarios = [
    { name:'Optimistic', date:optDate, color:'var(--g)', bg:'var(--gc)', icon:'&#9650;', desc:'Pace improves 15%' },
    { name:'Baseline', date:baseDate, color:'var(--bl)', bg:'var(--blc)', icon:'&#9654;', desc:'Current pace' },
    { name:'Pessimistic', date:pessDate, color:'var(--rd)', bg:'var(--rdc)', icon:'&#9660;', desc:'Pace declines 25%' }
  ];
  for (var i = 0; i < scenarios.length; i++) {
    var s = scenarios[i];
    h += '<div style="display:flex;align-items:center;gap:9px;padding:9px;background:' + s.bg + ';border-radius:var(--r);margin-bottom:5px;border-left:3px solid ' + s.color + '">';
    h += '<div style="font-size:1rem;color:' + s.color + '">' + s.icon + '</div>';
    h += '<div style="flex:1"><div style="font-weight:700;font-size:.74rem;color:' + s.color + '">' + s.name + '</div><div style="font-size:.6rem;color:var(--t3)">' + s.desc + '</div></div>';
    h += '<div style="text-align:right"><div style="font-family:JetBrains Mono;font-size:.72rem;font-weight:700;color:' + s.color + '">' + s.date + '</div><div style="font-family:JetBrains Mono;font-size:.52rem;color:var(--t3)">' + Math.round(daysBetween(today(), s.date) / 30) + 'mo</div></div>';
    h += '</div>';
  }
  h += '</div></div>';

  // Recommendations
  h += '<div class="card"><div class="card-header"><span class="card-title">Recommendations</span></div>';
  var cs = costSummary();
  var recs = [];
  if (oa >= currentPlanned) recs.push({ title:'On Track', desc:'Project is at or ahead of schedule. Maintain current resource allocation.', color:'var(--g)', icon:'&#10003;' });
  if (oa < currentPlanned && oa >= currentPlanned - 10) recs.push({ title:'Monitor Closely', desc:'Slight delay detected. Review critical path and accelerate permit approvals.', color:'var(--or)', icon:'&#9888;' });
  if (oa < currentPlanned - 10) recs.push({ title:'Recovery Required', desc:'Delay of ' + (currentPlanned - oa) + '%. Fast-track parallel activities.', color:'var(--rd)', icon:'&#9888;' });
  recs.push({ title:'Budget Health', desc:'Payment at ' + cs.pctPaid + '% vs ' + oa + '% progress. ' + (cs.pctPaid > oa ? 'Review cost control.' : 'Healthy.'), color: cs.pctPaid > oa ? 'var(--or)' : 'var(--g)', icon: cs.pctPaid > oa ? '&#9888;' : '&#10003;' });

  var overdue = 0;
  for (var i = 0; i < m.length; i++) {
    if (m[i].st !== 'done' && new Date(m[i].e) < todayDate && m[i].prog < 100) overdue++;
  }
  if (overdue > 0) recs.push({ title: overdue + ' Overdue Task' + (overdue > 1 ? 's' : ''), desc:'Tasks past their end date. Re-baseline schedule if needed.', color:'var(--rd)', icon:'&#9888;' });

  for (var i = 0; i < recs.length; i++) {
    h += '<div style="display:flex;gap:9px;padding:9px;border-left:3px solid ' + recs[i].color + ';background:var(--s2);border-radius:0 var(--r) var(--r) 0;margin-bottom:5px">';
    h += '<div style="font-size:.95rem;color:' + recs[i].color + '">' + recs[i].icon + '</div>';
    h += '<div style="flex:1"><div style="font-weight:700;font-size:.72rem;color:' + recs[i].color + '">' + recs[i].title + '</div>';
    h += '<div style="font-size:.68rem;color:var(--t2);margin-top:1px">' + recs[i].desc + '</div></div></div>';
  }
  h += '</div>';

  $('appContent').innerHTML = h;
  drawSCurveChart(planned, actual, months, todayDate);
}

function drawSCurveChart(planned, actual, months, todayDate) {
  var canvas = $('scurveCanvas');
  if (!canvas) return;
  var W = canvas.width, H = canvas.height;
  var pL = 52, pR = 22, pT = 28, pB = 46;
  var cW = W - pL - pR, cH = H - pT - pB;
  var ctx = canvas.getContext('2d');
  var n = months.length;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#ece9e3'; ctx.lineWidth = 1;
  for (var i = 0; i <= 10; i++) {
    var y = pT + (cH / 10) * i;
    ctx.beginPath(); ctx.moveTo(pL, y); ctx.lineTo(W - pR, y); ctx.stroke();
    ctx.fillStyle = '#999'; ctx.font = '10px JetBrains Mono'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText((100 - i * 10) + '%', pL - 6, y);
  }
  ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillStyle = '#999'; ctx.font = '9px JetBrains Mono';
  for (var i = 0; i < n; i++) {
    if (i % 2 === 0) ctx.fillText(months[i], pL + (cW / Math.max(1, n - 1)) * i, H - pB + 8);
  }

  function px(i) { return pL + (cW / (n - 1)) * i; }
  function py(v) { return pT + cH - (v / 100) * cH; }

  // Fill areas
  ctx.beginPath(); ctx.moveTo(px(0), py(0));
  for (var i = 0; i < n; i++) ctx.lineTo(px(i), py(planned[i]));
  ctx.lineTo(px(n-1), py(0)); ctx.closePath();
  ctx.fillStyle = 'rgba(26,111,160,.06)'; ctx.fill();

  ctx.beginPath(); ctx.moveTo(px(0), py(0));
  for (var i = 0; i < n; i++) ctx.lineTo(px(i), py(actual[i]));
  ctx.lineTo(px(n-1), py(0)); ctx.closePath();
  ctx.fillStyle = 'rgba(33,122,57,.06)'; ctx.fill();

  // Lines
  function drawCurve(data, color) {
    ctx.beginPath();
    for (var i = 0; i < data.length; i++) {
      if (i === 0) ctx.moveTo(px(i), py(data[i]));
      else ctx.lineTo(px(i), py(data[i]));
    }
    ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.stroke();
  }
  drawCurve(planned, '#1a6fa0');
  drawCurve(actual, '#217a39');

  // Today line — find by month label match only
  var todayIdx = -1;
  var todayMonthStr = todayDate.toLocaleString('en', {month:'short', year:'2-digit'});
  for (var i = 0; i < months.length; i++) {
    if (months[i] === todayMonthStr) { todayIdx = i; break; }
  }
  if (todayIdx >= 0) {
    var tx = px(todayIdx);
    ctx.setLineDash([5, 3]); ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(tx, pT); ctx.lineTo(tx, pT + cH); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#c0392b'; ctx.font = 'bold 9px DM Sans'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('Today', tx, pT - 2);
  }

  // Legend
  var lx = pL + 8, ly = pT + 8;
  ctx.fillStyle = '#1a6fa0'; ctx.fillRect(lx, ly, 18, 3);
  ctx.fillStyle = '#555'; ctx.font = '10px DM Sans'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('Planned', lx + 22, ly + 1.5);
  ctx.fillStyle = '#217a39'; ctx.fillRect(lx, ly + 14, 18, 3);
  ctx.fillText('Actual', lx + 22, ly + 15.5);
}

function renderSafety() {
  var s = DATA.safety;
  var daysSafe = daysBetween(s.startDate, today());
  var score = Math.round(s.ppeCompliance * 0.25 + s.auditScore * 0.25 + (s.lti === 0 ? 20 : 0) + (s.fatalities === 0 ? 15 : 0) + Math.min(daysSafe / 100, 1) * 15);

  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="card-title" style="font-size:.88rem">Safety Dashboard</span><button class="btn btn-p btn-sm" onclick="editSafetyMetrics()">Edit Metrics</button></div>';

  h += '<div class="stats">';
  h += '<div class="stat-item" style="border-left:3px solid var(--g)"><div class="stat-label">Safe Hours</div><div class="stat-value" style="color:var(--g)">' + s.safeHours.toLocaleString() + '</div></div>';
  h += '<div class="stat-item" style="border-left:3px solid var(--bl)"><div class="stat-label">Days W/O LTI</div><div class="stat-value" style="color:var(--bl)">' + daysSafe + '</div></div>';
  h += '<div class="stat-item" style="border-left:3px solid var(--g)"><div class="stat-label">Safety Score</div><div class="stat-value" style="color:var(--g)">' + score + '/100</div></div>';
  h += '</div>';

  h += '<div class="row-2">';

  // Pyramid
  h += '<div class="card"><div class="card-header"><span class="card-title">Safety Pyramid</span></div><div class="spyramid">';
  var levels = [
    { width:'14%', bg:'#7a1a1a', name:'Fatality', count:s.fatalities },
    { width:'22%', bg:'#c0392b', name:'Lost Time', count:s.lti },
    { width:'32%', bg:'#e06030', name:'Recordable', count:s.recordable },
    { width:'48%', bg:'#d4880f', name:'First Aid', count:s.firstAid },
    { width:'66%', bg:'#66a832', name:'Near Miss', count:s.nearMisses },
    { width:'88%', bg:'#217a39', name:'Unsafe Acts', count:s.unsafeActs + s.unsafeConditions }

window.addTaskInline = function() {
  var parent = $('ntParent').value;
  var name = $('ntName').value.trim();
  if (!name) { alert('Required'); return; }
  var maxNum = 0;
  for (var i = 0; i < DATA.tasks.length; i++) {
    if (DATA.tasks[i].wbs.indexOf(parent + '.') === 0) {
      var num = parseInt(DATA.tasks[i].wbs.substring(parent.length + 1));
      if (!isNaN(num) && num > maxNum) maxNum = num;
    }
  }
  DATA.tasks.push({
    wbs: parent + '.' + (maxNum + 1), name: name,
    dur: daysBetween($('ntStart').value, $('ntEnd').value),
    s: $('ntStart').value, e: $('ntEnd').value,
    prog: 0, st: 'pending', cat: $('ntCat').value
  });
  saveAll(); notify('Added'); renderTasks();
};

function photoFileProc(inp) {
  var f = inp.files[0];
  if (f) processPhotoFile(f);
  inp.value = '';
}
function photoDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  if (e.dataTransfer.files.length) processPhotoFile(e.dataTransfer.files[0]);
}
function processPhotoFile(f) {
  if (!f.type.startsWith('image/')) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var w = img.width, h = img.height, max = 800;
      if (w > max) { h = Math.round(h * max / w); w = max; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      try {
        pendingPhoto = canvas.toDataURL('image/jpeg', 0.6);
        renderPhotos();
      } catch(err) { alert('Image too large'); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
}
window.savePhoto = function() {
  if (!pendingPhoto) return;
  DATA.photos.push({
    id: ++nextPhotoId,
    title: $('photoTitle').value.trim() || 'Untitled',
    date: $('photoDate').value || today(),
    data: pendingPhoto
  });
  pendingPhoto = null;
  try {
    saveAll(); notify('Saved'); renderPhotos();
  } catch(err) {
    DATA.photos.pop(); alert('Storage full');
  }
};
window.deletePhoto = function(id) {
  if (!confirm('Delete photo?')) return;
  DATA.photos = DATA.photos.filter(function(p){ return p.id !== id; });
  saveAll(); notify('Deleted');
  if (currentTab === 'photos') renderPhotos();
};

function renderFinance() {
  recalcTotals();
  var cs = costSummary();
  var now = new Date();
  var cMonth = now.getMonth(), cYear = now.getFullYear();
  var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // MTD / YTD
  var mtdTotal = 0, ytdTotal = 0, mtdCount = 0, ytdCount = 0;
  for (var i = 0; i < DATA.payments.length; i++) {
    var p = DATA.payments[i], pd = new Date(p.date);
    if (pd.getFullYear() === cYear) {
      ytdTotal += p.phpAmount || 0; ytdCount++;
      if (pd.getMonth() === cMonth) { mtdTotal += p.phpAmount || 0; mtdCount++; }
    }
  }
  var mtdDisp = convert(mtdTotal, 'PHP', displayCurrency);
  var ytdDisp = convert(ytdTotal, 'PHP', displayCurrency);
  var utilPct = pct(cs.totalPaid, cs.totalContract);

  var h = currencyBar("displayCurrency=this.value;renderFinance()");

  h += '<div class="stats">';
  h += '<div class="stat-item" style="border-left:3px solid var(--bl)"><div class="stat-label">Total Contract</div><div class="stat-value" style="color:var(--bl)">' + fmtDisp(cs.totalContract) + '</div><div class="stat-note">' + DATA.costs.length + ' items</div></div>';
  h += '<div class="stat-item" style="border-left:3px solid var(--g)"><div class="stat-label">MTD (' + monthNames[cMonth] + ')</div><div class="stat-value" style="color:var(--g)">' + fmtCurrency(mtdDisp, displayCurrency) + '</div><div class="stat-note">' + mtdCount + ' payments</div></div>';
  h += '<div class="stat-item" style="border-left:3px solid var(--am)"><div class="stat-label">YTD (' + cYear + ')</div><div class="stat-value" style="color:var(--am)">' + fmtCurrency(ytdDisp, displayCurrency) + '</div><div class="stat-note">' + ytdCount + ' payments</div></div>';
  h += '<div class="stat-item" style="border-left:3px solid var(--or)"><div class="stat-label">Remaining</div><div class="stat-value" style="color:var(--or)">' + fmtDisp(cs.remaining) + '</div><div class="stat-note">' + (100 - utilPct) + '% remaining</div></div>';
  h += '</div>';

  // Budget bar
  h += '<div class="card"><div class="card-header"><span class="card-title">Budget Utilization</span><span style="font-family:JetBrains Mono;font-size:.62rem;color:var(--t3)">' + utilPct + '%</span></div>';
  h += '<div style="height:22px;background:var(--s3);border-radius:var(--r);overflow:hidden;position:relative">';
  h += '<div style="height:100%;width:' + Math.min(utilPct, 100) + '%;background:linear-gradient(90deg,var(--bl),var(--g));border-radius:var(--r)"></div>';
  h += '<div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono;font-size:.56rem;font-weight:600;color:' + (utilPct > 50 ? '#fff' : 'var(--t1)') + '">' + utilPct + '%</div></div></div>';

  // Monthly spending chart
  h += '<div class="card"><div class="card-header"><span class="card-title">Monthly Spending (' + cYear + ')</span></div>';
  var monthlySpend = new Array(12).fill(0);
  for (var i = 0; i < DATA.payments.length; i++) {
    var p2 = DATA.payments[i], pd2 = new Date(p2.date);
    if (pd2.getFullYear() === cYear) monthlySpend[pd2.getMonth()] += p2.phpAmount || 0;
  }
  var maxMonthly = Math.max.apply(null, monthlySpend) || 1;
  h += '<div style="display:flex;align-items:flex-end;gap:3px;height:110px;padding:0 6px">';
  for (var i = 0; i < 12; i++) {
    var barH = Math.max(2, Math.round(monthlySpend[i] / maxMonthly * 100));
    var dispAmt = convert(monthlySpend[i], 'PHP', displayCurrency);
    h += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">';
    h += '<div style="font-family:JetBrains Mono;font-size:.42rem;color:var(--t3)">' + (monthlySpend[i] > 0 ? fmtCurrency(dispAmt, displayCurrency) : '') + '</div>';
    h += '<div style="width:100%;height:' + barH + 'px;background:' + (i === cMonth ? 'var(--g)' : 'var(--bl)') + ';border-radius:2px 2px 0 0;opacity:' + (i === cMonth ? '1' : '.5') + '"></div>';
    h += '<div style="font-family:JetBrains Mono;font-size:.44rem;color:' + (i === cMonth ? 'var(--g)' : 'var(--t3)') + ';font-weight:' + (i === cMonth ? '700' : '400') + '">' + monthNames[i].charAt(0) + '</div></div>';
  }
  h += '</div></div>';

  // Vendor + Category breakdown
  h += '<div class="row-2">';
  // By vendor
  var vendorSpend = {};
  for (var i = 0; i < DATA.payments.length; i++) {
    var v = DATA.payments[i].vendor;
    if (!vendorSpend[v]) vendorSpend[v] = 0;
    vendorSpend[v] += DATA.payments[i].phpAmount || 0;
  }
  var vKeys = Object.keys(vendorSpend).sort(function(a,b){ return vendorSpend[b] - vendorSpend[a]; });
  var maxV = vKeys.length ? vendorSpend[vKeys[0]] : 1;
  h += '<div class="card"><div class="card-header"><span class="card-title">By Vendor</span></div>';
  for (var i = 0; i < vKeys.length; i++) {
    var vk = vKeys[i];
    var amt = convert(vendorSpend[vk], 'PHP', displayCurrency);
    var w2 = Math.max(3, pct(vendorSpend[vk], maxV));
    h += '<div class="hbar"><div class="hbar-label" style="width:100px">' + esc(vk) + '</div>';
    h += '<div class="hbar-track"><div class="hbar-fill" style="width:' + w2 + '%;background:var(--bl)"></div></div>';
    h += '<div class="hbar-val" style="font-weight:600">' + fmtCurrency(amt, displayCurrency) + '</div></div>';
  }
  if (!vKeys.length) h += '<div style="text-align:center;padding:14px;color:var(--t3)">No payments</div>';
  h += '</div>';

  // By category
  var catSpend = {};
  for (var i = 0; i < DATA.payments.length; i++) {
    var c = DATA.payments[i].category || 'Others';
    if (!catSpend[c]) catSpend[c] = 0;
    catSpend[c] += DATA.payments[i].phpAmount || 0;
  }
  var cKeys = Object.keys(catSpend).sort(function(a,b){ return catSpend[b] - catSpend[a]; });
  var maxC = cKeys.length ? catSpend[cKeys[0]] : 1;
  h += '<div class="card"><div class="card-header"><span class="card-title">By Category</span></div>';
  for (var i = 0; i < cKeys.length; i++) {
    var ck = cKeys[i];
    var amt2 = convert(catSpend[ck], 'PHP', displayCurrency);
    var w3 = Math.max(3, pct(catSpend[ck], maxC));
    h += '<div class="hbar"><div class="hbar-label" style="width:100px">' + esc(ck) + '</div>';
    h += '<div class="hbar-track"><div class="hbar-fill" style="width:' + w3 + '%;background:var(--g)"></div></div>';
    h += '<div class="hbar-val" style="font-weight:600">' + fmtCurrency(amt2, displayCurrency) + '</div></div>';
  }
  if (!cKeys.length) h += '<div style="text-align:center;padding:14px;color:var(--t3)">No payments</div>';
  h += '</div></div>';

  // Recent payments
  if (DATA.payments.length) {
    h += '<div class="card"><div class="card-header"><span class="card-title">Recent Payments</span></div>';
    h += '<div class="tw"><table><thead><tr><th>#</th><th>Date</th><th>Vendor</th><th>Category</th><th style="text-align:right">Amount</th><th>Fund</th></tr></thead><tbody>';
    var start = Math.max(0, DATA.payments.length - 8);
    for (var i = DATA.payments.length - 1; i >= start; i--) {
      var p3 = DATA.payments[i];
      h += '<tr><td style="font-family:JetBrains Mono;font-size:.56rem;color:var(--t3)">' + (i+1) + '</td>';
      h += '<td style="font-family:JetBrains Mono">' + esc(p3.date) + '</td>';
      h += '<td style="font-weight:600">' + esc(p3.vendor) + '</td>';
      h += '<td>' + esc(p3.category || '-') + '</td>';
      h += '<td style="text-align:right;font-family:JetBrains Mono;font-weight:600">' + fmtCurrency(p3.amount, p3.currency) + '</td>';
      h += '<td>' + esc(p3.fund || '-') + '</td></tr>';
    }
    h += '</tbody></table></div></div>';
  }

  $('appContent').innerHTML = h;
}

  h += '<div style="text-align:center;padding:3px;background:var(--s2);border-radius:var(--r)"><div style="font-size:.5rem;color:var(--t3);font-family:JetBrains Mono">CONTRACT</div><div style="font-family:Space Grotesk;font-size:.8rem;font-weight:700;color:var(--bl)">' + fmtDisp(cs.totalContract) + '</div></div>';
  h += '<div style="text-align:center;padding:3px;background:var(--s2);border-radius:var(--r)"><div style="font-size:.5rem;color:var(--t3);font-family:JetBrains Mono">DONE</div><div style="font-family:Space Grotesk;font-size:.8rem;font-weight:700;color:var(--g)">' + cs.pctPaid + '%</div></div>';
  h += '</div></div>';

  // Payment list
  h += '<div class="card"><div class="card-header"><span class="card-title">Payment Records</span>';
  h += '<div style="display:flex;gap:4px;align-items:center"><span style="font-family:JetBrains Mono;font-size:.56rem;color:var(--t3)">' + DATA.payments.length + ' records</span>';

    h += '<div style="text-align:center;padding:18px;color:var(--t3)">No payments recorded yet.</div>';
  } else {

    for (var i = 0; i < DATA.payments.length; i++) {
      var p = DATA.payments[i];
      h += '<tr><td style="font-family:JetBrains Mono;font-size:.56rem;color:var(--t3)">' + (i+1) + '</td>';

      h += '<td><span class="badge bg-b">' + esc(p.currency) + '</span></td>';
      h += '<td style="text-align:right;font-family:JetBrains Mono">' + fmtNum(p.phpAmount) + '</td>';
      h += '<td>' + esc(p.fund || '-') + '</td>';
      h += '<td style="color:var(--t3);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(p.remarks) + '">' + esc(p.remarks) + '</td>';
      h += '<td><button class="btn btn-xs" onclick="editPayment(' + i + ')">Edit</button> <button class="btn btn-xs btn-r" onclick="deletePayment(' + i + ')">&times;</button></td></tr>';

    h += '</tbody></table></div>';
  }
  h += '</div>';
  $('appContent').innerHTML = h;
}

window.submitPayment = function() {
  var vendor = $('payVendor').value;
  var amount = parseFloat($('payAmount').value);
  var currency = $('payCurrency').value;
  var date = $('payDate').value;
  if (!vendor || !amount || amount <= 0 || !date) { alert('Vendor, amount, and date required'); return; }
  DATA.payments.push({
    id: ++nextPayId, date: date, vendor: vendor,
    amount: amount, currency: currency,
    phpAmount: convert(amount, currency, 'PHP'),
    fund: $('payFund').value, category: $('payCategory').value,
    remarks: $('payRemarks').value.trim()
  });
  saveAll(); notify('Payment recorded'); clearPayForm(); renderPayments();
};
function clearPayForm() {
  $('payVendor').value = '';
  $('payAmount').value = '';
  $('payCurrency').value = 'PHP';
  $('payDate').value = today();
  $('payRemarks').value = '';
}

window.editPayment = function(idx) {
  var p = DATA.payments[idx];
  var vds = vendorList(), vendorOpts = '';
  for (var i = 0; i < vds.length; i++) vendorOpts += '<option value="' + esc(vds[i]) + '"' + (p.vendor === vds[i] ? ' selected' : '') + '>' + esc(vds[i]) + '</option>';
  var catOpts = '';
  for (var i = 0; i < CATEGORIES.length; i++) catOpts += '<option value="' + CATEGORIES[i] + '"' + (p.category === CATEGORIES[i] ? ' selected' : '') + '>' + CATEGORIES[i] + '</option>';

  openModal('Edit Payment #' + (idx + 1),
    '<div class="row-2"><div class="fg"><label class="fl">Vendor</label><select id="epVendor">' + vendorOpts + '</select></div>' +
    '<div class="fg"><label class="fl">Date</label><input type="date" id="epDate" value="' + esc(p.date) + '"></div></div>' +
    '<div class="row-2"><div class="fg"><label class="fl">Category</label><select id="epCategory">' + catOpts + '</select></div>' +
    '<div class="fg"><label class="fl">Fund</label><select id="epFund"><option value="VN Fund"' + (p.fund==='VN Fund'?' selected':'') + '>VN Fund</option><option value="PH Fund"' + (p.fund==='PH Fund'?' selected':'') + '>PH Fund</option><option value="Other"' + (p.fund==='Other'?' selected':'') + '>Other</option></select></div></div>' +
    '<div class="row-2"><div class="fg"><label class="fl">Amount</label><input type="number" id="epAmount" step="any" min="0" value="' + p.amount + '"></div>' +
    '<div class="fg"><label class="fl">Currency</label><select id="epCurrency"><option value="PHP"' + (p.currency==='PHP'?' selected':'') + '>PHP</option><option value="VND"' + (p.currency==='VND'?' selected':'') + '>VND</option><option value="USD"' + (p.currency==='USD'?' selected':'') + '>USD</option></select></div></div>' +
    '<div class="fg"><label class="fl">Remarks</label><textarea id="epRemarks" rows="2">' + esc(p.remarks) + '</textarea></div>',
    '<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-r" onclick="deletePayment(' + idx + ')">Delete</button><button class="btn btn-p" onclick="savePayment(' + idx + ')">Save</button>'
  );
};
window.savePayment = function(idx) {
  var amount = parseFloat($('epAmount').value);
  var currency = $('epCurrency').value;
  var date = $('epDate').value;
  var vendor = $('epVendor').value;
  if (!vendor || !amount || amount <= 0 || !date) { alert('Required'); return; }
  DATA.payments[idx] = {
    id: DATA.payments[idx].id, date: date, vendor: vendor,
    amount: amount, currency: currency,
    phpAmount: convert(amount, currency, 'PHP'),
    fund: $('epFund').value, category: $('epCategory').value,
    remarks: $('epRemarks').value.trim()
  };
  saveAll(); closeModal(); notify('Updated'); renderPayments();
};
window.deletePayment = function(idx) {
  if (!confirm('Delete payment?')) return;
  DATA.payments.splice(idx, 1);
  saveAll(); closeModal(); notify('Deleted'); renderPayments();
};
window.exportPayments = function() {
  if (typeof XLSX === 'undefined') return;
  var data = [['#','Date','Vendor','Category','Amount','Currency','PHP Amount','Fund','Remarks']];
  for (var i = 0; i < DATA.payments.length; i++) {
    var p = DATA.payments[i];
    data.push([i+1, p.date, p.vendor, p.category||'', p.amount, p.currency, p.phpAmount, p.fund||'', p.remarks]);
  }
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), 'Payments');
  XLSX.writeFile(wb, 'Payments_' + today() + '.xlsx');
  notify('Exported');
};

// ============================================================
//  PAYMENT SCHEDULE
// ============================================================
function renderPaySchedule() {
  // Build filter options
  var vendSet = {}, pfSet = {}, stSet = {};
  for (var i = 0; i < DATA.paySchedule.length; i++) {
    var r = DATA.paySchedule[i];
    if (r.vendor) vendSet[r.vendor] = 1;
    if (r.payFrom) pfSet[r.payFrom] = 1;
    if (r.status) stSet[r.status] = 1;
  }
  function buildOpts(set, selVal) {
    var o = '<option value="all">All</option>';
    var keys = Object.keys(set).sort();
    for (var i = 0; i < keys.length; i++) o += '<option value="' + esc(keys[i]) + '"' + (selVal === keys[i] ? ' selected' : '') + '>' + esc(keys[i]) + '</option>';
    return o;
  }

  // Apply filters
  var filtered = [];
  for (var i = 0; i < DATA.paySchedule.length; i++) {
    var r = DATA.paySchedule[i];
    if (paySchFilter.vendor !== 'all' && r.vendor !== paySchFilter.vendor) continue;
    if (paySchFilter.payFrom !== 'all' && r.payFrom !== paySchFilter.payFrom) continue;
    if (paySchFilter.status !== 'all' && r.status !== paySchFilter.status) continue;
    if (paySchFilter.dateFrom && r.date < paySchFilter.dateFrom) continue;
    if (paySchFilter.dateTo && r.date > paySchFilter.dateTo) continue;
    filtered.push(r);
  }
  recalcPaySchBal();

  // Totals
  var totalIn = 0, totalOut = 0;
  for (var i = 0; i < filtered.length; i++) {
    totalIn += convert(filtered[i].cashIn || 0, 'USD', paySchDisplayCurrency);
    totalOut += convert(filtered[i].cashOut || 0, 'USD', paySchDisplayCurrency);
  }
  var balance = filtered.length ? convert(filtered[filtered.length - 1].runningBal, 'USD', paySchDisplayCurrency) : 0;

  // Fund balances
  var todayStr = today();
  var fundBal = {};
  for (var i = 0; i < DATA.paySchedule.length; i++) {
    var r2 = DATA.paySchedule[i];
    if (r2.date > todayStr) continue;
    var f = r2.payFrom || 'DICA';
    if (!fundBal[f]) fundBal[f] = { inflow:0, outflow:0 };
    fundBal[f].inflow += (r2.cashIn || 0);
    fundBal[f].outflow += (r2.cashOut || 0);
  }
  var fundColors = { 'DICA':'#1a6fa0', 'VN Fund':'#217a39', 'PH Fund':'#8e44ad', 'Other':'#d4880f' };

  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h += '<span class="card-title" style="font-size:.88rem">Payment Schedule</span>';
  h += '<div style="display:flex;gap:4px"><button class="btn btn-b btn-xs" onclick="downloadPSTemplate()">Template</button>';
  h += '<button class="btn btn-p btn-xs" onclick="uploadPSData()">Upload</button>';
  h += '<button class="btn btn-xs" onclick="exportPSTable()">Export</button></div></div>';

  // Filter bar
  h += '<div class="fbar">';
  h += '<label>Vendor:</label><select onchange="paySchFilter.vendor=this.value;renderPaySchedule()">' + buildOpts(vendSet, paySchFilter.vendor) + '</select>';
  h += '<label>From:</label><select onchange="paySchFilter.payFrom=this.value;renderPaySchedule()">' + buildOpts(pfSet, paySchFilter.payFrom) + '</select>';
  h += '<label>Status:</label><select onchange="paySchFilter.status=this.value;renderPaySchedule()">' + buildOpts(stSet, paySchFilter.status) + '</select>';
  h += '<div class="fsep"></div>';
  h += '<label>From:</label><input type="date" value="' + paySchFilter.dateFrom + '" onchange="paySchFilter.dateFrom=this.value;renderPaySchedule()" style="width:auto;min-width:105px;padding:3px 7px;font-size:.7rem">';
  h += '<label>To:</label><input type="date" value="' + paySchFilter.dateTo + '" onchange="paySchFilter.dateTo=this.value;renderPaySchedule()" style="width:auto;min-width:105px;padding:3px 7px;font-size:.7rem">';
  h += '<div class="fsep"></div>';
  h += '<label>Currency:</label><select onchange="paySchDisplayCurrency=this.value;renderPaySchedule()">';
  h += '<option value="USD"' + (paySchDisplayCurrency==='USD'?' selected':'') + '>USD</option>';
  h += '<option value="VND"' + (paySchDisplayCurrency==='VND'?' selected':'') + '>VND</option>';
  h += '<option value="PHP"' + (paySchDisplayCurrency==='PHP'?' selected':'') + '>PHP</option>';
  h += '</select>';
  h += '<button class="btn btn-xs" onclick="paySchFilter={vendor:\'all\',payFrom:\'all\',status:\'all\',dateFrom:\'\',dateTo:\'\'};renderPaySchedule()">Reset</button>';
  h += '</div>';

  // Fund balance cards
  var fundKeys = Object.keys(fundBal).sort();
  if (fundKeys.length) {
    h += '<div style="margin-bottom:10px"><div style="font-size:.64rem;font-weight:700;color:var(--t2);margin-bottom:5px">Balance by Source <span style="font-family:JetBrains Mono;font-size:.52rem;color:var(--t3)">(' + todayStr + ')</span></div>';
    h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:7px">';
    var grandTotal = 0;
    for (var i = 0; i < fundKeys.length; i++) {
      var fk = fundKeys[i];
      var netUSD = fundBal[fk].inflow - fundBal[fk].outflow;
      var netDisp = convert(netUSD, 'USD', paySchDisplayCurrency);
      grandTotal += netDisp;
      var nc = netDisp >= 0 ? 'var(--g)' : 'var(--rd)';
      var isSel = paySchFilter.payFrom === fk;
      h += '<div class="fund-card' + (isSel ? ' selected' : '') + '" onclick="paySchFilter.payFrom=\'' + esc(fk).replace(/'/g,"\\'") + '\';renderPaySchedule()" style="border-left:4px solid ' + (fundColors[fk]||'#999') + '">';
      h += '<div style="font-family:JetBrains Mono;font-size:.5rem;color:var(--t3);text-transform:uppercase">' + esc(fk) + (isSel ? ' &#10003;' : '') + '</div>';
      h += '<div style="font-family:Space Grotesk;font-size:1rem;font-weight:700;color:' + nc + '">' + fmtCurrency(netDisp, paySchDisplayCurrency) + '</div></div>';
    }
    var gtc = grandTotal >= 0 ? 'var(--g)' : 'var(--rd)';
    h += '<div class="fund-card' + (paySchFilter.payFrom==='all'?' selected':'') + '" onclick="paySchFilter.payFrom=\'all\';renderPaySchedule()" style="border-left:4px solid ' + gtc + '">';
    h += '<div style="font-family:JetBrains Mono;font-size:.5rem;color:var(--t3)">TOTAL</div>';
    h += '<div style="font-family:Space Grotesk;font-size:1.1rem;font-weight:700;color:' + gtc + '">' + fmtCurrency(grandTotal, paySchDisplayCurrency) + '</div></div>';
    h += '</div></div>';
  }

  // Stats
  h += '<div class="stats">';
  h += '<div class="stat-item" style="border-left:3px solid var(--bl)"><div class="stat-label">Inflow</div><div class="stat-value" style="color:var(--bl)">' + fmtCurrency(totalIn, paySchDisplayCurrency) + '</div></div>';
  h += '<div class="stat-item" style="border-left:3px solid var(--or)"><div class="stat-label">Outflow</div><div class="stat-value" style="color:var(--or)">' + fmtCurrency(totalOut, paySchDisplayCurrency) + '</div></div>';
  h += '<div class="stat-item" style="border-left:3px solid ' + (balance>=0?'var(--g)':'var(--rd)') + '"><div class="stat-label">Balance</div><div class="stat-value" style="color:' + (balance>=0?'var(--g)':'var(--rd)') + '">' + fmtCurrency(balance, paySchDisplayCurrency) + '</div></div>';
  var grossVND = 0;
  for (var i = 0; i < filtered.length; i++) grossVND += (filtered[i].totalVND || 0);
  h += '<div class="stat-item" style="border-left:3px solid var(--pu)"><div class="stat-label">Gross VND</div><div class="stat-value" style="color:var(--pu)">' + fmtCurrency(grossVND, 'VND') + '</div></div>';
  h += '</div>';

  // Table
  h += '<div class="tw"><table><thead><tr><th>#</th><th>Date</th><th>Vendor</th><th>Bill%</th><th>VND</th><th>Out</th><th>In</th><th>From</th><th>Status</th><th>Balance</th><th>Classification</th><th></th></tr></thead><tbody>';
  if (!filtered.length) h += '<tr><td colspan="12" style="text-align:center;padding:18px;color:var(--t3)">No rows match filter</td></tr>';
  for (var i = 0; i < filtered.length; i++) {
    var r = filtered[i];
    var statusBadge = r.status === 'Paid' ? 'bg-g' : r.status === 'Pending' ? 'bg-y' : 'bg-b';
    var coDisp = convert(r.cashOut || 0, 'USD', paySchDisplayCurrency);

function processPSFile(f) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result, { type:'array' });
      var ws = wb.Sheets[wb.SheetNames[0]];
      var raw = XLSX.utils.sheet_to_json(ws, { header:1 });
      if (raw.length < 2) return;
      var headers = [];
      for (var i = 0; i < raw[0].length; i++) headers.push(String(raw[0][i]||'').toLowerCase().trim());
      var dateI=-1, vendI=-1, brI=-1, tvI=-1, coI=-1, ciI=-1, pfI=-1, stI=-1, clI=-1;
      for (var i = 0; i < headers.length; i++) {
        var h = headers[i];
        if (h.indexOf('date') >= 0 && dateI < 0) dateI = i;
        else if ((h.indexOf('vendor') >= 0 || h.indexOf('supplier') >= 0) && vendI < 0) vendI = i;
        else if (h.indexOf('billing') >= 0 || h.indexOf('progress') >= 0) brI = i;
        else if (h.indexOf('gross') >= 0 || h.indexOf('total payment') >= 0) tvI = i;
        else if (h.indexOf('outflow') >= 0 || h.indexOf('cash out') >= 0) coI = i;
        else if (h.indexOf('inflow') >= 0 || h.indexOf('cash in') >= 0) ciI = i;
        else if (h.indexOf('payment from') >= 0 || h.indexOf('pay from') >= 0) pfI = i;
        else if (h.indexOf('status') >= 0) stI = i;
        else if (h.indexOf('classif') >= 0) clI = i;
      }
      if (dateI < 0) dateI = 0;
      if (vendI < 0) vendI = 1;

      var rows = [];
      for (var i = 1; i < raw.length; i++) {
        var row = raw[i];
        if (!row || (!row[dateI] && !row[vendI])) continue;
        var dv = String(row[dateI]||'').trim();
        if (typeof row[dateI] === 'number' && row[dateI] > 40000) {
          var dd = new Date((row[dateI] - 25569) * 86400000);
          dv = dd.getFullYear() + '-' + String(dd.getMonth()+1).padStart(2,'0') + '-' + String(dd.getDate()).padStart(2,'0');
        }
        rows.push({
          date: dv,
          vendor: vendI >= 0 ? String(row[vendI]||'').trim() : '',
          billingRate: brI >= 0 ? (parseFloat(String(row[brI]||'0').replace(/,/g,'')) || 0) : 0,
          totalVND: tvI >= 0 ? (parseFloat(String(row[tvI]||'0').replace(/,/g,'')) || 0) : 0,
          cashOut: coI >= 0 ? (parseFloat(String(row[coI]||'0').replace(/,/g,'')) || 0) : 0,
          cashIn: ciI >= 0 ? (parseFloat(String(row[ciI]||'0').replace(/,/g,'')) || 0) : 0,
          payFrom: pfI >= 0 ? String(row[pfI]||'DICA').trim() : 'DICA',
          status: stI >= 0 ? String(row[stI]||'Scheduled').trim() : 'Scheduled',
          classification: clI >= 0 ? String(row[clI]||'').trim() : '',
          remarks: ''
        });
      }
      if (!rows.length) { alert('No data rows found'); return; }
      _psUploadData = rows;
      if ($('psFileName')) $('psFileName').textContent = f.name + ' (' + rows.length + ' rows)';
      if ($('psUploadPreview')) $('psUploadPreview').style.display = 'block';
      if ($('psUploadBtn')) $('psUploadBtn').disabled = false;
      if ($('psSummary')) $('psSummary').textContent = rows.length + ' rows ready to import';
      var pt = '<div class="tw" style="max-height:140px;overflow-y:auto"><table><thead><tr><th>Date</th><th>Vendor</th><th>Bill%</th><th>VND</th><th>From</th><th>Status</th></tr></thead><tbody>';
      for (var i = 0; i < Math.min(rows.length, 5); i++) {
        var r = rows[i];
        pt += '<tr><td>' + esc(r.date) + '</td><td>' + esc(r.vendor) + '</td><td>' + r.billingRate + '%</td><td>' + fmtCurrency(r.totalVND,'VND') + '</td><td>' + esc(r.payFrom) + '</td><td>' + esc(r.status) + '</td></tr>';
      }
      if (rows.length > 5) pt += '<tr><td colspan="6" style="text-align:center;color:var(--t3)">...+' + (rows.length - 5) + ' more</td></tr>';
      pt += '</tbody></table></div>';
      if ($('psPreviewTable')) $('psPreviewTable').innerHTML = pt;
    } catch(err) { alert('Error reading file: ' + err.message); }
  };
  reader.readAsArrayBuffer(f);
}

  if (!_psUploadData || !_psUploadData.length) return;

  if (_psUploadMode === 'replace') DATA.paySchedule = [];
  for (var i = 0; i < _psUploadData.length; i++) {

  DATA.paySchedule.sort(function(a,b){ return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });

};
