<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--s1:#fff;--s2:#faf9f6;--s3:#eeece7;--b1:#e0ded8;--b2:#ece9e3;--g:#2d8a32;--gb:#3da642;--gc:rgba(45,138,50,.08);--bl:#2874a6;--blc:rgba(40,116,166,.08);--am:#b89630;--amc:rgba(184,150,48,.08);--rd:#cc3333;--rdc:rgba(204,51,51,.08);--or:#d4930d;--orc:rgba(212,147,13,.08);--pu:#9b59b6;--puc:rgba(155,89,182,.08);--t1:#1a1c18;--t2:#555;--t3:#999;--r:6px;--rl:10px}

.dot-lb{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--t3)}

table{width:100%;border-collapse:collapse;font-size:.76rem}

td{padding:5px 8px;border-bottom:1px solid var(--b2);vertical-align:middle}tr:last-child td{border-bottom:0}tbody tr:hover{background:var(--s2)}
.badge{font-family:'JetBrains Mono',monospace;font-size:.56rem;padding:2px 6px;border-radius:12px;font-weight:500;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}.badge::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0}
.bg2{background:var(--gc);color:var(--g)}.bg2::before{background:var(--g)}.bd2{background:var(--rdc);color:var(--rd)}.bd2::before{background:var(--rd)}.by2{background:var(--orc);color:var(--or)}.by2::before{background:var(--or)}.bb2{background:var(--blc);color:var(--bl)}.bb2::before{background:var(--bl)}.bx2{background:rgba(153,153,153,.12);color:var(--t3)}.bx2::before{background:var(--t3)}
select,input[type="text"],input[type="password"],input[type="number"],input[type="date"],textarea{width:100%;padding:6px 10px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:0;transition:border-color .15s}select:focus,input:focus,textarea:focus{border-color:var(--g)}textarea{resize:vertical;min-height:36px}
.fg{margin-bottom:8px}.fl{display:block;font-size:.68rem;font-weight:600;color:var(--t2);margin-bottom:3px}.fr{color:var(--rd)}
.fbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rl);margin-bottom:10px}
.fbar label{font-size:.7rem;font-weight:600;color:var(--t2);white-space:nowrap}.fbar select,.fbar input[type="text"]{width:auto;min-width:120px;padding:4px 8px;font-size:.74rem;border-radius:var(--r);border:1px solid var(--b1);background:var(--s1);font-weight:600;outline:0}.fbar .sep2{width:1px;height:18px;background:var(--b1);flex-shrink:0}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:200;display:none;align-items:center;justify-content:center;padding:12px}.modal.open{display:flex}
.mbox{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);width:100%;max-width:620px;max-height:85vh;overflow-y:auto}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--b1)}.mhdr h3{font-family:'Space Grotesk',sans-serif;font-size:.84rem}
.mx{background:0;border:0;color:var(--t3);font-size:1.1rem;padding:4px 8px}.mx:hover{color:var(--t1)}
.mbd{padding:14px}.mft{padding:8px 14px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:6px}
.toast{position:fixed;bottom:16px;right:16px;background:var(--t1);color:#fff;padding:7px 14px;border-radius:var(--r);font-size:.76rem;font-weight:500;z-index:300;transform:translateY(60px);opacity:0;transition:all .3s ease}.toast.show{transform:translateY(0);opacity:1}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
#loginScr{position:fixed;inset:0;background:linear-gradient(135deg,#1a2416,#243322);display:flex;align-items:center;justify-content:center;z-index:1000}
.lcard{background:var(--s1);border-radius:14px;padding:36px 32px;width:400px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lerr{background:var(--rdc);color:var(--rd);padding:8px 12px;border-radius:var(--r);font-size:.72rem;margin-bottom:10px;display:none;border:1px solid rgba(204,51,51,.2)}
.lok{background:var(--gc);color:var(--g);padding:8px 12px;border-radius:var(--r);font-size:.72rem;margin-bottom:10px;display:none;border:1px solid rgba(45,138,50,.2)}
.gw{overflow-x:auto;border:1px solid var(--b1);border-radius:var(--rl);background:var(--s1)}
.ghdr{display:flex;background:var(--s2);border-bottom:1px solid var(--b1)}
.ghdr-l{width:200px;min-width:200px;padding:5px 8px;font-size:.58rem;font-weight:700;color:var(--t3);text-transform:uppercase;border-right:1px solid var(--b1)}
.ghdr-m{flex:1;display:flex;position:relative;height:26px;overflow:hidden}
.gmo{position:absolute;top:0;bottom:0;display:flex;align-items:center;font-size:.5rem;font-weight:700;color:var(--t3);font-family:'JetBrains Mono',monospace;border-right:1px solid var(--b2);padding-left:3px}
.gtd{position:absolute;top:0;bottom:0;width:2px;background:var(--rd);z-index:3;opacity:.4}
.grow{display:flex;border-bottom:1px solid var(--b2);cursor:pointer}.grow:hover{background:var(--s2)}
.glbl{width:200px;min-width:200px;padding:3px 8px;font-size:.66rem;display:flex;align-items:center;gap:3px;border-right:1px solid var(--b1);overflow:hidden}
.glbl .wb{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--t3);width:28px;flex-shrink:0;text-align:right}
.glbl span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gba{flex:1;position:relative;height:22px}
.gbar{position:absolute;top:3px;height:16px;border-radius:3px;min-width:3px;display:flex;align-items:center;padding:0 4px;font-size:.48rem;color:#fff;font-weight:600;font-family:'JetBrains Mono',monospace;overflow:hidden;white-space:nowrap}
.gfill{position:absolute;top:0;left:0;bottom:0;background:rgba(255,255,255,.2);border-radius:3px}
.gmain{background:linear-gradient(90deg,var(--s2),var(--s1));padding:3px 8px;font-size:.68rem;font-weight:700;color:var(--t1);border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}
.gmp{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:10px}
.dropzone{border:2px dashed var(--b1);border-radius:var(--rl);padding:20px;text-align:center;cursor:pointer;transition:all .2s}.dropzone:hover,.dropzone.drag{border-color:var(--g);background:var(--gc)}
.spyr{display:flex;flex-direction:column;align-items:center;gap:2px;padding:14px 6px 10px}
.pyl{display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:34px;border-radius:3px;color:#fff;font-size:.68rem;font-weight:600}
.pyc{font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:700}
.sbr{display:flex;align-items:center;gap:6px;margin-bottom:6px}.sbl{width:105px;min-width:105px;font-size:.7rem;font-weight:600;color:var(--t2);text-align:right}
.sbt{flex:1;height:16px;background:var(--s3);border-radius:3px;overflow:hidden}.sbf{height:100%;border-radius:3px}
.sbv{font-family:'JetBrains Mono',monospace;font-size:.58rem;font-weight:600;margin-left:4px;width:40px}
.hbr{display:flex;align-items:center;gap:6px;margin-bottom:5px}.hbl{width:120px;min-width:120px;font-size:.66rem;font-weight:600;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbt{flex:1;height:20px;background:var(--s3);border-radius:3px;position:relative;overflow:hidden}.hbf{position:absolute;top:0;left:0;bottom:0;border-radius:3px}
.hbv{width:80px;min-width:80px;font-family:'JetBrains Mono',monospace;font-size:.6rem;text-align:right;color:var(--t2)}
.feed{max-width:600px}.fpost{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:10px;margin-bottom:6px}.fhead{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:#fff;flex-shrink:0}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}.pcard{border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden}.pcard img{width:100%;height:140px;object-fit:cover;display:block}.pinfo{padding:6px 8px}
.zoom-wrap{position:relative;overflow:auto;max-height:600px;border:1px solid var(--b1);border-radius:var(--r);background:#fafaf8}
.iar{background:var(--gc)!important}.iar td{padding:4px 6px!important;border-bottom:2px solid var(--g)!important}.iar input,.iar select{padding:3px 6px!important;font-size:.72rem;border:1px solid var(--b1);border-radius:4px}.iar input:focus,.iar select:focus{border-color:var(--g);outline:none;box-shadow:0 0 0 2px rgba(45,138,50,.12)}
.scenario-opts{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.sc-opt{font-size:.62rem;font-family:'JetBrains Mono',monospace;font-weight:600;padding:3px 8px;border-radius:12px;cursor:pointer;border:2px solid var(--b2);background:var(--s1);transition:all .15s;display:flex;align-items:center;gap:4px}
.sc-opt.active{border-width:2px}
.sc-opt .sc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sc-table{font-size:.68rem}.sc-table td,.sc-table th{padding:4px 6px;font-family:'JetBrains Mono',monospace}
@media(max-width:900px){.app{padding:10px}.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="loginScr" style="display:none"><div class="lcard"><div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center"><div class="logo-ic" style="width:40px;height:40px"></div><div class="logo-txt"><span class="logo-nm" style="font-size:1.1rem">Stellar Seeds</span><span class="logo-sb">Construction Management</span></div></div><div style="font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:4px" id="lTitle">Sign In</div><div style="font-size:.72rem;color:var(--t3);text-align:center;margin-bottom:20px" id="lSub">Enter your credentials</div><div class="lerr" id="lErr"></div><div class="lok" id="lOk"></div><div class="fg"><label class="fl">Email</label><input type="text" id="lEmail" placeholder="you@company.com"></div><div class="fg"><label class="fl">Password</label><input type="password" id="lPass" placeholder="Password"></div><button class="btn bp" style="width:100%;padding:10px;font-size:.82rem;margin-top:6px" id="lBtn" onclick="doLogin()">Sign In</button><div style="text-align:center;margin-top:14px;font-size:.74rem;color:var(--t3)" id="lTog">No account? <a style="color:var(--g);font-weight:600" onclick="togAuth()">Sign Up</a></div><div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--b2);text-align:center"><a style="font-size:.68rem;color:var(--t3);text-decoration:underline" onclick="skipAuth()">Continue without login</a></div></div></div>
<div id="mainApp" style="display:none"><div class="hdr"><div class="logo"><div class="logo-ic"></div><div class="logo-txt"><span class="logo-nm">Stellar Seeds</span><span class="logo-sb">Seed Tolling Plant</span></div></div><div class="hdr-r"><span class="hdr-usr" id="hUser"></span><div class="dot off" id="hDot"></div><span class="dot-lb" id="hLbl">Local</span><button class="btn bp bs" onclick="expAll()">Export</button><button class="btn bs" id="hOut" style="display:none" onclick="doLogout()">Logout</button></div></div><div class="nav" id="nbar"></div><div class="app" id="app"></div></div>
<div class="modal" id="mdl"><div class="mbox"><div class="mhdr"><h3 id="mTi"></h3><button class="mx" onclick="mClose()">&times;</button></div><div class="mbd" id="mBd"></div><div class="mft" id="mFt"></div></div></div>
<div class="toast" id="tst"></div>
<script>
var D={tasks:[],costs:[],upds:[],photos:[],safety:{},vn:{},vgc:{},pays:[],psch:[]};
var curUser=null,auth=null,db=null,cOn=false,skipSync=false,tab='dash',vgSel='site',pendPh=null;
var nSE=100,nPH=100;
var imgZoom={};
var authMode='login';
var scOpts={baseline:true,actual:true,ontrack:true,optimistic:false,pessimistic:false};
var ST={observation:{l:'Observation',b:'bb2'},'near-miss':{l:'Near Miss',b:'by2'},'first-aid':{l:'First Aid',b:'by2'},recordable:{l:'Recordable',b:'bd2'},lti:{l:'Lost Time',b:'bd2'},toolbox:{l:'Toolbox Talk',b:'bg2'},training:{l:'Training',b:'bg2'},audit:{l:'Audit',b:'bb2'}};

function $i(id){return document.getElementById(id)}
function H(s){if(!s)return'';var d=document.createElement('span');d.textContent=String(s);return d.innerHTML}
function pct(a,b){return b>0?Math.round(a/b*100):0}
function td(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function addD(ds,n){var d=new Date(ds);d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dd(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function notify(m){var t=$i('tst');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2200)}
function mOpen(ti,bd,ft){$i('mTi').textContent=ti;$i('mBd').innerHTML=bd;$i('mFt').innerHTML=ft||'';$i('mdl').classList.add('open')}
function mClose(){$i('mdl').classList.remove('open')}
$i('mdl').addEventListener('click',function(e){if(e.target===this)mClose()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')mClose()});
function isPermErr(e){var m=(e&&e.message)||String(e);return m.indexOf('permission')>=0||m.indexOf('PERMISSION_DENIED')>=0}
function setDot(st){$i('hDot').className='dot '+st}
function setLbl(m){$i('hLbl').textContent=m}
function aSt(p){return p>=100?'done':p>0?'active':'pending'}
function catOpts(sel){var cats=['Initiation','Design','Permits','Construction','Temp','Earthwork','Buildings','Infrastructure','Site','MEP','Closeout','General'];var o='';for(var i=0;i<cats.length;i++)o+='<option value="'+cats[i]+'"'+(sel===cats[i]?' selected':'')+'>'+cats[i]+'</option>';return o}
function getVN(v){if(!D.vn[v])D.vn[v]={status:'active',remarks:'',_ts:0};return D.vn[v]}
function mergeVnFromCloud(cv2){if(!cv2)return false;if(!D.vn)D.vn={};var ch=false;for(var k in cv2){if(cv2.hasOwnProperty(k)){var lv=D.vn[k];if(!lv||lv._ts===undefined||(cv2[k]._ts&&cv2[k]._ts>(lv._ts||0))){D.vn[k]=cv2[k];ch=true}}}if(ch)localStorage.setItem('ss_vn',JSON.stringify(D.vn));return ch}
function mergeSafetyFromCloud(cs){if(!cs)return false;if(!D.safety._ts||(cs._ts&&cs._ts>D.safety._ts)){D.safety=cs;localStorage.setItem('ss_safety',JSON.stringify(D.safety));return true}return false}
function fmtD(v){return '$'+Number(v||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtP(v){return Number(v).toFixed(2)+'%'}
function initCloud(){var c;try{c=JSON.parse(localStorage.getItem('ss_cloud'))}catch(e){}if(!c||!c.databaseURL)return false;try{if(!firebase.apps.length)firebase.initializeApp(c);db=firebase.database();try{auth=firebase.auth()}catch(e){auth=null}cOn=true;return true}catch(e){return false}}
function cSave(){if(!db)return;skipSync=true;var u={'ss/tasks':D.tasks,'ss/costs':D.costs,'ss/pays':D.pays,'ss/upds':D.upds,'ss/safety':D.safety,'ss/vgc':D.vgc,'ss/vn':D.vn,'ss/psch':D.psch,'ss/_ts':Date.now()};db.ref().update(u).then(function(){setTimeout(function(){skipSync=false},800);setDot('on');setLbl('Synced')}).catch(function(e){skipSync=false;if(isPermErr(e)){setDot('err');setLbl('Denied')}})}
function syncFromCloud(){if(!db)return;db.ref('ss').once('value').then(function(snap){var val=snap.val();if(!val){setupLiveSync();return}var ch=false;['tasks','costs','pays','upds','vgc','psch'].forEach(function(k){if(val[k]){D[k]=val[k];localStorage.setItem('ss_'+k,JSON.stringify(val[k]));ch=true}});if(mergeVnFromCloud(val.vn))ch=true;if(mergeSafetyFromCloud(val.safety))ch=true;if(ch){doRender()}setDot('on');setLbl('Synced');setupLiveSync()}).catch(function(){setupLiveSync()})}
function setupLiveSync(){if(!db)return;var ref=db.ref('ss');ref.off();ref.on('value',function(snap){if(skipSync)return;var val=snap.val();if(!val)return;var ch=false;['tasks','costs','pays','upds','vgc','psch'].forEach(function(k){if(val[k]){D[k]=val[k];localStorage.setItem('ss_'+k,JSON.stringify(val[k]));ch=true}});if(mergeVnFromCloud(val.vn))ch=true;if(mergeSafetyFromCloud(val.safety))ch=true;if(ch){doRender()}},function(e){setDot('err');setLbl(isPermErr(e)?'Denied':'Error')})}

function siteGantt(){var GS=new Date(2026,0,1),ppd=3;function dPx(ds){var p=ds.split('-');return Math.round((new Date(+p[0],+p[1]-1,+p[2])-GS)/86400000)*ppd}var sc2={done:'var(--g)',active:'var(--bl)',pending:'#999'};var oa=oProg(),m=mainT();var mo=[];for(var i=0;i<14;i++){var yr=i<12?2026:2027,mi=i<12?i:i-12,d1=new Date(yr,mi,1),d2=new Date(yr,mi+1,1);mo.push({l:d1.toLocaleString('en',{month:'short',year:'2-digit'}),lp:dPx(yr+'-'+String(mi+1).padStart(2,'0')+'-01'),lw:Math.round((d2-d1)/86400000)*ppd})}var h='<div class="card" style="border-left:4px solid var(--bl)"><div class="ch"><span class="ct">Site Gantt</span><span style="font-family:JetBrains Mono;font-size:.6rem;color:var(--t3)">'+D.tasks.length+' tasks \u00B7 '+fmtP(oa)+'</span></div></div>';h+='<div class="gw"><div class="ghdr"><div class="ghdr-l">WBS</div><div class="ghdr-m">';for(var i=0;i<mo.length;i++)h+='<div class="gmo" style="left:'+mo[i].lp+'px;width:'+mo[i].lw+'px">'+mo[i].l+'</div>';var tPx=dPx(td());if(tPx>0)h+='<div class="gtd" style="left:'+tPx+'px"></div>';h+='</div></div>';for(var gi2=0;gi2<m.length;gi2++){var g=m[gi2],gw=wavg(g.wbs),gc=gw>=80?'var(--g)':gw>=40?'var(--or)':gw>0?'var(--bl)':'var(--t3)';h+='<div class="gmain"><span>'+H(g.wbs)+' '+H(g.name)+'</span><span class="gmp" style="background:'+(gw>=80?'var(--gc)':gw>=40?'var(--orc)':'var(--blc)')+';color:'+gc+'">'+fmtP(gw)+'</span></div>';var ch=[];for(var i=0;i<D.tasks.length;i++){if(D.tasks[i].wbs.indexOf(g.wbs+'.')===0&&D.tasks[i].wbs!==g.wbs)ch.push(i)}if(!ch.length){var lx=dPx(g.s),wx=Math.max(4,g.dur*ppd);h+='<div class="grow" onclick="edG('+gi2+')"><div class="glbl"><span class="wb">'+H(g.wbs)+'</span><span>'+H(g.name)+'</span></div><div class="gba"><div class="gbar" style="left:'+lx+'px;width:'+wx+'px;background:'+(sc2[g.st]||'#999')+'"><div class="gfill" style="width:'+g.prog+'%"></div>'+(wx>44?g.prog+'%':'')+'</div></div></div>'}else{for(var cj=0;cj<ch.length;cj++){var idx=ch[cj],t=D.tasks[idx],lx2=dPx(t.s),wx2=Math.max(4,t.dur*ppd);h+='<div class="grow" onclick="edG('+idx+')"><div class="glbl"><span class="wb">'+H(t.wbs)+'</span><span>'+H(t.name)+'</span></div><div class="gba"><div class="gbar" style="left:'+lx2+'px;width:'+wx2+'px;background:'+(sc2[t.st]||'#999')+'"><div class="gfill" style="width:'+t.prog+'%"></div>'+(wx2>44?t.prog+'%':'')+'</div></div></div>'}}}h+='</div>';return h}
function vendorGantt(vendor){var vg=D.vgc[vendor];if(!vg)return'<div class="card">Not found.</div>';var tasks=vg.tasks||[];var h='<div class="card" style="border-left:4px solid var(--pu)"><div class="ch"><span class="ct" style="color:var(--pu)">'+H(vendor)+'</span><span style="font-family:JetBrains Mono;font-size:.6rem;color:var(--t3)">'+tasks.length+' tasks</span></div></div>';if(vg.image){if(!imgZoom[vendor])imgZoom[vendor]=1;var z=imgZoom[vendor];h+='<div class="card"><div class="ch"><span class="ct">Schedule</span><div style="display:flex;gap:4px"><button class="btn bs" onclick="zoomVG(-0.25)">-</button><span style="font-family:JetBrains Mono;font-size:.6rem;color:var(--t3)">'+Math.round(z*100)+'%</span><button class="btn bs" onclick="zoomVG(0.25)">+</button><button class="btn bs" onclick="zoomVG(0,1)">Reset</button></div></div><div class="zoom-wrap"><img src="'+vg.image+'" style="transform:scale('+z+');transform-origin:top left;max-width:none;display:block"></div></div>'}if(!vg.image)h+='<div class="card"><div class="dropzone" onclick="document.getElementById(\'vgF\').click()"><div>Upload</div><input type="file" id="vgF" accept="image/*" style="display:none" onchange="vgProc(this)"></div></div>';if(tasks.length){var GS=new Date(2026,0,1),ppd=3;function dPx(ds){var p=ds.split('-');return Math.round((new Date(+p[0],+p[1]-1,+p[2])-GS)/86400000)*ppd}var mo=[];for(var i=0;i<14;i++){var yr=i<12?2026:2027,mi=i<12?i:i-12,d1=new Date(yr,mi,1),d2=new Date(yr,mi+1,1);mo.push({l:d1.toLocaleString('en',{month:'short',year:'2-digit'}),lp:dPx(yr+'-'+String(mi+1).padStart(2,'0')+'-01'),lw:Math.round((d2-d1)/86400000)*ppd})}h+='<div class="card"><div class="gw"><div class="ghdr"><div class="ghdr-l">#</div><div class="ghdr-m">';for(var i=0;i<mo.length;i++)h+='<div class="gmo" style="left:'+mo[i].lp+'px;width:'+mo[i].lw+'px">'+mo[i].l+'</div>';h+='</div></div>';for(var i=0;i<tasks.length;i++){var t=tasks[i],dur=dd(t.s,t.e),lx=dPx(t.s),wx=Math.max(4,dur*ppd),bc=t.prog>=80?'var(--g)':t.prog>=40?'var(--or)':t.prog>0?'var(--bl)':'#999';h+='<div class="grow" onclick="edVGT('+i+')"><div class="glbl"><span class="wb">'+(i+1)+'</span><span>'+H(t.name)+'</span></div><div class="gba"><div class="gbar" style="left:'+lx+'px;width:'+wx+'px;background:'+bc+'"><div class="gfill" style="width:'+t.prog+'%"></div>'+(wx>44?t.prog+'%':'')+'</div></div></div>'}h+='</div></div>'}return h}
window.zoomVG=function(d,r){if(!imgZoom[vgSel])imgZoom[vgSel]=1;if(r)imgZoom[vgSel]=1;else imgZoom[vgSel]=Math.max(0.25,Math.min(5,imgZoom[vgSel]+d));showGantt()};
window.expGantt=function(){if(typeof XLSX==='undefined')return;var wb=XLSX.utils.book_new();var sd=[['WBS','Task','Cat','Dur','Start','End','Prog','Status']];for(var i=0;i<D.tasks.length;i++){var t=D.tasks[i];sd.push([t.wbs,t.name,t.cat,t.dur,t.s,t.e,t.prog,t.st])}XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sd),'Site');XLSX.writeFile(wb,'Gantt_'+td()+'.xlsx');notify('Exported')};
window.addVG=function(){mOpen('Add Vendor','<div class="fg"><label class="fl">Vendor Name</label><input type="text" id="newVN"></div>','<button class="btn" onclick="mClose()">Cancel</button><button class="btn bp" onclick="savNewVG()">Add</button>')};
window.savNewVG=function(){var n=$i('newVN').value.trim().toUpperCase();if(!n||D.vgc[n]){alert(n?'Exists':'Required');return}D.vgc[n]={image:null,tasks:[]};save();vgSel=n;mClose();notify('Added');showGantt()};

function vgFileP(f){if(!f.type.startsWith('image/'))return;var rd=new FileReader();rd.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas'),w=img.width,h=img.height,mx=1200;if(w>mx){h=Math.round(h*mx/w);w=mx}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);try{D.vgc[vgSel].image=c.toDataURL('image/jpeg',.65);save();notify('Uploaded');showGantt()}catch(err){alert('Too large')}};img.src=e.target.result};rd.readAsDataURL(f)}
window.addVGT=function(){mOpen('Add Task','<div class="fg"><label class="fl">Name</label><input type="text" id="vgtN"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Start</label><input type="date" id="vgtS" value="'+td()+'"></div><div class="fg"><label class="fl">End</label><input type="date" id="vgtE" value="'+addD(td(),30)+'"></div></div><div class="fg"><label class="fl">Progress %</label><input type="number" id="vgtP" value="0"></div>','<button class="btn" onclick="mClose()">Cancel</button><button class="btn bp" onclick="savNewVGT()">Add</button>')};
window.savNewVGT=function(){var n=$i('vgtN').value.trim();if(!n){alert('Required');return}D.vgc[vgSel].tasks.push({name:n,s:$i('vgtS').value,e:$i('vgtE').value,prog:parseInt($i('vgtP').value)||0});save();mClose();notify('Added');showGantt()};
window.edVGT=function(idx){var t=D.vgc[vgSel].tasks[idx];mOpen('Edit Task','<div class="fg"><label class="fl">Name</label><input type="text" id="evgtN" value="'+H(t.name)+'"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Start</label><input type="date" id="evgtS" value="'+t.s+'"></div><div class="fg"><label class="fl">End</label><input type="date" id="evgtE" value="'+t.e+'"></div></div><div class="fg"><label class="fl">Progress %</label><input type="number" id="evgtP" value="'+t.prog+'"></div>','<button class="btn" onclick="mClose()">Cancel</button><button class="btn bd" onclick="delVGT('+idx+')">Delete</button><button class="btn bp" onclick="savVGT('+idx+')">Save</button>')};
window.savVGT=function(idx){D.vgc[vgSel].tasks[idx]={name:$i('evgtN').value.trim(),s:$i('evgtS').value,e:$i('evgtE').value,prog:parseInt($i('evgtP').value)||0};save();mClose();notify('Updated');showGantt()};

window.edG=function(i){var t=D.tasks[i];mOpen('Edit '+t.wbs,'<div style="margin-bottom:10px"><b>'+H(t.wbs)+' '+H(t.name)+'</b></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label class="fl">Start</label><input type="date" id="gS" value="'+t.s+'"></div><div class="fg"><label class="fl">End</label><input type="date" id="gE" value="'+t.e+'"></div><div class="fg"><label class="fl">Progress %</label><input type="number" id="gP" value="'+t.prog+'"></div><div class="fg"><label class="fl">Status</label><select id="gSt"><option value="pending"'+(t.st==='pending'?' selected':'')+'>Pending</option><option value="active"'+(t.st==='active'?' selected':'')+'>Active</option><option value="done"'+(t.st==='done'?' selected':'')+'>Done</option></select></div></div>','<button class="btn" onclick="mClose()">Cancel</button><button class="btn bp" onclick="savG('+i+')">Save</button>')};
window.savG=function(i){D.tasks[i].s=$i('gS').value;D.tasks[i].e=$i('gE').value;D.tasks[i].dur=dd(D.tasks[i].s,D.tasks[i].e);D.tasks[i].prog=parseInt($i('gP').value)||0;D.tasks[i].st=$i('gSt').value;save();mClose();notify('Updated');doRender()};

/* ========== S-CURVE ========== */
function showSCurve(){
  var m=mainT(),oa=oProg(),tDur=0;
  for(var i=0;i<m.length;i++)tDur+=m[i].dur;
  if(!tDur){$i('app').innerHTML='<div class="card">No tasks</div>';return}
  var months=[],planned=[],actual=[],opt=[],pess=[],ontr=[];
  var tdD=new Date(td());
  var totalDays=dd('2026-01-01','2027-02-01');
  var elapsedDays=dd('2026-01-01',td());
  var elapsedPct=elapsedDays/totalDays;
  var velocity=oa/Math.max(elapsedPct,0.01);
  var onTrackV=Math.min(velocity,1.5);
  var optV=velocity*1.15;
  var pessV=velocity*0.82;
  for(var mi=0;mi<14;mi++){
    var yr=mi<12?2026:2027,mo=mi<12?mi:mi-12;
    var me=new Date(yr,mo+1,0);
    months.push(new Date(yr,mo,1).toLocaleString('en',{month:'short',year:'2-digit'}));
    var mp=0,ma=0;
    for(var j=0;j<m.length;j++){
      var t=m[j],w=t.dur/tDur,ts=new Date(t.s),te=new Date(t.e);
      var pc=me>=te?1:me>=ts?Math.min(1,(me-ts)/Math.max(1,te-ts)):0;
      mp+=w*pc;
      var ac2=0;
      if(t.prog>=100){if(me>=te)ac2=1}
      else if(me<=tdD&&me>=ts){ac2=(t.prog/100)*Math.min(1,(me-ts)/Math.max(1,tdD-ts))}
      ma+=w*ac2;
    }
    planned.push(Math.round(mp*100));actual.push(Math.round(ma*100));
    var monthPct=(mi+1)/14;var mElapsed=monthPct/elapsedPct;
    if(mElapsed<=1){ontr.push(Math.round(onTrackV*monthPct*100));opt.push(Math.round(optV*monthPct*100));pess.push(Math.round(pessV*monthPct*100))}
    else{var baseNow=oa;var remaining=100-baseNow;var remPct=mElapsed-1;ontr.push(Math.min(100,Math.round(baseNow+remaining*onTrackV*remPct)));opt.push(Math.min(100,Math.round(baseNow+remaining*optV*remPct)));pess.push(Math.min(100,Math.round(baseNow+remaining*pessV*remPct)))}
  }
  for(var i=0;i<14;i++){ontr[i]=Math.min(100,Math.max(actual[i],ontr[i]));opt[i]=Math.min(100,Math.max(actual[i],opt[i]));pess[i]=Math.min(100,Math.max(actual[i],pess[i]))}
  var pNow=planned[6]||0;var vr=oa-pNow;var vrC=vr>=0?'var(--g)':'var(--rd)';
  var scenarios=[{k:'baseline',l:'Baseline',c:'#2874a6'},{k:'actual',l:'Actual',c:'#2d8a32'},{k:'ontrack',l:'Forecast (On Track)',c:'#d4930d'},{k:'optimistic',l:'Forecast (+15%)',c:'#9b59b6'},{k:'pessimistic',l:'Forecast (-18%)',c:'#cc3333'}];
  var scH='<div class="scenario-opts">';
  for(var i=0;i<scenarios.length;i++){var s=scenarios[i];scH+='<div class="sc-opt'+(scOpts[s.k]?' active':'')+'" style="border-color:'+(scOpts[s.k]?s.c:'var(--b2)')+';background:'+(scOpts[s.k]?s.c+'18':'var(--s1)')+'" onclick="scOpts.'+s.k+'=!scOpts.'+s.k+';showSCurve()"><span class="sc-dot" style="background:'+s.c+'"></span>'+s.l+'</div>'}
  scH+='</div>';
  var h='<div style="margin-bottom:10px"><span class="ct" style="font-size:.92rem">S-Curve Scenario Analysis</span></div>';
  h+='<div class="stats"><div class="si" style="border-left:4px solid var(--g)"><div class="sl">Actual</div><div class="sv" style="color:var(--g)">'+fmtP(oa)+'</div></div><div class="si" style="border-left:4px solid var(--bl)"><div class="sl">Planned (Jun 26)</div><div class="sv" style="color:var(--bl)">'+fmtP(pNow)+'</div></div><div class="si" style="border-left:4px solid '+vrC+'"><div class="sl">Variance</div><div class="sv" style="color:'+vrC+'">'+(vr>=0?'+':'')+fmtP(vr)+'</div></div><div class="si" style="border-left:4px solid var(--or)"><div class="sl">Velocity</div><div class="sv" style="color:var(--or)">'+(velocity*100).toFixed(1)+'%</div><div class="sn">of planned pace</div></div></div>';
  h+=scH;
  h+='<div class="card"><canvas id="scC" width="920" height="360" style="width:100%;height:auto;display:block"></canvas></div>';
  h+='<div class="card"><div class="ch"><span class="ct">Forecast Summary</span></div><div class="tw"><table class="sc-table"><thead><tr><th>Scenario</th><th style="text-align:right">Q3 2026</th><th style="text-align:right">Q4 2026</th><th style="text-align:right">Jan 2027</th><th style="text-align:right">Est. Completion</th></tr></thead><tbody>';
  var fd2=[{l:'Baseline (Planned)',c:'#2874a6',d:planned},{l:'Actual',c:'#2d8a32',d:actual},{l:'On Track Forecast',c:'#d4930d',d:ontr},{l:'Optimistic (+15%)',c:'#9b59b6',d:opt},{l:'Pessimistic (-18%)',c:'#cc3333',d:pess}];
  for(var fi=0;fi<fd2.length;fi++){var fd=fd2[fi];var q3=fd.d[8]||'-',q4=fd.d[11]||'-',jan=fd.d[13]||'-';var estComp='--';for(var mi2=0;mi2<fd.d.length;mi2++){if(fd.d[mi2]>=99){estComp=months[mi2];break}}h+='<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+fd.c+';margin-right:5px"></span>'+fd.l+'</td><td style="text-align:right">'+q3+'%</td><td style="text-align:right">'+q4+'%</td><td style="text-align:right">'+jan+'%</td><td style="text-align:right;font-weight:700;color:'+fd.c+'">'+estComp+'</td></tr>'}
  h+='</tbody></table></div></div>';
  h+='<div class="card" style="border-left:4px solid var(--bl)"><div class="ch"><span class="ct" style="color:var(--bl)">Schedule Analysis</span></div><div style="font-size:.78rem;color:var(--t2);line-height:1.7">';
  h+='<p><strong>Current Status:</strong> The project is at <strong>'+fmtP(oa)+'</strong> actual progress against a planned <strong>'+fmtP(pNow)+'</strong>. Variance of <strong style="color:'+vrC+'">'+(vr>=0?'+':'')+fmtP(vr)+'</strong> means the project is <strong>'+(vr>=0?'ahead of':'behind')+'</strong> schedule.</p>';
  h+='<p><strong>Execution Velocity:</strong> Current velocity is <strong>'+(velocity*100).toFixed(1)+'%</strong> of baseline. ';if(velocity>=1)h+='Team is executing at or above planned rate.';else if(velocity>=0.8)h+='Slightly below target but within tolerance.';else h+='Significantly below target \u2014 corrective action needed.';h+='</p>';
  h+='<p><strong>Phase Breakdown:</strong> Design (WBS 4) core deliverables complete (Architecture, Structural, MEPF at 100%) but permits at 80% and Construction Permit at 20% remain on critical path. Construction (WBS 5) has Temporary Work and Backfill at 30%, Cold Storage at 20%, and 20 of 27 sub-tasks still pending at 0%.</p>';
  h+='<p><strong>Key Risk:</strong> The Construction phase (262 days, 61% of total) has concentrated backlog anchoring overall progress down.</p></div></div>';
  h+='<div class="card" style="border-left:4px solid var(--g)"><div class="ch"><span class="ct" style="color:var(--g)">Recommendations</span></div><div style="font-size:.78rem;color:var(--t2);line-height:1.7">';
  h+='<div style="margin-bottom:10px"><span class="badge bg2" style="font-size:.6rem">1</span> <strong>Accelerate Permit Approvals</strong> \u2014 Prioritize Construction Permit (WBS 4.12 at 20%). All downstream packages depend on this.</div>';
  h+='<div style="margin-bottom:10px"><span class="badge bg2" style="font-size:.6rem">2</span> <strong>Mobilize Pending Packages</strong> \u2014 Transition Dry Warehouse, Boiler/Shelling, Corn Receiving, Pump Room from pending to active within 4-6 weeks.</div>';
  h+='<div style="margin-bottom:10px"><span class="badge bg2" style="font-size:.6rem">3</span> <strong>Fast-Track Critical Path</strong> \u2014 Cold Storage, Substation, Storm Drainage are active at 20-30%. Add resources to compress schedules.</div>';
  h+='<div style="margin-bottom:10px"><span class="badge by2" style="font-size:.6rem">4</span> <strong>Monitor Pessimistic Scenario</strong> \u2014 At current velocity, pessimistic forecast may extend beyond Jan 2027 hand-over target.</div>';
  h+='<div><span class="badge bb2" style="font-size:.6rem">5</span> <strong>Weekly Progress Updates</strong> \u2014 Update sub-task progress weekly for accurate S-curve tracking and early slippage detection.</div>';
  h+='</div></div>';
  $i('app').innerHTML=h;
  drawSCurveChart(planned,actual,ontr,opt,pess,months,scenarios);
}
function drawSCurveChart(planned,actual,ontr,opt,pess,months,scenarios){
  var cv2=$i('scC');if(!cv2)return;var W=cv2.width,H2=cv2.height,pL=55,pR=25,pT=30,pB=50,cW=W-pL-pR,cH=H2-pT-pB;var ctx=cv2.getContext('2d'),n=months.length;ctx.clearRect(0,0,W,H2);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H2);ctx.strokeStyle='#ece9e3';ctx.lineWidth=1;
  for(var i=0;i<=10;i++){var y=pT+(cH/10)*i;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();ctx.fillStyle='#999';ctx.font='11px JetBrains Mono';ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText((100-i*10)+'%',pL-8,y)}
  ctx.textAlign='center';ctx.textBaseline='top';ctx.fillStyle='#999';ctx.font='10px JetBrains Mono';
  for(var i=0;i<n;i++){if(i%2===0)ctx.fillText(months[i],pL+(cW/Math.max(1,n-1))*i,H2-pB+10)}
  function px(i){return pL+(cW/(n-1))*i}function py(v){return pT+cH-(v/100)*cH}
  ctx.beginPath();ctx.moveTo(px(0),pT+cH);for(var i=0;i<n;i++)ctx.lineTo(px(i),py(planned[i]));ctx.lineTo(px(n-1),pT+cH);ctx.closePath();ctx.fillStyle='rgba(40,116,166,.04)';ctx.fill();
  ctx.beginPath();ctx.moveTo(px(0),pT+cH);for(var i=0;i<n;i++)ctx.lineTo(px(i),py(actual[i]));ctx.lineTo(px(n-1),pT+cH);ctx.closePath();ctx.fillStyle='rgba(45,138,50,.05)';ctx.fill();
  var lineData=[{d:planned,c:'#2874a6',k:'baseline',lw:2.5},{d:actual,c:'#2d8a32',k:'actual',lw:3},{d:ontr,c:'#d4930d',k:'ontrack',lw:2},{d:opt,c:'#9b59b6',k:'optimistic',lw:2},{d:pess,c:'#cc3333',k:'pessimistic',lw:2}];

function doImp(f){var rd=new FileReader();rd.onload=function(e){try{var wb=XLSX.read(e.target.result,{type:'array'});var ch=false;if(wb.Sheets['Tasks']){var d=XLSX.utils.sheet_to_json(wb.Sheets['Tasks'],{header:1});if(d.length>1){var nT2=[];for(var i=1;i<d.length;i++){var r=d[i];if(!r||!r[0])continue;nT2.push({wbs:String(r[0]),name:String(r[1]||''),cat:String(r[2]||'General'),dur:parseInt(r[3])||0,s:String(r[4]||''),e:String(r[5]||''),prog:parseInt(r[6])||0,st:String(r[7]||'pending')})}if(nT2.length){D.tasks=nT2;ch=true}}}if(ch){save();mClose();notify('Imported');doRender()}else{alert('No data found')}}catch(err){alert('Error: '+err.message)}};rd.readAsArrayBuffer(f)}

checkAuth();
</script>
