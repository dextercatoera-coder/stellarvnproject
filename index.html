<style>

<div id="loginScr" style="display:none"><div class="lcard"><div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center"><div class="logo-ic" style="width:40px;height:40px"></div><div class="logo-txt"><span class="logo-nm" style="font-size:1.1rem">Stellar Seeds</span><span class="logo-sb">Construction Management</span></div></div><div style="font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:4px" id="lTitle">Sign In</div><div style="font-size:.72rem;color:var(--t3);text-align:center;margin-bottom:20px" id="lSub">Sign in to sync data across devices</div><div class="lerr" id="lErr"></div><div class="fg"><label class="fl">Email</label><input type="text" id="lEmail" placeholder="you@company.com"></div><div class="fg"><label class="fl">Password</label><input type="password" id="lPass" placeholder="Password"></div><button class="btn bp" style="width:100%;padding:10px;font-size:.82rem;margin-top:6px" id="lBtn" onclick="doLogin()">Sign In</button><div style="text-align:center;margin-top:14px;font-size:.74rem;color:var(--t3)" id="lTog">No account? <a style="color:var(--g);font-weight:600" onclick="togAuth()">Sign Up</a></div><div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--b2);text-align:center"><a style="font-size:.68rem;color:var(--t3);text-decoration:underline" onclick="skipAuth()">Continue offline</a></div></div></div>
<div id="mainApp" style="display:none"><div class="hdr"><div class="logo"><div class="logo-ic"></div><div class="logo-txt"><span class="logo-nm">Stellar Seeds</span><span class="logo-sb">Seed Tolling Plant</span></div></div><div class="hdr-r"><span class="hdr-usr" id="hUser"></span><div class="dot off" id="hDot"></div><span class="dot-lb" id="hLbl">Local</span><button class="btn bp bs" onclick="expAll()">Export</button><button class="btn bs" id="hOut" style="display:none" onclick="doLogout()">Logout</button></div></div><div class="nav" id="nbar"></div><div class="app" id="app"></div></div>

<div class="toast" id="tst"></div>
<script>
var D={tasks:[],costs:[],upds:[],photos:[],safety:{},vn:{},vgc:{},pays:[],psch:[],taskProjects:[],siteCost:0,sitePayments:[]};

function $i(id){return document.getElementById(id)}

function lj(k,d){try{var v=JSON.parse(localStorage.getItem('ss_'+k));if(v&&((Array.isArray(v)&&v.length)||(!Array.isArray(v)&&Object.keys(v).length)))return v}catch(e){}return d}

/* ====== KEY-BASED DEEP EQUAL ====== */
function keyEqual(a,b){
  if(a===b)return true;
  if(!a||!b)return false;
  try{return JSON.stringify(a)===JSON.stringify(b)}catch(e){return false}
}

/* ====== FIREBASE INIT ====== */
function initCloud(){
  if(typeof firebase==='undefined')return false;
  var c;try{c=JSON.parse(localStorage.getItem('ss_cloud'))}catch(e){}
  if(!c||!c.databaseURL||!c.apiKey)return false;
  try{
    if(!firebase.apps.length)firebase.initializeApp(c);
    db=firebase.database();
    try{fbAuth=firebase.auth()}catch(e){fbAuth=null}
    cOn=true;return true;
  }catch(e){return false}
}

/* ====== LOCAL SAVE ====== */
function saveLocal(){
  _syncKeys.concat(['photos']).forEach(function(k){localStorage.setItem('ss_'+k,JSON.stringify(D[k]))});
  localStorage.setItem('ss_siteCost',String(D.siteCost));
}

/* ====== PUSH TO FIREBASE ====== */
function pushToCloud(){
  if(!db||!curUser)return;
  setDot('wr');setLbl('Saving...');
  var p={};
  _syncKeys.forEach(function(k){p['ss/'+k]=D[k]});
  p['ss/siteCost']=D.siteCost;
  db.ref().update(p).then(function(){
    setDot('on');setLbl('Synced');
  }).catch(function(e){
    setDot('err');setLbl(isPermErr(e)?'Permission denied':'Save failed');
    console.error('[Cloud] Write error:',e.message);
  });
}

/* ====== SAVE = LOCAL + CLOUD ====== */
function save(){saveLocal();pushToCloud()}

/* ====== APPLY REMOTE DATA ====== */
function applyRemoteData(val){
  if(!val)return false;
  var changed=false;
  _syncKeys.forEach(function(k){
    if(val[k]!==undefined&&!keyEqual(val[k],D[k])){
      D[k]=val[k];localStorage.setItem('ss_'+k,JSON.stringify(val[k]));changed=true;
    }
  });
  if(val.siteCost!==undefined&&val.siteCost!==D.siteCost){
    D.siteCost=val.siteCost;localStorage.setItem('ss_siteCost',String(val.siteCost));changed=true;
  }
  if(changed){ensureDataIntegrity();doRender()}
  return changed;
}

/* ====== LIVE LISTENER ====== */
function startLiveSync(){
  if(!db)return;
  db.ref('ss').off();
  db.ref('ss').on('value',function(snap){
    var val=snap.val();
    if(!val)return;
    var changed=applyRemoteData(val);
    if(changed){
      setDot('on');setLbl('Updated');
      notify('Updated by team');
    }
  },function(err){
    setDot('err');setLbl(isPermErr(err)?'Permission denied':'Listener error');
  });
}

/* ====== INITIAL SYNC ====== */
function initialSync(){
  if(!db)return;
  setDot('wr');setLbl('Syncing...');
  db.ref('ss').once('value').then(function(snap){
    var val=snap.val();
    if(val&&(val.tasks||val.taskProjects)){
      applyRemoteData(val);
      notify('Synced from cloud');
    }else if(D.tasks.length||D.taskProjects.length){
      pushToCloud();
      notify('Published to cloud');
    }
    setDot('on');setLbl('Connected');
    startLiveSync();
    watchConnection();
  }).catch(function(e){
    setDot('err');setLbl('Sync failed');
    startLiveSync();
    watchConnection();
  });
}

/* ====== CONNECTION MONITOR ====== */
function watchConnection(){
  if(!db)return;
  db.ref('.info/connected').on('value',function(s){
    if(s.val()){setDot('on');if(curUser)setLbl('Connected')}
    else{setDot('off');setLbl('Offline')}
  });
}

  if(cOn&&curUser){h+='<div class="card"><div class="ch"><span class="ct">Sync Actions</span></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn bp" onclick="initialSync()">Force Sync</button><button class="btn bb" onclick="pushToCloud()">Push Now</button><button class="btn" onclick="expAll()">Export</button><button class="btn bb" onclick="impAll()">Import</button></div></div>'}else{h+='<div class="card"><div class="ch"><span class="ct">Export / Import</span></div><div style="display:flex;gap:8px"><button class="btn" onclick="expAll()">Export</button><button class="btn bb" onclick="impAll()">Import</button></div></div>'}
  h+='<div class="card"><div class="ch"><span class="ct">Setup Guide</span><button class="btn bs" onclick="var e=$i(\'sgD\');e.style.display=e.style.display===\'none\'?\'block\':\'none\'">Toggle</button></div><div id="sgD" style="display:'+(cOn?'none':'block')+';font-size:.76rem;color:var(--t2);line-height:1.8">';
  h+='<b>1.</b> Go to <a href="https://console.firebase.google.com" target="_blank" style="color:var(--bl)">console.firebase.google.com</a> and create a project<br>';
  h+='<b>2.</b> Build &gt; Realtime Database &gt; Create Database &gt; Start in <b>test mode</b><br>';
  h+='<b>3.</b> Go to <b>Rules</b> tab, replace with:<div class="code-block">{\n  "rules": {\n    ".read": true,\n    ".write": true\n  }\n}</div><b>4.</b> Build &gt; Authentication &gt; Get Started &gt; Enable <b>Email/Password</b><br>';
  h+='<b>5.</b> Project Settings (gear icon) &gt; General &gt; Add web app &gt; Copy config<br>';
  h+='<b>6.</b> Paste config above, click <b>Save &amp; Connect</b><br>';
  h+='<b>7.</b> Authentication &gt; Users &gt; Add user (create accounts for each team member)<br>';
  h+='<b>8.</b> Share this page URL. Everyone signs in with the <b>same credentials</b> to share data.';

}
window.saveCloud=function(){var cfg={apiKey:$i('cKey').value.trim(),databaseURL:$i('cURL').value.trim(),projectId:$i('cPid').value.trim(),authDomain:$i('cDom').value.trim()};if(!cfg.apiKey||!cfg.databaseURL){alert('API Key and Database URL required');return}localStorage.setItem('ss_cloud',JSON.stringify(cfg));notify('Saved. Connecting...');setTimeout(function(){location.reload()},600)};
window.expAll=function(){if(typeof XLSX==='undefined')return;var wb=XLSX.utils.book_new();var td2=[['WBS','Name','Cat','Dur','Start','End','Prog','Status']];for(var i=0;i<D.tasks.length;i++){var t=D.tasks[i];td2.push([t.wbs,t.name,t.cat,t.dur,t.s,t.e,t.prog,t.st])}XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(td2),'Tasks');XLSX.writeFile(wb,'StellarSeeds_'+td()+'.xlsx');notify('Exported')};
window.impAll=function(){mOpen('Import','<div class="dropzone" onclick="$i(\'impF\').click()"><div>Upload Excel</div><input type="file" id="impF" accept=".xlsx" style="display:none" onchange="if(this.files[0])doImp(this.files[0])"></div>','<button class="btn" onclick="mClose()">Cancel</button>')};
function doImp(f){var rd=new FileReader();rd.onload=function(e){try{var wb=XLSX.read(e.target.result,{type:'array'});var ch=false;if(wb.Sheets['Tasks']){var d=XLSX.utils.sheet_to_json(wb.Sheets['Tasks'],{header:1});if(d.length>1){var nT2=[];for(var i=1;i<d.length;i++){var r=d[i];if(!r||!r[0])continue;nT2.push({wbs:String(r[0]),name:String(r[1]||''),cat:String(r[2]||'General'),dur:parseInt(r[3])||0,s:String(r[4]||''),e:String(r[5]||''),prog:parseInt(r[6])||0,st:String(r[7]||'pending'),remarks:[]})}if(nT2.length){D.tasks=nT2;ch=true}}}if(ch){save();mClose();notify('Imported');doRender()}else alert('No data')}catch(err){alert('Error: '+err.message)}};rd.readAsArrayBuffer(f)}

/* ====== STARTUP ====== */
(function(){var ok=initCloud();if(ok&&fbAuth){checkAuth()}else{curUser=null;showMain()}})();
</script>
