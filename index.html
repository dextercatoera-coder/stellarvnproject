function mkFromD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function mkIdx(mk,md){for(var i=0;i<md.length;i++){if(mkFromD(md[i])===mk)return i}return-1}
function plannedAtMk(mk){var p=mk.split('-'),yr=+p[0],mo=+p[1]-1,me=new Date(yr,mo+1,0),m2=mainT(),td2=0;for(var i=0;i<m2.length;i++)td2+=m2[i].dur;if(!td2)return 0;var s=0;for(var j=0;j<m2.length;j++){var t=m2[j],w=t.dur/td2,ts=new Date(t.s),te=new Date(t.e),pc=0;if(me>=te)pc=1;else if(me>=ts)pc=Math.min(1,(me-ts)/Math.max(1,te-ts));s+=w*pc}return Math.round(s*100)}
